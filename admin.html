<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — পাইকারি বাজার</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --primary:#6c2bd9; --primary-light:#a259f7;
    --accent:#f0c040; --bg:#f5f3ff;
    --text:#1a1a2e; --text-light:#666;
    --success:#2ecc71; --error:#e74c3c; --warning:#f0c040;
    --shadow:0 8px 32px rgba(108,43,217,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Hind Siliguri',sans-serif; background:var(--bg); min-height:100vh; }

/* HEADER */
.header { background:linear-gradient(135deg,#1a0a3e,#6c2bd9); padding:50px 20px 24px; position:relative; overflow:hidden; }
.header::before { content:''; position:absolute; top:-60px; right:-60px; width:200px; height:200px; background:rgba(255,255,255,0.05); border-radius:50%; }
.h-top { display:flex; align-items:center; justify-content:space-between; position:relative; z-index:1; }
.h-logo { display:flex; align-items:center; gap:10px; }
.h-logo-icon { width:38px; height:38px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
.h-logo-text { font-size:16px; font-weight:700; color:white; }
.h-sub { color:rgba(255,255,255,0.7); font-size:13px; margin-top:8px; position:relative; z-index:1; }

/* STATS */
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:16px; }
.stat-tile { background:white; border-radius:18px; padding:18px; box-shadow:var(--shadow); text-align:center; border:1.5px solid rgba(108,43,217,0.06); animation:tileIn 0.5s ease both; }
.stat-tile:nth-child(1){animation-delay:.1s} .stat-tile:nth-child(2){animation-delay:.2s}
.stat-tile:nth-child(3){animation-delay:.3s} .stat-tile:nth-child(4){animation-delay:.4s}
@keyframes tileIn { from{transform:translateY(20px) scale(0.95);opacity:0} to{transform:translateY(0) scale(1);opacity:1} }
.stat-num   { font-size:28px; font-weight:700; margin-bottom:4px; }
.stat-label { font-size:13px; color:var(--text-light); }
.stat-tile.pending  .stat-num { color:var(--warning); }
.stat-tile.approved .stat-num { color:var(--success); }
.stat-tile.rejected .stat-num { color:var(--error); }
.stat-tile.total    .stat-num { color:var(--primary); }

/* TABS */
.tabs { display:flex; margin:0 16px 14px; background:white; border-radius:16px; overflow:hidden; box-shadow:var(--shadow); overflow-x:auto; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab { flex:1; min-width:70px; padding:13px 8px; text-align:center; font-size:12px; font-weight:600; cursor:pointer; color:var(--text-light); font-family:'Hind Siliguri',sans-serif; transition:all 0.2s; border-bottom:3px solid transparent; white-space:nowrap; }
.tab.active { color:var(--primary); border-bottom-color:var(--primary); background:#faf8ff; }
.tab-badge { display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; background:var(--warning); color:#1a0a3e; border-radius:50%; font-size:10px; font-weight:700; margin-left:3px; }

/* SECTION */
.section { padding:0 16px; }

/* ADMIN CARD */
.admin-card { background:white; border-radius:18px; padding:16px; box-shadow:var(--shadow); margin-bottom:12px; border:1.5px solid rgba(108,43,217,0.06); }
.ac-top { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.ac-avatar { width:50px; height:50px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; color:white; flex-shrink:0; }
.ac-name { font-size:15px; font-weight:700; color:var(--text); margin-bottom:3px; }
.ac-info { font-size:12px; color:var(--text-light); }
.ac-row  { display:flex; align-items:center; gap:8px; padding:5px 0; font-size:13px; color:var(--text-light); border-bottom:1px solid #f9f7ff; }
.ac-row:last-of-type { border-bottom:none; }
.ac-row-icon { font-size:14px; width:20px; }
.ac-row-val  { color:var(--text); font-weight:500; }
.status-badge { padding:4px 12px; border-radius:99px; font-size:11px; font-weight:600; margin-left:auto; flex-shrink:0; }
.status-badge.pending  { background:#fffbeb; color:#d97706; border:1px solid #fcd34d; }
.status-badge.approved { background:#ecfdf5; color:#059669; border:1px solid #6ee7b7; }
.status-badge.rejected { background:#fef2f2; color:#dc2626; border:1px solid #fca5a5; }
.ac-actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
.ac-btn { flex:1; min-width:75px; padding:10px 6px; border:none; border-radius:12px; font-size:12px; font-weight:600; font-family:'Hind Siliguri',sans-serif; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:4px; transition:transform 0.15s; }
.ac-btn:active { transform:scale(0.96); }
.btn-approve { background:#ecfdf5; color:#059669; border:1.5px solid #6ee7b7; }
.btn-reject  { background:#fef2f2; color:#dc2626; border:1.5px solid #fca5a5; }
.btn-delete  { background:#fef2f2; color:#dc2626; border:1.5px solid #fca5a5; }
.btn-view    { background:#f0ebff; color:var(--primary); border:1.5px solid #c4b5fd; }

/* NOTICE */
.notice-card { background:white; border-radius:18px; padding:20px; box-shadow:var(--shadow); margin:0 16px 16px; }
.nc-title { font-size:15px; font-weight:700; color:var(--text); margin-bottom:14px; padding-bottom:10px; border-bottom:1.5px solid #f0ebff; }
.nc-textarea { width:100%; padding:13px 16px; border:2px solid #e8e0ff; border-radius:12px; font-size:14px; font-family:'Hind Siliguri',sans-serif; color:var(--text); background:#faf8ff; outline:none; resize:none; height:100px; margin-bottom:12px; }
.nc-textarea:focus { border-color:var(--primary); }
.nc-btn { width:100%; padding:14px; background:linear-gradient(135deg,var(--primary),var(--primary-light)); color:white; border:none; border-radius:12px; font-size:15px; font-weight:700; font-family:'Hind Siliguri',sans-serif; cursor:pointer; box-shadow:0 4px 15px rgba(108,43,217,0.3); }

/* ════ SLIDER SECTION ════ */
.slider-card { background:white; border-radius:18px; padding:20px; box-shadow:var(--shadow); margin:0 16px 16px; }
.sl-title { font-size:15px; font-weight:700; color:var(--text); margin-bottom:14px; padding-bottom:10px; border-bottom:1.5px solid #f0ebff; }

/* Existing slides list */
.sl-item { background:#faf8ff; border-radius:14px; overflow:hidden; margin-bottom:12px; border:1.5px solid #e8e0ff; }
.sl-item img { width:100%; height:130px; object-fit:cover; display:block; }
.sl-item-info { padding:10px 14px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
.sl-item-link { font-size:12px; color:var(--text-light); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:220px; }
.sl-del-btn { background:#fef2f2; color:#dc2626; border:1.5px solid #fca5a5; border-radius:8px; padding:6px 12px; font-size:12px; font-family:'Hind Siliguri',sans-serif; cursor:pointer; white-space:nowrap; flex-shrink:0; }
.sl-empty { text-align:center; color:var(--text-light); padding:20px; font-size:14px; }

/* Add new slide form */
.sl-add-box { background:linear-gradient(135deg,#f0ebff,#e8e0ff); border-radius:14px; padding:16px; margin-top:14px; border:1.5px solid rgba(108,43,217,0.15); }
.sl-add-title { font-size:14px; font-weight:700; color:var(--primary-dark,#4a1a9e); margin-bottom:12px; }
.sl-input { width:100%; padding:12px 14px; border:2px solid #e8e0ff; border-radius:10px; font-size:13px; font-family:'Hind Siliguri',sans-serif; color:var(--text); background:white; outline:none; margin-bottom:8px; transition:border-color 0.2s; }
.sl-input:focus { border-color:var(--primary); }
.sl-add-btn { width:100%; padding:13px; background:linear-gradient(135deg,var(--primary),var(--primary-light)); color:white; border:none; border-radius:10px; font-size:14px; font-weight:700; font-family:'Hind Siliguri',sans-serif; cursor:pointer; margin-top:4px; box-shadow:0 4px 14px rgba(108,43,217,0.3); }

/* EMPTY */
.empty-state { text-align:center; padding:40px 20px; color:var(--text-light); }
.empty-icon  { font-size:48px; margin-bottom:12px; }
.empty-title { font-size:16px; font-weight:600; color:var(--text); margin-bottom:6px; }

/* TOAST */
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:#1a1a2e; color:white; padding:12px 24px; border-radius:99px; font-size:14px; font-weight:500; z-index:9999; display:none; white-space:nowrap; box-shadow:0 8px 30px rgba(0,0,0,0.3); font-family:'Hind Siliguri',sans-serif; }

/* BOTTOM NAV */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:white; display:flex; border-top:1px solid #f0ebff; box-shadow:0 -4px 20px rgba(108,43,217,0.1); z-index:100; overflow-x:auto; }
.nav-item { flex:1; min-width:60px; display:flex; flex-direction:column; align-items:center; padding:10px 0 14px; cursor:pointer; font-size:10px; color:#aaa; font-family:'Hind Siliguri',sans-serif; gap:4px; white-space:nowrap; }
.nav-item.active { color:var(--primary); }
.nav-icon { font-size:20px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="h-top">
        <div class="h-logo">
            <div class="h-logo-icon">🛡️</div>
            <div class="h-logo-text">Admin Panel</div>
        </div>
        <a href="index.html" style="padding:8px 14px;background:rgba(255,255,255,0.15);border:none;border-radius:99px;color:white;font-size:13px;font-family:'Hind Siliguri',sans-serif;text-decoration:none;">🏠 হোম</a>
    </div>
    <div class="h-sub">পাইকারি বাজার — সব নিয়ন্ত্রণ এখানে</div>
</div>

<!-- STATS -->
<div class="stats-grid">
    <div class="stat-tile total">
        <div class="stat-num" id="statTotal">০</div>
        <div class="stat-label">মোট দোকান</div>
    </div>
    <div class="stat-tile pending">
        <div class="stat-num" id="statPending">০</div>
        <div class="stat-label">⏳ পেন্ডিং</div>
    </div>
    <div class="stat-tile approved">
        <div class="stat-num" id="statApproved">০</div>
        <div class="stat-label">✅ Approved</div>
    </div>
    <div class="stat-tile rejected">
        <div class="stat-num" id="statRejected">০</div>
        <div class="stat-label">❌ Rejected</div>
    </div>
</div>

<!-- TABS -->
<div class="tabs">
    <div class="tab active" id="tabPending"  onclick="switchTab('pending')">⏳ পেন্ডিং <span class="tab-badge" id="pendingBadge">0</span></div>
    <div class="tab" id="tabApproved" onclick="switchTab('approved')">✅ Approved</div>
    <div class="tab" id="tabRejected" onclick="switchTab('rejected')">❌ Rejected</div>
    <div class="tab" id="tabNotice"   onclick="switchTab('notice')">📢 নোটিশ</div>
    <div class="tab" id="tabSlider"   onclick="switchTab('slider')">🖼️ Slider</div>
</div>

<!-- SHOP SECTION -->
<div class="section" id="shopSection">
    <div id="shopList"></div>
</div>

<!-- NOTICE SECTION -->
<div id="noticeSection" style="display:none">
    <div class="notice-card">
        <div class="nc-title">📢 সকলকে নোটিশ পাঠান</div>
        <textarea class="nc-textarea" id="noticeText" placeholder="নোটিশ লিখুন..."></textarea>
        <button class="nc-btn" onclick="sendNotice()">📤 নোটিশ পাঠান</button>
    </div>
</div>

<!-- SLIDER SECTION -->
<div id="sliderSection" style="display:none">
    <div class="slider-card">
        <div class="sl-title">🖼️ Image Slider পরিচালনা</div>

        <!-- Existing Slides -->
        <div id="slideList"><div class="sl-empty">লোড হচ্ছে...</div></div>

        <!-- Add New -->
        <div class="sl-add-box">
            <div class="sl-add-title">➕ নতুন Slide যোগ করুন</div>
            <input class="sl-input" type="url" id="slideImg" placeholder="ছবির URL — https://example.com/image.jpg">
            <input class="sl-input" type="url" id="slideLink" placeholder="লিংক (ঐচ্ছিক) — https://...">
            <button class="sl-add-btn" onclick="addSlide()">➕ Slide যোগ করুন</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('pending')"><span class="nav-icon">⏳</span>পেন্ডিং</div>
    <div class="nav-item" onclick="switchTab('approved')"><span class="nav-icon">✅</span>Approved</div>
    <div class="nav-item" onclick="switchTab('rejected')"><span class="nav-icon">❌</span>Rejected</div>
    <div class="nav-item" onclick="switchTab('notice')"><span class="nav-icon">📢</span>নোটিশ</div>
    <div class="nav-item" onclick="switchTab('slider')"><span class="nav-icon">🖼️</span>Slider</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
    apiKey:"AIzaSyA1CzQX9tgbLd46QfvCK6Rwqa0z9CRWoMs",
    authDomain:"agls-5bd4c.firebaseapp.com",
    databaseURL:"https://agls-5bd4c-default-rtdb.firebaseio.com/",
    projectId:"agls-5bd4c",
});
const db = firebase.database();

let currentTab = 'pending';
let allShops   = {};

const grads = ['linear-gradient(135deg,#6c2bd9,#a259f7)','linear-gradient(135deg,#0f3460,#16213e)','linear-gradient(135deg,#1a6b3c,#2ecc71)','linear-gradient(135deg,#e74c3c,#c0392b)','linear-gradient(135deg,#f39c12,#e67e22)','linear-gradient(135deg,#1abc9c,#16a085)'];

// ══ LOAD ALL SHOPS ══
db.ref('shops').on('value', snap => {
    allShops = {};
    let total=0, pending=0, approved=0, rejected=0;
    if (snap.exists()) {
        snap.forEach(c => {
            allShops[c.key] = c.val();
            total++;
            const st = c.val().status;
            if (st==='pending')  pending++;
            if (st==='approved') approved++;
            if (st==='rejected') rejected++;
        });
    }
    document.getElementById('statTotal').textContent    = total;
    document.getElementById('statPending').textContent  = pending;
    document.getElementById('statApproved').textContent = approved;
    document.getElementById('statRejected').textContent = rejected;
    document.getElementById('pendingBadge').textContent = pending;
    if (currentTab !== 'notice' && currentTab !== 'slider') renderShops(currentTab);
});

// ══ SWITCH TAB ══
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    const tabEl = document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1));
    if (tabEl) tabEl.classList.add('active');

    document.getElementById('shopSection').style.display   = ['pending','approved','rejected'].includes(tab) ? 'block' : 'none';
    document.getElementById('noticeSection').style.display  = tab==='notice'  ? 'block' : 'none';
    document.getElementById('sliderSection').style.display  = tab==='slider'  ? 'block' : 'none';

    if (tab==='slider') loadSliderAdmin();
    else if (tab!=='notice') renderShops(tab);
}

// ══ RENDER SHOPS ══
function renderShops(status) {
    const list = document.getElementById('shopList');
    const filtered = Object.entries(allShops).filter(([,s])=>s.status===status);

    if (!filtered.length) {
        list.innerHTML=`<div class="empty-state"><div class="empty-icon">${status==='pending'?'⏳':status==='approved'?'✅':'❌'}</div><div class="empty-title">কোনো দোকান নেই</div></div>`;
        return;
    }

    list.innerHTML = filtered.map(([id,shop],i) => {
        const g = grads[i%grads.length];
        const av = (shop.shopName||'?').charAt(0);
        const statusLabel = shop.status==='pending'?'⏳ পেন্ডিং':shop.status==='approved'?'✅ Approved':'❌ Rejected';

        const actionBtns = status==='pending' ? `
            <button class="ac-btn btn-approve" onclick="updateStatus('${id}','approved')">✅ Approve</button>
            <button class="ac-btn btn-reject"  onclick="updateStatus('${id}','rejected')">❌ Reject</button>
        ` : status==='approved' ? `
            <button class="ac-btn btn-reject" onclick="updateStatus('${id}','rejected')">❌ Reject</button>
            <button class="ac-btn btn-delete" onclick="deleteShop('${id}','${shop.shopName}')">🗑️ Delete</button>
            <button class="ac-btn btn-view"   onclick="window.open('profile.html?id=${id}','_blank')">👁️ দেখুন</button>
        ` : `
            <button class="ac-btn btn-approve" onclick="updateStatus('${id}','approved')">✅ Approve</button>
            <button class="ac-btn btn-delete"  onclick="deleteShop('${id}','${shop.shopName}')">🗑️ Delete</button>
        `;

        return `
        <div class="admin-card">
            <div class="ac-top">
                <div class="ac-avatar" style="background:${g}">${av}</div>
                <div style="flex:1">
                    <div class="ac-name">${shop.shopName||'—'}</div>
                    <div class="ac-info">${shop.ownerName||''}</div>
                </div>
                <div class="status-badge ${shop.status}">${statusLabel}</div>
            </div>
            <div class="ac-row"><span class="ac-row-icon">📍</span><span class="ac-row-val">${shop.area||''}, ${shop.district||''}</span></div>
            <div class="ac-row"><span class="ac-row-icon">📱</span><span class="ac-row-val">${shop.phone||'—'}</span></div>
            <div class="ac-row"><span class="ac-row-icon">✉️</span><span class="ac-row-val">${shop.email||'—'}</span></div>
            ${shop.category?`<div class="ac-row"><span class="ac-row-icon">🗂️</span><span class="ac-row-val">${shop.category}</span></div>`:''}
            <div class="ac-actions">${actionBtns}</div>
        </div>`;
    }).join('');
}

// ══ UPDATE STATUS ══
async function updateStatus(id, status) {
    try {
        await db.ref('shops/'+id).update({status});
        showToast(status==='approved'?'✅ Approved!':'❌ Rejected!');
    } catch(e) { showToast('⚠️ সমস্যা হয়েছে!'); }
}

// ══ DELETE SHOP ══
async function deleteShop(id, name) {
    if (!confirm(`"${name}" Delete করবেন?`)) return;
    try {
        await db.ref('shops/'+id).remove();
        showToast('🗑️ Delete হয়েছে!');
    } catch(e) { showToast('⚠️ সমস্যা হয়েছে!'); }
}

// ══ NOTICE ══
async function sendNotice() {
    const msg = document.getElementById('noticeText').value.trim();
    if (!msg) { showToast('⚠️ নোটিশ লিখুন!'); return; }
    try {
        await db.ref('message').set(msg);
        document.getElementById('noticeText').value='';
        showToast('📢 নোটিশ পাঠানো হয়েছে!');
    } catch(e) { showToast('⚠️ সমস্যা হয়েছে!'); }
}

// ══ SLIDER ADMIN ══
function loadSliderAdmin() {
    db.ref('slider').on('value', snap => {
        const list = document.getElementById('slideList');
        if (!snap.exists()) {
            list.innerHTML = '<div class="sl-empty">এখনো কোনো Slide নেই। নিচে যোগ করুন।</div>';
            return;
        }
        let html = '';
        snap.forEach(child => {
            const s = child.val();
            const key = child.key;
            html += `
            <div class="sl-item">
                <img src="${s.image}" alt="slide"
                    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div style="display:none;height:130px;background:linear-gradient(135deg,#6c2bd9,#a259f7);align-items:center;justify-content:center;font-size:36px;">🏪</div>
                <div class="sl-item-info">
                    <div class="sl-item-link">🔗 ${s.link||'কোনো লিংক নেই'}</div>
                    <button class="sl-del-btn" onclick="deleteSlide('${key}')">🗑️ Delete</button>
                </div>
            </div>`;
        });
        list.innerHTML = html;
    });
}

async function addSlide() {
    const img  = document.getElementById('slideImg').value.trim();
    const link = document.getElementById('slideLink').value.trim();
    if (!img) { showToast('⚠️ ছবির URL দিন!'); return; }
    try {
        await db.ref('slider').push({image:img, link:link||''});
        document.getElementById('slideImg').value  = '';
        document.getElementById('slideLink').value = '';
        showToast('✅ Slide যোগ হয়েছে!');
    } catch(e) { showToast('⚠️ সমস্যা হয়েছে!'); }
}

async function deleteSlide(key) {
    if (!confirm('এই Slide Delete করবেন?')) return;
    try {
        await db.ref('slider/'+key).remove();
        showToast('🗑️ Slide Delete হয়েছে!');
    } catch(e) { showToast('⚠️ সমস্যা হয়েছে!'); }
}

// ══ TOAST ══
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display='none', 3000);
}
</script>
