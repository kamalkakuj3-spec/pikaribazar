<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangladesh Division API</title>

    <style>

        body{
            margin:0;
            padding:30px;
            background:#f2f2f2;
            font-family:Arial;
        }

        .box{
            max-width:400px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        select{
            width:100%;
            padding:12px;
            font-size:18px;
            border:1px solid #ccc;
            border-radius:5px;
        }

    </style>
</head>

<body>

    <div class="box">

        <h2>বাংলাদেশের বিভাগ</h2>

        <select id="division">

            <option>লোড হচ্ছে...</option>

        </select>

    </div>

    <script>

        // Dropdown Element
        const divisionSelect =
        document.getElementById("division");

        // API URL
        const apiUrl =
        "https://bdapis.vercel.app/api/v1.2/divisions";

        // API Fetch
        fetch(apiUrl)

        .then(function(response){

            return response.json();

        })

        .then(function(data){

            console.log(data);

            // পুরানো option remove
            divisionSelect.innerHTML =
            "<option>বিভাগ নির্বাচন করুন</option>";

            // Loop
            data.data.forEach(function(item){

                // option create
                const option =
                document.createElement("option");

                // option value
                option.value = item.id;

                // option text
                option.textContent =
                item.name;

                // append
                divisionSelect.appendChild(option);

            });

        })

        .catch(function(error){

            console.log(error);

            alert("API Load Failed");

        });

    </script>

</body>
</html>
