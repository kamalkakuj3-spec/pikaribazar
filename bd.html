<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাংলাদেশের বিভাগ, জেলা ও উপজেলা - JSON ভিউয়ার</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Hind Siliguri', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            font-size: 14px;
        }
        .form-group { margin-bottom: 25px; }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }
        select {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        select:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
            color: #999;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            color: white;
            display: none;
            animation: slideUp 0.3s ease;
        }
        .result-box.show { display: block; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-box h3 {
            margin-bottom: 8px;
            font-size: 16px;
            opacity: 0.9;
        }
        .result-box p { font-size: 22px; font-weight: bold; margin-bottom: 10px; }
        .result-box .upazila-count {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 8px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid #c33;
            font-size: 14px;
        }
        .error pre {
            margin-top: 10px;
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            overflow-x: auto;
        }
        .badge {
            display: inline-block;
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
        .info-panel {
            background: #f8f9ff;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }
        .info-panel h4 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .stat {
            background: white;
            padding: 10px 15px;
            border-radius: 12px;
            flex: 1;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label { font-size: 12px; color: #888; margin-top: 5px; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
            transition: all 0.3s;
            font-family: inherit;
        }
        button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.8);
            font-size: 12px;
        }
        a {
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>
                <span>🗺️</span>
                বাংলাদেশের বিভাগ, জেলা ও উপজেলা
            </h1>
            <div class="subtitle">
                JSON ফাইল থেকে ডাটা লোড করে ৩-স্তরের সম্পর্ক দেখানো হচ্ছে
            </div>

            <div id="loadingDiv" class="loading">
                <div class="loader"></div>
                <p>divisions.json ফাইল লোড হচ্ছে...</p>
                <div class="badge" id="urlBadge"></div>
            </div>

            <div id="errorDiv" class="error" style="display: none;"></div>

            <div id="contentDiv" style="display: none;">
                <div class="form-group">
                    <label>📌 ১. বিভাগ নির্বাচন করুন</label>
                    <select id="divisionSelect">
                        <option value="">-- একটি বিভাগ নির্বাচন করুন --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>📌 ২. জেলা নির্বাচন করুন</label>
                    <select id="districtSelect" disabled>
                        <option value="">-- প্রথমে বিভাগ নির্বাচন করুন --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>📌 ৩. উপজেলা/থানা নির্বাচন করুন</label>
                    <select id="upazilaSelect" disabled>
                        <option value="">-- প্রথমে জেলা নির্বাচন করুন --</option>
                    </select>
                </div>

                <div id="resultBox" class="result-box">
                    <h3>✅ আপনার নির্বাচিত তথ্য</h3>
                    <p id="selectedInfo"></p>
                    <div id="upazilaInfo" class="upazila-count"></div>
                </div>

                <button onclick="resetSelections()">⟳ সব রিসেট করুন</button>
            </div>
        </div>

        <div class="card" id="statsCard" style="display: none;">
            <div class="info-panel">
                <h4>📊 JSON ফাইলের পরিসংখ্যান</h4>
                <div class="stats" id="statsContainer"></div>
            </div>
        </div>
        <div class="footer">
            ডাটা সোর্স: <a href="https://github.com/kamalkakuj3-spec/my-app/blob/main/divisions.json" target="_blank">GitHub রিপোজিটরি</a>
        </div>
    </div>

    <script>
        // আপনার দেওয়া GitHub RAW লিংক
        const JSON_URL = 'https://raw.githubusercontent.com/kamalkakuj3-spec/my-app/main/divisions.json';
        
        document.getElementById('urlBadge').innerText = JSON_URL;
        
        let divisionsData = [];
        let currentDistricts = [];
        let currentUpazilas = [];

        async function loadDivisions() {
            const loadingDiv = document.getElementById('loadingDiv');
            const errorDiv = document.getElementById('errorDiv');
            const contentDiv = document.getElementById('contentDiv');

            try {
                console.log('JSON লোড হচ্ছে:', JSON_URL);
                
                const response = await fetch(JSON_URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (!data.divisions || !Array.isArray(data.divisions)) {
                    throw new Error('JSON ফাইলের ফরম্যাট সঠিক নয়। "divisions" অ্যারে থাকতে হবে।');
                }
                
                divisionsData = data.divisions;
                
                loadingDiv.style.display = 'none';
                contentDiv.style.display = 'block';
                errorDiv.style.display = 'none';
                
                populateDivisionSelect();
                showStatistics();
                
            } catch (error) {
                console.error('Error:', error);
                loadingDiv.style.display = 'none';
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = `
                    <strong>❌ JSON ফাইল লোড করতে ব্যর্থ!</strong><br><br>
                    <strong>ত্রুটি:</strong> ${error.message}<br><br>
                    <strong>সমাধান:</strong><br>
                    1. নিশ্চিত করুন যে URL টি সঠিক RAW লিংক<br>
                    2. বর্তমান URL: <code style="background:white;padding:2px 6px;border-radius:4px;">${JSON_URL}</code><br>
                    3. ফাইলটি পাবলিক কি না চেক করুন<br>
                    4. নিচের ফরম্যাটে URL দিন:<br>
                    <code>https://raw.githubusercontent.com/ইউজারনেম/রিপোজিটরি/ব্রাঞ্চ/divisions.json</code><br><br>
                    <strong>আপনার GitHub Pages লিংক ট্রাই করুন:</strong><br>
                    <code>https://kamalkakuj3-spec.github.io/my-app/divisions.json</code>
                `;
            }
        }

        function populateDivisionSelect() {
            const divisionSelect = document.getElementById('divisionSelect');
            divisionSelect.innerHTML = '<option value="">-- একটি বিভাগ নির্বাচন করুন --</option>';
            
            divisionsData.forEach(div => {
                const option = document.createElement('option');
                option.value = div.name;
                option.textContent = div.name;
                divisionSelect.appendChild(option);
            });
        }

        function populateDistrictSelect(divisionName) {
            const districtSelect = document.getElementById('districtSelect');
            const division = divisionsData.find(d => d.name === divisionName);
            
            if (!division) {
                districtSelect.innerHTML = '<option value="">-- কোন জেলা পাওয়া যায়নি --</option>';
                districtSelect.disabled = true;
                currentDistricts = [];
                return;
            }
            
            currentDistricts = division.districts;
            districtSelect.innerHTML = '<option value="">-- একটি জেলা নির্বাচন করুন --</option>';
            division.districts.forEach(district => {
                const option = document.createElement('option');
                option.value = district.name;
                option.textContent = district.name;
                districtSelect.appendChild(option);
            });
            districtSelect.disabled = false;
        }

        function populateUpazilaSelect(districtName) {
            const upazilaSelect = document.getElementById('upazilaSelect');
            const district = currentDistricts.find(d => d.name === districtName);
            
            if (!district) {
                upazilaSelect.innerHTML = '<option value="">-- কোন উপজেলা পাওয়া যায়নি --</option>';
                upazilaSelect.disabled = true;
                currentUpazilas = [];
                return;
            }
            
            currentUpazilas = district.upazilas;
            upazilaSelect.innerHTML = '<option value="">-- একটি উপজেলা নির্বাচন করুন --</option>';
            district.upazilas.forEach(upazila => {
                const option = document.createElement('option');
                option.value = upazila;
                option.textContent = upazila;
                upazilaSelect.appendChild(option);
            });
            upazilaSelect.disabled = false;
        }

        function showStatistics() {
            const statsCard = document.getElementById('statsCard');
            const statsContainer = document.getElementById('statsContainer');
            
            let totalDistricts = 0;
            let totalUpazilas = 0;
            
            divisionsData.forEach(div => {
                totalDistricts += div.districts.length;
                div.districts.forEach(dist => {
                    totalUpazilas += dist.upazilas.length;
                });
            });
            
            statsContainer.innerHTML = `
                <div class="stat">
                    <div class="stat-number">${divisionsData.length}</div>
                    <div class="stat-label">টি বিভাগ</div>
                </div>
                <div class="stat">
                    <div class="stat-number">${totalDistricts}</div>
                    <div class="stat-label">টি জেলা</div>
                </div>
                <div class="stat">
                    <div class="stat-number">${totalUpazilas}</div>
                    <div class="stat-label">টি উপজেলা</div>
                </div>
            `;
            
            statsCard.style.display = 'block';
        }

        // ইভেন্ট লিসেনার
        document.getElementById('divisionSelect').addEventListener('change', function() {
            const selectedDivision = this.value;
            const districtSelect = document.getElementById('districtSelect');
            const upazilaSelect = document.getElementById('upazilaSelect');
            const resultBox = document.getElementById('resultBox');
            
            districtSelect.innerHTML = '<option value="">-- প্রথমে বিভাগ নির্বাচন করুন --</option>';
            districtSelect.disabled = true;
            upazilaSelect.innerHTML = '<option value="">-- প্রথমে জেলা নির্বাচন করুন --</option>';
            upazilaSelect.disabled = true;
            resultBox.classList.remove('show');
            
            if (!selectedDivision) return;
            populateDistrictSelect(selectedDivision);
        });

        document.getElementById('districtSelect').addEventListener('change', function() {
            const selectedDistrict = this.value;
            const upazilaSelect = document.getElementById('upazilaSelect');
            const resultBox = document.getElementById('resultBox');
            
            upazilaSelect.innerHTML = '<option value="">-- প্রথমে জেলা নির্বাচন করুন --</option>';
            upazilaSelect.disabled = true;
            resultBox.classList.remove('show');
            
            if (!selectedDistrict) return;
            populateUpazilaSelect(selectedDistrict);
        });

        document.getElementById('upazilaSelect').addEventListener('change', function() {
            const selectedDivision = document.getElementById('divisionSelect').value;
            const selectedDistrict = document.getElementById('districtSelect').value;
            const selectedUpazila = this.value;
            const resultBox = document.getElementById('resultBox');
            const selectedInfo = document.getElementById('selectedInfo');
            const upazilaInfo = document.getElementById('upazilaInfo');
            
            if (selectedDivision && selectedDistrict && selectedUpazila) {
                selectedInfo.innerHTML = `
                    <div style="font-size:14px; opacity:0.9;">বিভাগ</div>
                    <div style="font-size:20px; margin-bottom:10px;">${selectedDivision}</div>
                    <div style="font-size:14px; opacity:0.9;">জেলা</div>
                    <div style="font-size:20px; margin-bottom:10px;">${selectedDistrict}</div>
                    <div style="font-size:14px; opacity:0.9;">উপজেলা / থানা</div>
                    <div style="font-size:24px; font-weight:bold;">${selectedUpazila}</div>
                `;
                
                const district = currentDistricts.find(d => d.name === selectedDistrict);
                if (district) {
                    const index = district.upazilas.indexOf(selectedUpazila);
                    upazilaInfo.innerHTML = `📌 ${district.upazilas.length}টি উপজেলার মধ্যে ${index+1}তম`;
                }
                
                resultBox.classList.add('show');
            } else {
                resultBox.classList.remove('show');
            }
        });

        window.resetSelections = function() {
            const divisionSelect = document.getElementById('divisionSelect');
            const districtSelect = document.getElementById('districtSelect');
            const upazilaSelect = document.getElementById('upazilaSelect');
            const resultBox = document.getElementById('resultBox');
            
            divisionSelect.value = '';
            districtSelect.innerHTML = '<option value="">-- প্রথমে বিভাগ নির্বাচন করুন --</option>';
            districtSelect.disabled = true;
            upazilaSelect.innerHTML = '<option value="">-- প্রথমে জেলা নির্বাচন করুন --</option>';
            upazilaSelect.disabled = true;
            resultBox.classList.remove('show');
        };

        // সবশেষে, পেজ লোড হলে কাজ শুরু করো
        loadDivisions();
    </script>
</body>
</html>
