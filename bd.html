<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বিভাগ ও জেলা নির্বাচক</title>
    <style>
        :root {
            --primary: #6c2bd9;
            --primary-light: #a259f7;
            --bg: #f5f3ff;
        }
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(108,43,217,0.12);
            max-width: 400px;
            width: 100%;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 99px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f0ebff;
            border-radius: 16px;
            display: none;
        }
        .result.show { display: block; }
        
        /* পপআপ স্টাইল - আপনার অ্যাপের মতো */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .popup {
            background: white;
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow: hidden;
        }
        .popup-header {
            padding: 18px 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .popup-header h3 { margin: 0; font-size: 18px; }
        .popup-close {
            background: rgba(255,255,255,0.2);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            color: white;
        }
        .popup-body { padding: 16px; max-height: 55vh; overflow-y: auto; }
        .item-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .select-item {
            padding: 10px 16px;
            background: #f5f3ff;
            border-radius: 99px;
            cursor: pointer;
            font-size: 13px;
        }
        .select-item.selected {
            background: var(--primary);
            color: white;
        }
        .back-link {
            color: var(--primary);
            cursor: pointer;
            font-size: 13px;
            margin-bottom: 15px;
            display: inline-block;
        }
        .popup-footer {
            padding: 16px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
        }
        .popup-footer button {
            flex: 1;
            padding: 12px;
            border-radius: 99px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: auto;
        }
        .btn-apply { background: var(--primary); color: white; border: none; }
        .btn-back { background: #f0ebff; color: var(--primary); border: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>🗺️ বিভাগ ও জেলা</h2>
    <button onclick="openSelector()">📂 নির্বাচন করুন</button>
    <div class="result" id="result">
        <div id="resultText"></div>
    </div>
</div>

<script>
    // আপনার GitHub RAW লিংক
    const JSON_URL = 'https://raw.githubusercontent.com/kamalkakuj3-spec/my-app/main/divisions.json';
    
    let divisions = [];
    let selectedDivision = '';
    let selectedDistrict = '';
    let currentStep = 'division';

    // JSON লোড
    async function loadData() {
        const res = await fetch(JSON_URL);
        const data = await res.json();
        divisions = data.divisions;
    }
    loadData();

    function openSelector() {
        currentStep = 'division';
        renderPopup();
    }

    function renderPopup() {
        const existing = document.querySelector('.popup-overlay');
        if (existing) existing.remove();

        const overlay = document.createElement('div');
        overlay.className = 'popup-overlay';

        let bodyHTML = '';
        if (currentStep === 'division') {
            bodyHTML = `
                <div class="item-grid">
                    ${divisions.map(d => `<div class="select-item ${selectedDivision === d.name ? 'selected' : ''}" onclick="selectDivision('${d.name}')">${d.name}</div>`).join('')}
                </div>
            `;
        } else {
            const div = divisions.find(d => d.name === selectedDivision);
            bodyHTML = `
                <div class="back-link" onclick="goBack()">← ${selectedDivision} বিভাগে ফিরুন</div>
                <div class="item-grid">
                    ${div ? div.districts.map(d => `<div class="select-item ${selectedDistrict === d.name ? 'selected' : ''}" onclick="selectDistrict('${d.name}')">${d.name}</div>`).join('') : ''}
                </div>
            `;
        }

        overlay.innerHTML = `
            <div class="popup">
                <div class="popup-header">
                    <h3>${currentStep === 'division' ? 'বিভাগ নির্বাচন করুন' : 'জেলা নির্বাচন করুন'}</h3>
                    <button class="popup-close" onclick="this.closest('.popup-overlay').remove()">✕</button>
                </div>
                <div class="popup-body">
                    ${bodyHTML}
                </div>
                <div class="popup-footer">
                    ${currentStep === 'district' ? `
                        <button class="btn-back" onclick="goBack()">পেছনে</button>
                        <button class="btn-apply" onclick="applySelection()">প্রয়োগ</button>
                    ` : `
                        <button class="btn-back" onclick="closePopup()">বাতিল</button>
                        <button class="btn-apply" id="nextBtn" ${!selectedDivision ? 'disabled style="opacity:0.5"' : ''} onclick="nextStep()">পরবর্তী</button>
                    `}
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
    }

    window.selectDivision = (name) => {
        selectedDivision = name;
        selectedDistrict = '';
        renderPopup();
    };

    window.selectDistrict = (name) => {
        selectedDistrict = name;
        renderPopup();
    };

    window.nextStep = () => {
        if (selectedDivision) {
            currentStep = 'district';
            renderPopup();
        }
    };

    window.goBack = () => {
        currentStep = 'division';
        renderPopup();
    };

    window.applySelection = () => {
        const resultDiv = document.getElementById('result');
        const resultText = document.getElementById('resultText');
        if (selectedDivision && selectedDistrict) {
            resultText.innerHTML = `✅ ${selectedDivision} বিভাগের ${selectedDistrict} জেলা`;
            resultDiv.classList.add('show');
        }
        closePopup();
    };

    window.closePopup = () => {
        const popup = document.querySelector('.popup-overlay');
        if (popup) popup.remove();
    };
</script>

</body>
</html>
