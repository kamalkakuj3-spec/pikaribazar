<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>বাংলাদেশ - বিভাগ, জেলা, উপজেলা, ইউনিয়ন (JSON লিংক সংস্করণ)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #e0f2e9 0%, #c8e0d4 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255,255,255,0.98);
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            overflow: hidden;
            margin-bottom: 28px;
        }
        .card-header {
            background: linear-gradient(95deg, #0a5c3b, #188c4a);
            color: white;
            padding: 22px 30px;
        }
        .card-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
        }
        .card-header p {
            opacity: 0.9;
            margin-top: 6px;
            font-size: 0.95rem;
        }
        .card-body {
            padding: 28px 30px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 28px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 700;
            color: #1a5a3a;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        select {
            padding: 12px 16px;
            font-size: 0.95rem;
            border: 2px solid #d1e0d4;
            border-radius: 28px;
            background: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        select:focus {
            outline: none;
            border-color: #188c4a;
            box-shadow: 0 0 0 3px rgba(24,140,74,0.2);
        }
        select:disabled {
            background: #f4f9f6;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .counter {
            font-size: 0.7rem;
            color: #4a6b5c;
            margin-top: 6px;
            margin-left: 6px;
        }
        .selected-info {
            background: #eef6f1;
            border-radius: 28px;
            padding: 16px 22px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-left: 6px solid #188c4a;
            margin-bottom: 25px;
        }
        .badge {
            background: #188c4a;
            color: white;
            padding: 6px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.8rem;
        }
        .selected-text {
            font-weight: 600;
            color: #0f402c;
            font-size: 1rem;
        }
        .items-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-height: 280px;
            overflow-y: auto;
            padding: 8px 4px;
            margin-top: 12px;
        }
        .item-tag {
            background: #fefefe;
            border: 1px solid #bcddce;
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1a5e3a;
            transition: all 0.2s;
            cursor: default;
        }
        .item-tag:hover {
            background: #188c4a;
            color: white;
            border-color: #188c4a;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #1a5a3a;
            font-weight: 500;
        }
        .error-msg {
            background: #ffe6e5;
            border-left: 5px solid #c7362b;
            padding: 12px;
            border-radius: 16px;
            color: #a1221a;
            margin-top: 15px;
        }
        .success-msg {
            background: #e0f7ea;
            border-left: 5px solid #188c4a;
            padding: 10px;
            border-radius: 16px;
            color: #0f5236;
            margin-top: 10px;
            font-size: 0.85rem;
        }
        @media (max-width: 700px) {
            .card-body { padding: 18px; }
            .form-grid { gap: 15px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <h1>🇧🇩 বাংলাদেশ প্রশাসনিক স্তর</h1>
            <p>JSON ফাইল থেকে লোড হচ্ছে: divisions.json → districts.json → upazilas.json → unions.json</p>
        </div>
        <div class="card-body">
            <!-- লোড স্ট্যাটাস -->
            <div id="loadStatus" class="success-msg" style="margin-bottom: 20px;">⏳ JSON ফাইল লোড হচ্ছে...</div>

            <div class="form-grid">
                <div class="form-group">
                    <label>📌 ১. বিভাগ (Division)</label>
                    <select id="divisionSelect" disabled>
                        <option value="">লোড হচ্ছে...</option>
                    </select>
                    <div class="counter" id="divisionCount"></div>
                </div>
                <div class="form-group">
                    <label>📍 ২. জেলা (District)</label>
                    <select id="districtSelect" disabled>
                        <option value="">-- প্রথমে বিভাগ নির্বাচন --</option>
                    </select>
                    <div class="counter" id="districtCount"></div>
                </div>
                <div class="form-group">
                    <label>🗺️ ৩. উপজেলা (Upazila)</label>
                    <select id="upazilaSelect" disabled>
                        <option value="">-- প্রথমে জেলা নির্বাচন --</option>
                    </select>
                    <div class="counter" id="upazilaCount"></div>
                </div>
                <div class="form-group">
                    <label>🏘️ ৪. ইউনিয়ন (Union)</label>
                    <select id="unionSelect" disabled>
                        <option value="">-- প্রথমে উপজেলা নির্বাচন --</option>
                    </select>
                    <div class="counter" id="unionCount"></div>
                </div>
            </div>

            <div class="selected-info">
                <span class="badge">✔ বর্তমান নির্বাচন</span>
                <span class="selected-text" id="selectionDisplay">ডাটা লোড হচ্ছে...</span>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header" style="background: #2a6e48;">
            <h3>📋 সংশ্লিষ্ট এলাকার তালিকা</h3>
        </div>
        <div class="card-body" id="listPanel">
            <div id="dynamicListArea">
                <div class="items-list"><span class="item-tag">JSON ফাইল লোড হওয়ার অপেক্ষায়...</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    // গ্লোবাল ডাটা স্টোর
    let divisionsData = [];
    let districtsData = [];
    let upazilasData = [];
    let unionsData = [];

    // ড্রপডাউন এলিমেন্ট
    const divisionSelect = document.getElementById('divisionSelect');
    const districtSelect = document.getElementById('districtSelect');
    const upazilaSelect = document.getElementById('upazilaSelect');
    const unionSelect = document.getElementById('unionSelect');
    const selectionDisplay = document.getElementById('selectionDisplay');
    const dynamicListArea = document.getElementById('dynamicListArea');
    const loadStatusDiv = document.getElementById('loadStatus');

    // JSON ফাইল fetch (আপনার দেওয়া exact নাম ব্যবহার করা হয়েছে)
    async function fetchJSON(url, fileName) {
        try {
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status} - ${fileName} পাওয়া যায়নি`);
            }
            const data = await response.json();
            // ফাইল ফরম্যাট চেক: আপনার দেওয়া ফাইলে ডাটা "data" কী এর ভিতরে
            if (data && Array.isArray(data.data)) {
                return data.data;
            }
            if (Array.isArray(data)) {
                return data;
            }
            throw new Error(`${fileName} ফাইলের ফরম্যাট সঠিক নয়`);
        } catch (err) {
            throw new Error(`${fileName}: ${err.message}`);
        }
    }

    // সব JSON লোড করুন
    async function loadAllData() {
        try {
            loadStatusDiv.innerHTML = '⏳ divisions.json লোড হচ্ছে...';
            divisionsData = await fetchJSON('divisions.json', 'divisions.json');
            
            loadStatusDiv.innerHTML = '⏳ districts.json লোড হচ্ছে...';
            districtsData = await fetchJSON('districts.json', 'districts.json');
            
            loadStatusDiv.innerHTML = '⏳ upazilas.json লোড হচ্ছে...';
            upazilasData = await fetchJSON('upazilas.json', 'upazilas.json');
            
            loadStatusDiv.innerHTML = '⏳ unions.json লোড হচ্ছে...';
            unionsData = await fetchJSON('unions.json', 'unions.json');

            // সফল লোড
            loadStatusDiv.innerHTML = `✅ সফল! ${divisionsData.length} বিভাগ, ${districtsData.length} জেলা, ${upazilasData.length} উপজেলা, ${unionsData.length} ইউনিয়ন লোড হয়েছে।`;
            loadStatusDiv.style.background = '#e0f7ea';
            loadStatusDiv.style.borderLeftColor = '#188c4a';
            
            console.log('Divisions:', divisionsData.length);
            console.log('Districts:', districtsData.length);
            console.log('Upazilas:', upazilasData.length);
            console.log('Unions:', unionsData.length);

            // বিভাগ সিলেক্ট পপুলেট
            populateDivisions();
            divisionSelect.disabled = false;
            resetDependents();
            updateSelectionDisplay();
            showListForCurrentLevel();
        } catch (error) {
            console.error(error);
            loadStatusDiv.innerHTML = `❌ JSON লোড ব্যর্থ: ${error.message}<br><br>
            <strong>সমাধান:</strong> নিশ্চিত করুন যে নিচের ফাইলগুলো একই ফোল্ডারে আছে:<br>
            📄 divisions.json &nbsp; 📄 districts.json &nbsp; 📄 upazilas.json &nbsp; 📄 unions.json`;
            loadStatusDiv.style.background = '#ffe6e5';
            loadStatusDiv.style.borderLeftColor = '#c7362b';
            selectionDisplay.innerText = 'JSON লোড ব্যর্থ, উপরের মেসেজ দেখুন';
            dynamicListArea.innerHTML = `<div class="error-msg">❌ ${error.message}</div>`;
        }
    }

    function populateDivisions() {
        divisionSelect.innerHTML = '<option value="">-- একটি বিভাগ নির্বাচন করুন --</option>';
        divisionsData.forEach(div => {
            const opt = document.createElement('option');
            opt.value = div.id;
            const displayName = div.bn_name ? `${div.name} (${div.bn_name})` : div.name;
            opt.textContent = displayName;
            divisionSelect.appendChild(opt);
        });
        document.getElementById('divisionCount').innerText = `মোট: ${divisionsData.length}টি`;
    }

    function getDistrictsByDivision(divisionId) {
        return districtsData.filter(d => d.division_id == divisionId);
    }

    function getUpazilasByDistrict(districtId) {
        return upazilasData.filter(u => u.district_id == districtId);
    }

    function getUnionsByUpazila(upazilaId) {
        return unionsData.filter(u => u.upazilla_id == upazilaId);
    }

    function resetDependents() {
        districtSelect.innerHTML = '<option value="">-- প্রথমে বিভাগ নির্বাচন করুন --</option>';
        districtSelect.disabled = true;
        upazilaSelect.innerHTML = '<option value="">-- প্রথমে জেলা নির্বাচন করুন --</option>';
        upazilaSelect.disabled = true;
        unionSelect.innerHTML = '<option value="">-- প্রথমে উপজেলা নির্বাচন করুন --</option>';
        unionSelect.disabled = true;
        document.getElementById('districtCount').innerText = '';
        document.getElementById('upazilaCount').innerText = '';
        document.getElementById('unionCount').innerText = '';
    }

    function updateDistricts(divisionId) {
        if (!divisionId) {
            resetDependents();
            return;
        }
        const filtered = getDistrictsByDivision(divisionId);
        districtSelect.innerHTML = '<option value="">-- একটি জেলা নির্বাচন করুন --</option>';
        filtered.forEach(dist => {
            const opt = document.createElement('option');
            opt.value = dist.id;
            const displayName = dist.bn_name ? `${dist.name} (${dist.bn_name})` : dist.name;
            opt.textContent = displayName;
            districtSelect.appendChild(opt);
        });
        districtSelect.disabled = false;
        document.getElementById('districtCount').innerText = `মোট: ${filtered.length}টি`;
        
        upazilaSelect.innerHTML = '<option value="">-- প্রথমে জেলা নির্বাচন করুন --</option>';
        upazilaSelect.disabled = true;
        unionSelect.innerHTML = '<option value="">-- প্রথমে উপজেলা নির্বাচন করুন --</option>';
        unionSelect.disabled = true;
        document.getElementById('upazilaCount').innerText = '';
        document.getElementById('unionCount').innerText = '';

        if (filtered.length) {
            const tags = filtered.map(d => `<span class="item-tag">${d.name} (${d.bn_name})</span>`).join('');
            dynamicListArea.innerHTML = `<div class="items-list">${tags}</div>`;
        } else {
            dynamicListArea.innerHTML = `<div class="items-list"><span class="item-tag">কোন জেলা নেই</span></div>`;
        }
    }

    function updateUpazilas(districtId) {
        if (!districtId) {
            upazilaSelect.innerHTML = '<option value="">-- প্রথমে জেলা নির্বাচন করুন --</option>';
            upazilaSelect.disabled = true;
            unionSelect.innerHTML = '<option value="">-- প্রথমে উপজেলা নির্বাচন করুন --</option>';
            unionSelect.disabled = true;
            document.getElementById('upazilaCount').innerText = '';
            return;
        }
        const filtered = getUpazilasByDistrict(districtId);
        upazilaSelect.innerHTML = '<option value="">-- একটি উপজেলা নির্বাচন করুন --</option>';
        filtered.forEach(up => {
            const opt = document.createElement('option');
            opt.value = up.id;
            const displayName = up.bn_name ? `${up.name} (${up.bn_name})` : up.name;
            opt.textContent = displayName;
            upazilaSelect.appendChild(opt);
        });
        upazilaSelect.disabled = false;
        document.getElementById('upazilaCount').innerText = `মোট: ${filtered.length}টি`;
        
        unionSelect.innerHTML = '<option value="">-- প্রথমে উপজেলা নির্বাচন করুন --</option>';
        unionSelect.disabled = true;
        document.getElementById('unionCount').innerText = '';

        if (filtered.length) {
            const tags = filtered.map(u => `<span class="item-tag">${u.name} (${u.bn_name})</span>`).join('');
            dynamicListArea.innerHTML = `<div class="items-list">${tags}</div>`;
        } else {
            dynamicListArea.innerHTML = `<div class="items-list"><span class="item-tag">কোন উপজেলা নেই</span></div>`;
        }
    }

    function updateUnions(upazilaId) {
        if (!upazilaId) {
            unionSelect.innerHTML = '<option value="">-- প্রথমে উপজেলা নির্বাচন করুন --</option>';
            unionSelect.disabled = true;
            document.getElementById('unionCount').innerText = '';
            return;
        }
        const filtered = getUnionsByUpazila(upazilaId);
        unionSelect.innerHTML = '<option value="">-- একটি ইউনিয়ন নির্বাচন করুন --</option>';
        filtered.forEach(uni => {
            const opt = document.createElement('option');
            opt.value = uni.id;
            const displayName = uni.bn_name ? `${uni.name} (${uni.bn_name})` : uni.name;
            opt.textContent = displayName;
            unionSelect.appendChild(opt);
        });
        unionSelect.disabled = false;
        document.getElementById('unionCount').innerText = `মোট: ${filtered.length}টি`;

        if (filtered.length) {
            const tags = filtered.map(u => `<span class="item-tag">${u.name} (${u.bn_name})</span>`).join('');
            dynamicListArea.innerHTML = `<div class="items-list">${tags}</div>`;
        } else {
            dynamicListArea.innerHTML = `<div class="items-list"><span class="item-tag">কোন ইউনিয়ন নেই</span></div>`;
        }
    }

    function showListForCurrentLevel() {
        const divisionId = divisionSelect.value;
        const districtId = districtSelect.value;
        const upazilaId = upazilaSelect.value;

        if (upazilaId && upazilaId !== "") {
            const unionsList = getUnionsByUpazila(upazilaId);
            if (unionsList.length) {
                const tags = unionsList.map(u => `<span class="item-tag">${u.name} (${u.bn_name})</span>`).join('');
                dynamicListArea.innerHTML = `<div class="items-list">${tags}</div>`;
            } else {
                dynamicListArea.innerHTML = `<div class="items-list"><span class="item-tag">কোন ইউনিয়ন পাওয়া যায়নি</span></div>`;
            }
        } else if (districtId && districtId !== "") {
            const upazilaList = getUpazilasByDistrict(districtId);
            if (upazilaList.length) {
                const tags = upazilaList.map(u => `<span class="item-tag">${u.name} (${u.bn_name})</span>`).join('');
                dynamicListArea.innerHTML = `<div class="items-list">${tags}</div>`;
            } else {
                dynamicListArea.innerHTML = `<div class="items-list"><span class="item-tag">কোন উপজেলা নেই</span></div>`;
            }
        } else if (divisionId && divisionId !== "") {
            const districtList = getDistrictsByDivision(divisionId);
            if (districtList.length) {
                const tags = districtList.map(d => `<span class="item-tag">${d.name} (${d.bn_name})</span>`).join('');
                dynamicListArea.innerHTML = `<div class="items-list">${tags}</div>`;
            } else {
                dynamicListArea.innerHTML = `<div class="items-list"><span class="item-tag">কোন জেলা নেই</span></div>`;
            }
        } else {
            dynamicListArea.innerHTML = `<div class="items-list"><span class="item-tag">বিভাগ নির্বাচন করলে তালিকা দেখাবে</span></div>`;
        }
    }

    function updateSelectionDisplay() {
        const divisionId = divisionSelect.value;
        const districtId = districtSelect.value;
        const upazilaId = upazilaSelect.value;
        const unionId = unionSelect.value;

        const division = divisionsData.find(d => d.id == divisionId);
        const district = districtsData.find(d => d.id == districtId);
        const upazila = upazilasData.find(u => u.id == upazilaId);
        const union = unionsData.find(u => u.id == unionId);

        let text = '';
        if (division) text += `বিভাগ: ${division.name} (${division.bn_name})`;
        if (district) text += ` → জেলা: ${district.name} (${district.bn_name})`;
        if (upazila) text += ` → উপজেলা: ${upazila.name} (${upazila.bn_name})`;
        if (union) text += ` → ইউনিয়ন: ${union.name} (${union.bn_name})`;
        selectionDisplay.innerText = text || 'কোনো নির্বাচন করা হয়নি';
    }

    // ইভেন্ট লিসেনার
    divisionSelect.addEventListener('change', (e) => {
        const divId = e.target.value;
        updateDistricts(divId);
        districtSelect.value = "";
        upazilaSelect.value = "";
        unionSelect.value = "";
        updateSelectionDisplay();
        showListForCurrentLevel();
    });
    districtSelect.addEventListener('change', (e) => {
        const distId = e.target.value;
        updateUpazilas(distId);
        upazilaSelect.value = "";
        unionSelect.value = "";
        updateSelectionDisplay();
        showListForCurrentLevel();
    });
    upazilaSelect.addEventListener('change', (e) => {
        const upId = e.target.value;
        updateUnions(upId);
        unionSelect.value = "";
        updateSelectionDisplay();
        showListForCurrentLevel();
    });
    unionSelect.addEventListener('change', () => {
        updateSelectionDisplay();
        const upId = upazilaSelect.value;
        if(upId) {
            const unionsHere = getUnionsByUpazila(upId);
            if(unionsHere.length){
                const tags = unionsHere.map(u => `<span class="item-tag">${u.name} (${u.bn_name})</span>`).join('');
                dynamicListArea.innerHTML = `<div class="items-list">${tags}</div>`;
            }
        }
    });

    // শুরু করুন
    loadAllData();
</script>
</body>
</html>
