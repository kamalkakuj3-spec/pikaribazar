<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>ড্যাশবোর্ড | প্রিমিয়াম প্যানেল</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  :root {
    --primary: #6c2bd9;
    --primary-dark: #4a1a9e;
    --primary-light: #a259f7;
    --primary-soft: #f0ebff;
    --accent: #f0c040;
    --bg: #f8f6ff;
    --white: #ffffff;
    --text: #1a1a2e;
    --text-light: #555;
    --card-shadow: 0 8px 20px rgba(108,43,217,0.08);
    --hover-shadow: 0 12px 28px rgba(108,43,217,0.12);
    --border-light: #ede5ff;
    --transition: all 0.25s ease;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Hind Siliguri',sans-serif;
    background: linear-gradient(135deg, #f5f3ff 0%, #ede8ff 100%);
    min-height:100vh;
  }
  
  /* Loading Screen */
  #loadingScreen {
    position:fixed; inset:0; background:linear-gradient(135deg,#1a0a3e,#4a1a9e,#6c2bd9);
    display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999;
  }
  .loading-spinner {
    width:50px; height:50px;
    border:3px solid rgba(255,255,255,0.2);
    border-top-color:#f0c040;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text { margin-top:15px; font-size:16px; font-weight:500; color:white; }
  
  /* Dashboard Header - 3D Animated Text */
  .dashboard-header {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 25px 20px;
    background: white;
    border-bottom: 1px solid var(--border-light);
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(135deg, #ffffff, #faf8ff);
  }
  
  .animated-shop-name {
    font-size: 24px;
    font-weight: 800;
    text-align: center;
    background: linear-gradient(135deg, var(--primary-dark), var(--primary-light), var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    position: relative;
    display: inline-block;
    animation: float3D 6s ease-in-out infinite;
    text-shadow: 0 2px 5px rgba(108,43,217,0.2);
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  
  .animated-shop-name:hover {
    animation: float3D 2s ease-in-out infinite;
    text-shadow: 0 0 15px rgba(108,43,217,0.5);
  }
  
  @keyframes float3D {
    0% { transform: translateY(0px) rotateX(0deg); text-shadow: 0 2px 5px rgba(108,43,217,0.2); }
    50% { transform: translateY(-8px) rotateX(5deg); text-shadow: 0 8px 15px rgba(108,43,217,0.4), 0 0 10px rgba(162,89,247,0.3); background: linear-gradient(135deg, var(--primary), var(--primary-light), var(--accent)); -webkit-background-clip: text; background-clip: text; }
    100% { transform: translateY(0px) rotateX(0deg); text-shadow: 0 2px 5px rgba(108,43,217,0.2); }
  }
  
  .dashboard-header h2 { perspective: 500px; transform-style: preserve-3d; }
  .content { padding:0 16px 100px; }
  
  /* Glass Button */
  .btn-glass {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(108,43,217,0.2);
    border-radius: 50px;
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 600;
    color: var(--primary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    transition: var(--transition);
    margin-bottom: 12px;
  }
  .btn-glass:hover {
    background: var(--primary);
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(108,43,217,0.25);
  }
  
  /* Gradient Button - Main Edit Button */
  .btn-gradient-main {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    border: none;
    border-radius: 50px;
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 600;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    transition: var(--transition);
    margin-bottom: 16px;
    box-shadow: 0 4px 12px rgba(108,43,217,0.25);
  }
  .btn-gradient-main:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(108,43,217,0.35);
  }
  
  /* ড্রপডাউন মেনু স্টাইল */
  .dropdown-container {
    position: relative;
    margin-bottom: 16px;
  }
  .dropdown-btn {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    border: none;
    border-radius: 50px;
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 600;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    transition: var(--transition);
    box-shadow: 0 4px 12px rgba(108,43,217,0.25);
    position: relative;
  }
  .dropdown-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(108,43,217,0.35);
  }
  .dropdown-icon-arrow {
    position: absolute;
    right: 20px;
    transition: transform 0.3s ease;
  }
  .dropdown-icon-arrow.open {
    transform: rotate(180deg);
  }
  .dropdown-menu {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    z-index: 100;
    margin-top: 8px;
    overflow: hidden;
    display: none;
    border: 1px solid var(--border-light);
  }
  .dropdown-menu.show {
    display: block;
    animation: fadeInDown 0.3s ease;
  }
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .dropdown-item {
    padding: 16px;
    border-bottom: 1px solid #f0ebff;
    cursor: pointer;
    transition: background 0.2s;
  }
  .dropdown-item:last-child {
    border-bottom: none;
  }
  .dropdown-item:hover {
    background: #f8f6ff;
  }
  .dropdown-item-title {
    font-weight: 700;
    color: var(--primary);
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .dropdown-item-status {
    font-size: 12px;
    color: var(--text-light);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .status-active { color: #2ecc71; }
  .status-expired { color: #dc2626; }
  .status-pending { color: #f0c040; }
  
  /* Shop ID inside dropdown */
  .shop-id-dropdown-item {
    background: linear-gradient(135deg, var(--primary-soft), #e8e0ff);
    border-top: 2px solid var(--primary-light);
  }
  .shop-id-dropdown-item .dropdown-item-title {
    color: var(--primary-dark);
  }
  .shop-id-value-dropdown {
    font-family: monospace;
    font-size: 12px;
    background: white;
    padding: 8px 12px;
    border-radius: 12px;
    word-break: break-all;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .copy-id-dropdown-btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 4px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
  }
  .copy-id-dropdown-btn:hover {
    background: var(--primary-dark);
  }
  
  /* Edit Options Container */
  .edit-options-container {
    display: none;
    margin-top: 10px;
    animation: fadeInUp 0.4s ease;
  }
  .edit-options-container.show { display: block; }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  /* Option Buttons */
  .option-btn {
    background: var(--white);
    border: 1px solid var(--border-light);
    border-radius: 16px;
    padding: 14px 18px;
    margin-bottom: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: var(--transition);
    width: 100%;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .option-btn:hover {
    border-color: var(--primary);
    background: var(--primary-soft);
    transform: translateX(5px);
  }
  .option-left { display: flex; align-items: center; gap: 12px; }
  .option-left i { font-size: 18px; color: var(--primary); width: 24px; }
  .toggle-icon { font-size: 14px; color: var(--primary-light); transition: transform 0.2s; }
  
  /* Content Panel */
  .option-content-panel {
    display: none;
    margin-top: 12px;
    margin-bottom: 20px;
    padding: 16px;
    background: #faf8ff;
    border-radius: 16px;
    border: 1px solid var(--border-light);
    animation: slideDown 0.3s ease;
  }
  .option-content-panel.show { display: block; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  /* Form Inputs */
  .input-group { margin-bottom: 16px; }
  .input-label { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; display: block; }
  .input-field {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e8e0ff;
    border-radius: 14px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--white);
    outline: none;
    transition: var(--transition);
  }
  .input-field:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(108,43,217,0.08);
  }
  textarea.input-field { resize: none; height: 80px; }
  
  /* Category Select Button */
  .category-select-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--white);
    border: 1.5px solid #e8e0ff;
    border-radius: 14px;
    padding: 12px 14px;
    cursor: pointer;
    transition: var(--transition);
  }
  .category-select-btn:hover {
    border-color: var(--primary);
    background: var(--primary-soft);
  }
  .category-selected-text { font-size: 14px; color: var(--text); }
  .category-placeholder { color: #aaa; font-size: 14px; }
  .category-arrow { color: var(--primary-light); font-size: 12px; }
  
  .selected-categories-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .selected-cat-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--primary-soft);
    padding: 5px 10px 5px 14px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 500;
    color: var(--primary-dark);
  }
  .selected-cat-chip i { cursor: pointer; font-size: 12px; color: #999; transition: color 0.2s; }
  .selected-cat-chip i:hover { color: #e74c3c; }
  
  /* Buttons */
  .btn-small-green {
    background: #22c55e;
    border: none;
    padding: 10px;
    border-radius: 40px;
    color: white;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: var(--transition);
    width: 100%;
  }
  .btn-small-green:hover { background: #16a34a; }
  .btn-small-purple {
    background: #6c63a0;
    border: none;
    padding: 10px;
    border-radius: 40px;
    color: white;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: var(--transition);
    width: 100%;
  }
  .btn-small-purple:hover { background: #5a5290; }
  
  /* Slider Item */
  .slider-item {
    background: #faf8ff;
    padding: 12px;
    border-radius: 16px;
    margin-bottom: 10px;
    border: 1px solid #e8e0ff;
  }
  .slider-image-preview {
    width: 60px;
    height: 50px;
    object-fit: cover;
    border-radius: 10px;
    background: #ede6ff;
  }
  .slider-input-group {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .slider-input-group input {
    flex: 1;
    padding: 8px 12px;
    border: 1.5px solid #e8e0ff;
    border-radius: 12px;
    font-size: 12px;
    font-family: monospace;
  }
  .slider-actions { display: flex; gap: 8px; margin-top: 8px; }
  .slider-save-btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 6px 16px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
  }
  .slider-save-btn:hover { background: var(--primary-dark); }
  .slider-delete-btn {
    background: #dc2626;
    color: white;
    border: none;
    padding: 6px 16px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
  }
  .slider-delete-btn:hover { background: #b91c1c; }
  .slider-info { font-size: 11px; color: #888; margin-top: 6px; }
  
  /* Ticker Preview */
  .ticker-preview {
    background: linear-gradient(135deg, #1f0a3b, #2d1a5e);
    padding: 12px;
    border-radius: 40px;
    margin-top: 12px;
    text-align: center;
    color: #f0eaff;
    font-size: 12px;
  }
  
  /* Status Badge */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .status-badge.approved { background: #e8faf0; color: #2ecc71; }
  
  /* Bottom Navigation */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border-light);
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
  }
  .nav-home {
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    border: none;
    padding: 12px 24px;
    border-radius: 50px;
    color: white;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  .nav-save {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    border: none;
    padding: 12px 28px;
    border-radius: 50px;
    color: white;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
  .nav-logout {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    border: none;
    padding: 12px 24px;
    border-radius: 50px;
    color: white;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  
  /* Success Toast Message - Popup Style */
  .success-toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    color: #1a1a2e;
    padding: 24px 28px;
    border-radius: 24px;
    font-weight: 500;
    font-size: 15px;
    z-index: 10001;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
    text-align: center;
    max-width: 90%;
    width: 360px;
    border: 2px solid var(--primary-light);
    animation: popupShow 0.3s ease forwards;
  }
  .success-toast i { font-size: 48px; color: #2ecc71; display: block; margin-bottom: 16px; }
  .success-toast .toast-title { font-size: 20px; font-weight: 800; color: var(--primary); margin-bottom: 12px; }
  .success-toast .toast-message { font-size: 14px; line-height: 1.6; color: #4a4a5a; }
  .success-toast .toast-close { margin-top: 20px; background: var(--primary); color: white; border: none; padding: 10px 24px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; }
  @keyframes popupShow {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
    to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  
  .error-toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: #e74c3c;
    color: white;
    padding: 12px 24px;
    border-radius: 60px;
    font-weight: 600;
    font-size: 14px;
    z-index: 10001;
    animation: fadeToast 2.5s ease forwards;
    white-space: nowrap;
  }
  .logout-toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: #2ecc71;
    color: white;
    padding: 14px 28px;
    border-radius: 60px;
    font-weight: 600;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 10001;
    animation: fadeToast 2.5s ease forwards;
    white-space: nowrap;
  }
  @keyframes fadeToast {
    0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
    15% { opacity: 1; transform: translateX(-50%) translateY(0); }
    85% { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
  }
</style>
</head>
<body>

<div id="loadingScreen"><div class="loading-spinner"></div><div class="loading-text">🚀 ড্যাশবোর্ড লোড হচ্ছে...</div></div>

<!-- Dashboard Header - 3D Animated Shop Name -->
<div class="dashboard-header">
    <h2><span class="animated-shop-name" id="headerShopName">ড্যাশবোর্ড</span></h2>
</div>

<div class="content" id="mainContent" style="display:none">
    
    <!-- Live Profile Button -->
    <button class="btn-glass" onclick="viewProfile()"><i class="fas fa-globe"></i> লাইভ প্রোফাইল দেখুন</button>
    
    <!-- Main Edit Button -->
    <button class="btn-gradient-main" id="mainEditBtn"><i class="fas fa-edit"></i> প্রোফাইল এডিট করুন</button>

    <!-- ========== ড্রপডাউন মেনু বাটন (সেন্টার বরাবর + ডান পাশে আইকন) ========== -->
    <div class="dropdown-container">
        <button class="dropdown-btn" id="adsDropdownBtn" onclick="toggleAdsDropdown()">
            <span><i class="fas fa-bullhorn"></i> 📢 আমার বিজ্ঞাপন সমূহ</span>
            <i class="fas fa-chevron-down dropdown-icon-arrow" id="dropdownArrow"></i>
        </button>
        <div class="dropdown-menu" id="adsDropdownMenu">
            <div id="dropdownContent">
                <div style="text-align:center; padding:20px;">🌀 লোড হচ্ছে...</div>
            </div>
        </div>
    </div>

    <!-- Edit Options Container -->
    <div id="editOptionsContainer" class="edit-options-container">
        
        <!-- Option 1: প্রোডাক্ট যোগ করুন -->
        <div>
            <div class="option-btn" onclick="toggleOptionPanel('addProductPanel')">
                <div class="option-left">
                    <i class="fas fa-plus-circle"></i>
                    <span>প্রোডাক্ট যোগ করুন</span>
                </div>
                <i class="fas fa-chevron-down toggle-icon" id="toggleIcon-addProductPanel"></i>
            </div>
            <div id="addProductPanel" class="option-content-panel">
                <div class="input-group"><label class="input-label">প্রোডাক্টের নাম *</label><input type="text" id="prodName" class="input-field" placeholder="যেমন: Premium Headphone"></div>
                <div class="input-group"><label class="input-label">দাম (৳)</label><input type="text" id="prodPrice" class="input-field" placeholder="যেমন: 2499"></div>
                <div class="input-group"><label class="input-label">Google Drive ইমেজ লিংক *</label><input type="text" id="prodImage" class="input-field" placeholder="https://drive.google.com/file/d/xxxxx/view"></div>
                <div class="input-group"><label class="input-label">বিবরণ</label><textarea id="prodDesc" class="input-field" rows="2" placeholder="প্রোডাক্টের বিবরণ..."></textarea></div>
                <button id="addProductBtn" class="btn-small-green">➕ প্রোডাক্ট যোগ করুন</button>
            </div>
        </div>
        
        <!-- Option 2: প্রোডাক্ট ম্যানেজমেন্ট -->
        <div>
            <div class="option-btn" onclick="toggleOptionPanel('productListPanel')">
                <div class="option-left">
                    <i class="fas fa-boxes"></i>
                    <span>প্রোডাক্ট ম্যানেজমেন্ট</span>
                </div>
                <i class="fas fa-chevron-down toggle-icon" id="toggleIcon-productListPanel"></i>
            </div>
            <div id="productListPanel" class="option-content-panel">
                <div id="productListContainer" style="max-height: 400px; overflow-y: auto;"></div>
            </div>
        </div>
        
        <!-- Option 3: চলন্ত লেখা (টিকার) -->
        <div>
            <div class="option-btn" onclick="toggleOptionPanel('tickerPanel')">
                <div class="option-left">
                    <i class="fas fa-comment-dots"></i>

function renderSelectedCategoriesChips() {
    const container = document.getElementById('selectedCategoriesContainer');
    const hiddenInput = document.getElementById('selectedCategoriesInput');
    if (!selectedCategoriesArray.length) {
        container.innerHTML = '';
        hiddenInput.value = '';
        return;
    }
    container.innerHTML = selectedCategoriesArray.map(cat => `
        <span class="selected-cat-chip">
            ${escapeHtml(cat)}

function removeCategory(category) {
    selectedCategoriesArray = selectedCategoriesArray.filter(c => c !== category);
    renderSelectedCategoriesChips();
    updateCategoryDisplayText();
}

function updateCategoryDisplayText() {
    const displaySpan = document.getElementById('selectedCategoryDisplay');
    if (selectedCategoriesArray.length === 0) {
        displaySpan.innerHTML = 'ক্যাটাগরি নির্বাচন করুন';
        displaySpan.classList.add('category-placeholder');
        displaySpan.classList.remove('category-selected-text');
    } else if (selectedCategoriesArray.length === 1) {
        displaySpan.innerHTML = selectedCategoriesArray[0];
        displaySpan.classList.remove('category-placeholder');
        displaySpan.classList.add('category-selected-text');
    } else {
        displaySpan.innerHTML = `${selectedCategoriesArray.length} টি ক্যাটাগরি সিলেক্টেড`;
        displaySpan.classList.remove('category-placeholder');
        displaySpan.classList.add('category-selected-text');
    }
}

function openCategoryPopup() {
    if (!categoriesList.length) { showErrorToast('ক্যাটাগরি লোড হয়নি!'); return; }
    const existingPopup = document.querySelector('.category-popup-overlay');
    if (existingPopup) existingPopup.remove();
    const overlay = document.createElement('div');
    overlay.className = 'category-popup-overlay';
    const categoriesHTML = categoriesList.map(cat => {
        const isSelected = selectedCategoriesArray.includes(cat);
        return `<div class="cat-check ${isSelected ? 'selected' : ''}" onclick="window.toggleCategoryInPopup('${cat.replace(/'/g, "\\'")}', this)">
            <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); window.toggleCategoryInPopup('${cat.replace(/'/g, "\\'")}', this.parentElement)">
            <label>${cat}</label>
        </div>`;
    }).join('');
    overlay.innerHTML = `<div class="category-popup"><div class="popup-header"><h3>📂 ক্যাটাগরি নির্বাচন করুন</h3><button class="popup-close" onclick="this.closest('.category-popup-overlay').remove()">✕</button></div>
        <div class="popup-body"><div class="category-grid">${categoriesHTML}</div></div>
        <div class="popup-footer"><button class="btn-clear" onclick="window.clearAllCategorySelection()">সব বাদ দিন</button>
        <button class="btn-apply" onclick="window.applyCategorySelection()">প্রয়োগ করুন</button></div></div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

window.toggleCategoryInPopup = function(category, element) {
    const index = selectedCategoriesArray.indexOf(category);
    if (index === -1) { selectedCategoriesArray.push(category); element.classList.add('selected'); const cb = element.querySelector('input'); if(cb) cb.checked = true; }
    else { selectedCategoriesArray.splice(index, 1); element.classList.remove('selected'); const cb = element.querySelector('input'); if(cb) cb.checked = false; }
};
window.clearAllCategorySelection = function() { selectedCategoriesArray = []; document.querySelectorAll('.cat-check').forEach(c => { c.classList.remove('selected'); const cb = c.querySelector('input'); if(cb) cb.checked = false; }); };
window.applyCategorySelection = function() { const popup = document.querySelector('.category-popup-overlay'); if(popup) popup.remove(); renderSelectedCategoriesChips(); updateCategoryDisplayText(); };

function extractYoutubeVideoId(url) {
    if (!url) return null;
    const patterns = [/(?:youtube\.com\/watch\?v=)([^&]+)/, /(?:youtu\.be\/)([^?]+)/, /(?:youtube\.com\/embed\/)([^?]+)/];
    for (let pattern of patterns) { const match = url.match(pattern); if (match) return match[1]; }
    return null;
}

    const selectedCategories = selectedCategoriesArray.join(',');
    if(!shopName) return showErrorToast('দোকানের নাম দিন!');
    if(!ownerName) return showErrorToast('মালিকের নাম দিন!');
    if(!area) return showErrorToast('ঠিকানা দিন!');
    if(!phone) return showErrorToast('মোবাইল নম্বর দিন!');
    const youtubeVideoId = extractYoutubeVideoId(youtubeUrl);
    const btn=document.getElementById('saveBtn'); 
    btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> সেভ হচ্ছে...'; btn.disabled = true;
    try {
        await db.ref('shops/'+currentShopId).update({ shopName, ownerName, description: document.getElementById('description').value.trim(), area, phone, whatsapp: document.getElementById('whatsapp').value.trim(), telegram: document.getElementById('telegram').value.trim(), youtube: youtubeUrl, youtubeVideoId: youtubeVideoId, category: selectedCategories, updatedAt: Date.now() });
        document.getElementById('headerShopName').innerHTML = shopName;
        showErrorToast('✅ তথ্য সংরক্ষণ হয়েছে!');
    } catch(e) { showErrorToast('সংরক্ষণ ব্যর্থ!'); }
    btn.innerHTML = '<i class="fas fa-save"></i> সেভ করুন'; btn.disabled = false;
}

async function loadProducts() {
    if(!currentShopId) return;
    const container=document.getElementById('productListContainer');
    container.innerHTML='<div style="text-align:center; padding:20px;">🌀 লোড হচ্ছে...</div>';
    try {
        const snap=await db.ref(`products/${currentShopId}`).once('value');
        allProducts=[];
        snap.forEach(child=>{ allProducts.push({id:child.key,...child.val()}); });
        allProducts.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
        renderProductList();
    } catch(e) { container.innerHTML='<div style="padding:20px;">⚠️ লোড করতে সমস্যা</div>'; }
}

function renderProductList() {
    const container=document.getElementById('productListContainer');
    if(!allProducts.length){ container.innerHTML='<div style="padding:20px; text-align:center;">✨ এখনও কোনো প্রোডাক্ট নেই</div>'; return; }
    container.innerHTML='';
    allProducts.forEach(prod=>{
        const imgUrl=getThumbUrl(prod.image);
        const div=document.createElement('div'); div.className='product-item';
        div.innerHTML=`<div class="product-row"><img class="product-img" src="${imgUrl}" onerror="this.src='https://via.placeholder.com/55x55/ede6ff/a855f7?text=No'"><div class="product-info"><div class="product-name">${escapeHtml(prod.name)}</div><div class="product-price">${prod.price?`৳ ${escapeHtml(prod.price)}`:'মূল্য নির্ধারিত হয়নি'}</div></div><div style="position:relative;"><button class="dot-btn" data-id="${prod.id}">⋮</button><div class="dropdown-menu" id="dropdown-${prod.id}"><div class="dropdown-item edit-name-item" data-id="${prod.id}">✏️ নাম এডিট</div><div class="dropdown-item edit-price-item" data-id="${prod.id}">💰 দাম এডিট</div><div class="dropdown-item edit-desc-item" data-id="${prod.id}">📝 বিবরণ এডিট</div><div class="dropdown-item delete-item" data-id="${prod.id}">🗑 ডিলিট</div></div></div></div><div class="edit-form" id="edit-form-${prod.id}"><input type="text" id="edit-name-${prod.id}" value="${escapeHtml(prod.name)}" placeholder="নাম"><input type="text" id="edit-price-${prod.id}" value="${escapeHtml(prod.price||'')}" placeholder="দাম"><textarea id="edit-desc-${prod.id}" rows="2" placeholder="বিবরণ">${escapeHtml(prod.desc||'')}</textarea><div class="edit-actions"><button class="save-edit-btn" data-id="${prod.id}" style="background:#22c55e; color:white;">সেভ</button><button class="cancel-edit-btn" data-id="${prod.id}" style="background:#6c63a0; color:white;">বাতিল</button></div></div>`;
        container.appendChild(div);
    });
    attachProductEvents();
}

function attachProductEvents() {
    document.querySelectorAll('.dot-btn').forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.stopPropagation(); const id=btn.dataset.id; document.querySelectorAll('.dropdown-menu').forEach(m=>m.classList.remove('show')); document.getElementById(`dropdown-${id}`).classList.toggle('show'); }); });
    document.querySelectorAll('.edit-name-item, .edit-price-item, .edit-desc-item').forEach(item=>{ item.addEventListener('click',()=>{ const id=item.dataset.id; document.getElementById(`edit-form-${id}`).classList.toggle('show'); document.getElementById(`dropdown-${id}`).classList.remove('show'); }); });
    document.querySelectorAll('.delete-item').forEach(item=>{ item.addEventListener('click',async()=>{ if(confirm('প্রোডাক্ট মুছতে চান?')){ await db.ref(`products/${currentShopId}/${item.dataset.id}`).remove(); showErrorToast('✅ প্রোডাক্ট মুছে ফেলা হয়েছে'); loadProducts(); } }); });
    document.querySelectorAll('.save-edit-btn').forEach(btn=>{ btn.addEventListener('click',async()=>{ const id=btn.dataset.id; const newName=document.getElementById(`edit-name-${id}`).value.trim(); if(!newName){ showErrorToast('নাম খালি রাখা যাবে না!'); return; } await db.ref(`products/${currentShopId}/${id}`).update({ name:newName, price:document.getElementById(`edit-price-${id}`).value.trim(), desc:document.getElementById(`edit-desc-${id}`).value.trim() }); showErrorToast('✅ প্রোডাক্ট আপডেট হয়েছে'); loadProducts(); }); });
    document.querySelectorAll('.cancel-edit-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ const id=btn.dataset.id; document.getElementById(`edit-form-${id}`).classList.remove('show'); }); });
}

async function addProduct() {
    let name=document.getElementById('prodName').value.trim();
    let price=document.getElementById('prodPrice').value.trim();
    let image=document.getElementById('prodImage').value.trim();
    let desc=document.getElementById('prodDesc').value.trim();
    if(!name || !image){ showErrorToast('নাম এবং ইমেজ লিংক দিন!'); return; }
    await db.ref(`products/${currentShopId}`).push({ name, price, image, desc, timestamp:Date.now() });
    showErrorToast('✅ প্রোডাক্ট যোগ হয়েছে!');
    document.getElementById('prodName').value=''; document.getElementById('prodPrice').value=''; document.getElementById('prodImage').value=''; document.getElementById('prodDesc').value='';
    loadProducts();
}
function getThumbUrl(url){ if(!url) return "https://via.placeholder.com/55x55/ede6ff/a855f7?text=No"; let f=null,m=url.match(/\/d\/([a-zA-Z0-9_-]+)/); if(m) f=m[1]; if(f) return `https://lh3.googleusercontent.com/d/${f}=w100`; return url; }

let slidesData = [];
async function loadSlides() {
    if(!currentShopId) return;
    const snap = await db.ref(`sliders/${currentShopId}`).once('value');
    slidesData = [];
    if(snap.exists()){ 
        const data = snap.val();
        if(Array.isArray(data)) { slidesData = data; }
        else if(typeof data === 'object') { slidesData = Object.values(data); }
    }
    if(!slidesData.length){ slidesData = []; }
    renderSliderList();
}

function renderSliderList() { 
    const container = document.getElementById('sliderListContainer'); 
    if(!container) return;
    if(slidesData.length === 0) {
        container.innerHTML = '<div class="slider-item" style="text-align:center; color:#888;">➕ নতুন স্লাইড যোগ করুন</div>';
        return;
    }
    container.innerHTML = ''; 
    slidesData.forEach((s, idx) => { 
        const imageUrl = s.image || '';
        const div = document.createElement('div'); 
        div.className = 'slider-item'; 
        div.innerHTML = `
            <div style="display:flex; gap:12px; align-items:flex-start; flex-wrap:wrap;">
                <img src="${getDriveUrl(imageUrl, 80)}" class="slider-image-preview" onerror="this.src='https://via.placeholder.com/60x50/ede6ff/a855f7?text=No+Image'">
                <div style="flex:1; min-width:200px;">
                    <div class="slider-input-group">
                        <input type="text" id="slide-input-${idx}" value="${escapeHtml(imageUrl)}" placeholder="Google Drive ইমেজ লিংক" style="flex:2;">
                    </div>
                    <div class="slider-actions">
                        <button class="slider-save-btn" onclick="saveSingleSlide(${idx})"><i class="fas fa-save"></i> সেভ করুন</button>
                        <button class="slider-delete-btn" onclick="deleteSingleSlide(${idx})"><i class="fas fa-trash"></i> ডিলিট</button>
                    </div>
                    <div class="slider-info">
                        <i class="fas fa-info-circle"></i> লিংক পরিবর্তন করে "সেভ করুন" বাটনে ক্লিক করুন
                    </div>
                </div>
            </div>
        `; 
        container.appendChild(div); 
    }); 
}

async function saveSingleSlide(index) {
    const inputField = document.getElementById(`slide-input-${index}`);
    if(!inputField) return;
    const newImageUrl = inputField.value.trim();
    if(!newImageUrl) { showErrorToast('⚠️ ইমেজ লিংক দিন!'); return; }
    slidesData[index] = { image: newImageUrl };
    await db.ref(`sliders/${currentShopId}`).set(slidesData);
    renderSliderList();
    showErrorToast('✅ স্লাইড আপডেট হয়েছে!');
}

async function deleteSingleSlide(index) {
    if(slidesData.length === 1) {
        if(confirm('শেষ স্লাইডটি ডিলিট করলে স্লাইডার খালি হয়ে যাবে। আপনি কি নিশ্চিত?')) {
            slidesData = [];
            await db.ref(`sliders/${currentShopId}`).set(slidesData);
            renderSliderList();
            showErrorToast('🗑️ স্লাইড ডিলিট হয়েছে!');
        }
        return;
    }
    if(confirm('এই স্লাইডটি ডিলিট করবেন?')) {
        slidesData.splice(index, 1);
        await db.ref(`sliders/${currentShopId}`).set(slidesData);
        renderSliderList();
        showErrorToast('🗑️ স্লাইড ডিলিট হয়েছে!');
    }
}

async function addNewSlide() { 
    slidesData.push({ image: "" }); 
    await db.ref(`sliders/${currentShopId}`).set(slidesData); 
    renderSliderList(); 
    showErrorToast('➕ নতুন স্লাইড যোগ হয়েছে! এখন লিংক দিন এবং সেভ করুন'); 
}

function getDriveUrl(url, w=100){ 
    if(!url) return "https://via.placeholder.com/60x50/ede6ff/a855f7?text=No+Image"; 
    let f=null;
    let m=url.match(/\/d\/([a-zA-Z0-9_-]+)/); 
    if(m) f=m[1];
    if(!f) { m=url.match(/id=([a-zA-Z0-9_-]+)/); if(m) f=m[1]; }
    if(f) return `https://lh3.googleusercontent.com/d/${f}=w${w}`;
    if(url.match(/\.(jpg|jpeg|png|gif|webp)/i)) return url;
    return "https://via.placeholder.com/60x50/ede6ff/a855f7?text=No+Image"; 
}

let tickerItems = [];
async function loadTicker() {
    if(!currentShopId) return;
    const snap = await db.ref(`tickers/${currentShopId}`).once('value');
    if(snap.exists()){ tickerItems = snap.val(); if(!tickerItems.length) tickerItems=[]; }
    else { tickerItems = []; }
    if(tickerItems.length===0){ tickerItems = ["✨ EXCLUSIVE DROP : AI COLLECTION","🚀 UP TO 40% OFF","💜 FREE SHIPPING","⚡ LIMITED EDITION"]; }
    document.getElementById('tickerInput').value=tickerItems.join(', ');
    updateTickerPreview(tickerItems);
}
function updateTickerPreview(items){ document.getElementById('tickerPreview').innerHTML=items.map(t=>`✨ ${escapeHtml(t)} ✨`).join(' • '); }
async function saveTicker(){ let val=document.getElementById('tickerInput').value.trim(); if(!val){ showErrorToast('কিছু লিখুন!'); return; } let items=val.includes(',')?val.split(',').map(s=>s.trim()).filter(s=>s):[val]; if(!items.length) return; await db.ref(`tickers/${currentShopId}`).set(items); updateTickerPreview(items); showErrorToast('টিকার আপডেট হয়েছে!'); }
async function resetTicker(){ const def=["✨ EXCLUSIVE DROP : AI COLLECTION","🚀 UP TO 40% OFF","💜 FREE SHIPPING","⚡ LIMITED EDITION"]; await db.ref(`tickers/${currentShopId}`).set(def); document.getElementById('tickerInput').value=def.join(', '); updateTickerPreview(def); showErrorToast('ডিফল্ট টিকার রিসেট হয়েছে!'); }

auth.onAuthStateChanged(async user=>{
    if(!user){ window.location.href = 'login.html'; return; }
    currentShopId=user.uid;
    const snap=await db.ref('shops/'+currentShopId).get();
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('mainContent').style.display='block';
    document.getElementById('saveWrap').style.display='flex';
    
    await loadCategoriesForDashboard();
    if(snap.exists()){
        currentShopData=snap.val();
        document.getElementById('headerShopName').innerHTML = currentShopData.shopName || 'দোকানের নাম';
        
        document.getElementById('shopName').value=currentShopData.shopName||'';
        document.getElementById('ownerName').value=currentShopData.ownerName||'';
        document.getElementById('description').value=currentShopData.description||'';
        document.getElementById('area').value=currentShopData.area||'';
        document.getElementById('phone').value=currentShopData.phone||'';
        document.getElementById('whatsapp').value=currentShopData.whatsapp||'';
        document.getElementById('telegram').value=currentShopData.telegram||'';
        document.getElementById('youtube').value=currentShopData.youtube||'';
        
        if(currentShopData.category){
            if(currentShopData.category.includes(',')){ selectedCategoriesArray = currentShopData.category.split(',').map(c => c.trim()).filter(c => c); }
            else { selectedCategoriesArray = [currentShopData.category]; }
            renderSelectedCategoriesChips(); updateCategoryDisplayText();
        }
        
        // ড্রপডাউন কন্টেন্ট লোড করুন (শপ আইডি সহ)
        await loadAdsDropdown();
    }
    loadProducts(); 
    await loadSlides(); 
    await loadTicker();
    document.getElementById('addProductBtn').addEventListener('click',addProduct);
    document.getElementById('addNewSlideBtn').addEventListener('click',addNewSlide);
    document.getElementById('updateTickerBtn').addEventListener('click',saveTicker);
    document.getElementById('resetTickerBtn').addEventListener('click',resetTicker);
});
