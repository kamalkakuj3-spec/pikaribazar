<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রোফাইল - দোকান তথ্য</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #6c2bd9;
            --primary-light: #a259f7;
            --bg: #f5f3ff;
            --white: #ffffff;
            --text: #1a1a2e;
            --text-light: #666;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .profile-card {
            background: var(--white);
            border-radius: 32px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(108,43,217,0.1);
        }
        .profile-header { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
        .avatar {
            width: 90px; height: 90px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            font-weight: 700;
            color: white;
        }
        .shop-info h2 { font-size: 28px; }
        .badge {
            background: rgba(108,43,217,0.1);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--primary);
            display: inline-block;
            margin-top: 8px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
            gap: 18px;
            margin: 24px 0;
        }
        .info-item {
            background: #faf8ff;
            padding: 14px;
            border-radius: 20px;
            border-left: 3px solid var(--primary);
        }
        .contact-buttons { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 16px; }
        .contact-btn {
            padding: 10px 24px;
            background: #f0ebff;
            border-radius: 40px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .contact-btn:hover { background: var(--primary); color: white; }
        
        .section-title {
            font-size: 24px;
            margin: 28px 0 20px;
            border-left: 4px solid var(--primary);
            padding-left: 16px;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }
        .product-card {
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { width: 100%; height: 220px; object-fit: cover; }
        .product-info { padding: 16px; }
        .product-name { font-weight: 700; font-size: 18px; }
        .product-price { color: var(--primary); font-weight: 800; font-size: 20px; margin: 8px 0; }
        
        .loading { text-align: center; padding: 40px; color: var(--primary); }
        .not-found { text-align: center; padding: 40px; background: white; border-radius: 24px; }
        
        @media (max-width: 700px) {
            .product-grid { grid-template-columns: 1fr; }
            .profile-header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="profileContent"></div>
    <div class="section-title"><i class="fas fa-store"></i> পণ্যসমূহ</div>
    <div class="product-grid" id="productGrid"><div class="loading">লোডিং...</div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA1CzQX9tgbLd46QfvCK6Rwqa0z9CRWoMs",
        authDomain: "agls-5bd4c.firebaseapp.com",
        databaseURL: "https://agls-5bd4c-default-rtdb.firebaseio.com/",
        projectId: "agls-5bd4c",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const shopId = urlParams.get('id');

    function getDriveImage(url) {
        if(!url) return "https://via.placeholder.com/400x200/eee/6c2bd9?text=No+Image";
        let match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if(match) return `https://lh3.googleusercontent.com/d/${match[1]}=w400`;
        return url;
    }

    async function loadShop() {
        if(!shopId) {
            document.getElementById('profileContent').innerHTML = `<div class="not-found"><i class="fas fa-link"></i><h3>দোকান আইডি দিন</h3><p>URL এ ?id=দোকান_আইডি যোগ করুন</p></div>`;
            return;
        }
        
        const shopSnap = await db.ref('shops/' + shopId).once('value');
        const shop = shopSnap.val();
        
        if(!shop || shop.status !== 'approved') {
            document.getElementById('profileContent').innerHTML = `<div class="not-found"><i class="fas fa-store-slash"></i><h3>দোকান পাওয়া যায়নি</h3></div>`;
            return;
        }
        
        let address = [];
        if(shop.thana) address.push(shop.thana);
        if(shop.district) address.push(shop.district);
        if(shop.division) address.push(shop.division);
        
        let contacts = '';
        if(shop.phone) contacts += `<a href="tel:${shop.phone}" class="contact-btn"><i class="fas fa-phone"></i> কল করুন</a>`;
        if(shop.whatsapp) contacts += `<a href="https://wa.me/88${shop.whatsapp.replace(/[^0-9]/g,'')}" class="contact-btn"><i class="fab fa-whatsapp"></i> WhatsApp</a>`;
        if(shop.telegram) contacts += `<a href="https://t.me/+${shop.telegram.replace(/[^0-9]/g,'')}" class="contact-btn"><i class="fab fa-telegram"></i> Telegram</a>`;
        
        document.getElementById('profileContent').innerHTML = `
            <div class="profile-card">
                <div class="profile-header">
                    <div class="avatar">${(shop.shopName?.charAt(0) || '?').toUpperCase()}</div>
                    <div class="shop-info">
                        <h2>${escapeHtml(shop.shopName || 'দোকানের নাম')}</h2>
                        <div class="badge"><i class="fas fa-check-circle"></i> ভেরিফাইড স্টোর</div>
                        <p style="margin-top: 8px;"><i class="fas fa-user"></i> ${escapeHtml(shop.ownerName || 'মালিকের নাম')}</p>
                    </div>
                </div>
                <div class="info-grid">
                    <div class="info-item"><i class="fas fa-map-marker-alt"></i> <strong>ঠিকানা</strong><br>${escapeHtml(address.join(', '))}${shop.area ? '<br>' + escapeHtml(shop.area) : ''}</div>
                    <div class="info-item"><i class="fas fa-phone"></i> <strong>মোবাইল</strong><br>${escapeHtml(shop.phone || '—')}</div>
                </div>
                ${shop.description ? `<div class="info-item" style="grid-column:span 2"><i class="fas fa-align-left"></i> <strong>দোকানের বিবরণ</strong><br>${escapeHtml(shop.description)}</div>` : ''}
                <div class="contact-buttons">${contacts}</div>
            </div>
        `;
        
        // Load products
        const productSnap = await db.ref('products/' + shopId).once('value');
        const grid = document.getElementById('productGrid');
        
        if(!productSnap.exists()) {
            grid.innerHTML = '<div class="not-found">📦 এখনো কোনো পণ্য নেই</div>';
            return;
        }
        
        let html = '';
        productSnap.forEach(child => {
            const p = child.val();
            html += `
                <div class="product-card">
                    <img class="product-img" src="${getDriveImage(p.image)}" onerror="this.src='https://via.placeholder.com/400x200/eee/6c2bd9?text=Error'">
                    <div class="product-info">
                        <div class="product-name">${escapeHtml(p.name)}</div>
                        <div class="product-price">৳ ${escapeHtml(p.price)}</div>
                        <div class="product-desc" style="color:#666; font-size:14px;">${escapeHtml((p.desc || '').substring(0, 80))}</div>
                    </div>
                </div>
            `;
        });
        grid.innerHTML = html;
    }
    
    function escapeHtml(str) {
        if(!str) return "";
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    loadShop();
</script>
</body>
</html>
