<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>প্রোভিশন | মার্চেন্ট ড্যাশবোর্ড</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f3ff;
            color: #1a1a2e;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* Header */
        .header {
            background: white;
            border-radius: 32px;
            padding: 16px 24px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: 0 4px 20px rgba(108,43,217,0.08);
        }
        .logo h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #6c2bd9, #a259f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .status-badge {
            background: #f0ebff;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: #6c2bd9;
        }
        
        /* Grid */
        .grid-2col {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 28px;
        }
        
        /* Cards */
        .card {
            background: white;
            border-radius: 32px;
            padding: 28px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(108,43,217,0.1);
        }
        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid #6c2bd9;
            padding-left: 14px;
        }
        
        /* Forms */
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #5a5a7a;
            margin-bottom: 6px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            font-family: inherit;
            font-size: 0.9rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #6c2bd9;
        }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        button {
            background: linear-gradient(135deg, #6c2bd9, #a259f7);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        button:hover { transform: scale(0.98); }
        
        .product-list {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 16px;
        }
        .product-item {
            background: #faf8ff;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .product-img-sm {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #2ecc71;
            color: white;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            z-index: 1000;
        }
        .toast.error { background: #e74c3c; }
        
        @media (max-width: 700px) {
            .grid-2col { grid-template-columns: 1fr; }
            .row-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-store"></i> PROVISION ড্যাশবোর্ড</h1>
        </div>
        <div class="status-badge" id="statusBadge">⏳ লোড হচ্ছে...</div>
    </div>

    <div class="grid-2col">
        <!-- LEFT: প্রোফাইল এডিট -->
        <div class="card">
            <h2><i class="fas fa-edit"></i> দোকানের তথ্য</h2>
            
            <div class="form-group">
                <label>দোকানের নাম *</label>
                <input type="text" id="shopName" placeholder="যেমন: মেসার্স উদয়ন ট্রেডার্স">
            </div>
            
            <div class="form-group">
                <label>মালিকের নাম *</label>
                <input type="text" id="ownerName" placeholder="আব্দুল করিম">
            </div>
            
            <div class="form-group">
                <label>বিভাগ *</label>
                <select id="divisionSelect">
                    <option value="">বিভাগ নির্বাচন করুন</option>
                </select>
            </div>
            
            <div class="form-group" id="districtGroup" style="display:none">
                <label>জেলা *</label>
                <select id="districtSelect">
                    <option value="">জেলা নির্বাচন করুন</option>
                </select>
            </div>
            
            <div class="form-group" id="thanaGroup" style="display:none">
                <label>উপজেলা/থানা *</label>
                <select id="thanaSelect">
                    <option value="">উপজেলা নির্বাচন করুন</option>
                </select>
            </div>
            
            <div class="form-group" id="areaGroup" style="display:none">
                <label>বিস্তারিত ঠিকানা *</label>
                <textarea id="area" rows="2" placeholder="হোল্ডিং নং, রোড, বাজার..."></textarea>
            </div>
            
            <div class="row-2">
                <div class="form-group">
                    <label>মোবাইল *</label>
                    <input type="tel" id="phone" placeholder="01xxxxxxxxx">
                </div>
                <div class="form-group">
                    <label>WhatsApp</label>
                    <input type="tel" id="whatsapp" placeholder="01xxxxxxxxx">
                </div>
            </div>
            
            <div class="form-group">
                <label>টেলিগ্রাম</label>
                <input type="tel" id="telegram" placeholder="01xxxxxxxxx">
            </div>
            
            <div class="form-group">
                <label>দোকানের বিবরণ</label>
                <textarea id="description" rows="2" placeholder="আপনার দোকান সম্পর্কে লিখুন..."></textarea>
            </div>
            
            <button id="saveProfileBtn"><i class="fas fa-save"></i> প্রোফাইল সংরক্ষণ</button>
        </div>

        <!-- RIGHT: পণ্য যোগ ও তালিকা -->
        <div class="card">
            <h2><i class="fas fa-plus-circle"></i> নতুন পণ্য যোগ করুন</h2>
            
            <div class="form-group">
                <label>পণ্যের নাম *</label>
                <input type="text" id="productName" placeholder="যেমন: প্রিমিয়াম শার্ট">
            </div>
            
            <div class="form-group">
                <label>মূল্য (৳) *</label>
                <input type="number" id="productPrice" placeholder="১২৫০">
            </div>
            
            <div class="form-group">
                <label>Google Drive ছবির লিংক *</label>
                <input type="text" id="productImage" placeholder="https://drive.google.com/file/d/XXXXXX/view">
                <small style="color:#6c2bd9; display:block; margin-top:5px;">🔹 গুগল ড্রাইভের শেয়ার লিংক দিন</small>
            </div>
            
            <div class="form-group">
                <label>পণ্যের বিবরণ</label>
                <textarea id="productDesc" rows="2" placeholder="বিস্তারিত লিখুন..."></textarea>
            </div>
            
            <button id="addProductBtn"><i class="fas fa-plus"></i> পণ্য যোগ করুন</button>

            <h2 style="margin-top: 28px;"><i class="fas fa-list"></i> আপনার পণ্যসমূহ</h2>
            <div id="productList" class="product-list">
                <div style="text-align:center; padding:20px;">লোডিং...</div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA1CzQX9tgbLd46QfvCK6Rwqa0z9CRWoMs",
        authDomain: "agls-5bd4c.firebaseapp.com",
        databaseURL: "https://agls-5bd4c-default-rtdb.firebaseio.com/",
        projectId: "agls-5bd4c",
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentUser = null;
    let divisionsData = [];

    function showToast(msg, isError = false) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        if (isError) toast.classList.add('error');
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function getDriveThumb(url) {
        if (!url) return '';
        let match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (match) return `https://lh3.googleusercontent.com/d/${match[1]}=w100`;
        return url;
    }

    // Load divisions from JSON
    async function loadDivisions() {
        try {
            let res = await fetch('https://raw.githubusercontent.com/kamalkakuj3-spec/my-app/main/divisions.json');
            let data = await res.json();
            divisionsData = data.divisions;
            let select = document.getElementById('divisionSelect');
            select.innerHTML = '<option value="">বিভাগ নির্বাচন করুন</option>';
            divisionsData.forEach(d => {
                select.innerHTML += `<option value="${d.name}">${d.name}</option>`;
            });
        } catch(e) {
            console.error(e);
            showToast('বিভাগ লোড ব্যর্থ!', true);
        }
    }

    function onDivisionChange() {
        let divName = document.getElementById('divisionSelect').value;
        let districtSel = document.getElementById('districtSelect');
        districtSel.innerHTML = '<option value="">জেলা নির্বাচন করুন</option>';
        document.getElementById('districtGroup').style.display = 'none';
        document.getElementById('thanaGroup').style.display = 'none';
        document.getElementById('areaGroup').style.display = 'none';
        if (!divName) return;
        let division = divisionsData.find(d => d.name === divName);
        if (division && division.districts) {
            division.districts.forEach(dist => {
                districtSel.innerHTML += `<option value="${dist.name}">${dist.name}</option>`;
            });
            document.getElementById('districtGroup').style.display = 'block';
        }
    }

    function onDistrictChange() {
        let divName = document.getElementById('divisionSelect').value;
        let distName = document.getElementById('districtSelect').value;
        let thanaSel = document.getElementById('thanaSelect');
        thanaSel.innerHTML = '<option value="">উপজেলা নির্বাচন করুন</option>';
        document.getElementById('thanaGroup').style.display = 'none';
        document.getElementById('areaGroup').style.display = 'none';
        if (!divName || !distName) return;
        let division = divisionsData.find(d => d.name === divName);
        let district = division?.districts.find(d => d.name === distName);
        if (district && district.upazilas) {
            district.upazilas.forEach(up => {
                thanaSel.innerHTML += `<option value="${up}">${up}</option>`;
            });
            document.getElementById('thanaGroup').style.display = 'block';
        } else {
            thanaSel.innerHTML += `<option value="সদর">সদর উপজেলা</option>`;
            document.getElementById('thanaGroup').style.display = 'block';
        }
    }

    function onThanaChange() {
        if (document.getElementById('thanaSelect').value) {
            document.getElementById('areaGroup').style.display = 'block';
        }
    }

    // Load shop data
    async function loadShopData() {
        if (!currentUser) return;
        let snap = await db.ref('shops/' + currentUser.uid).once('value');
        let data = snap.val();
        if (data) {
            document.getElementById('shopName').value = data.shopName || '';
            document.getElementById('ownerName').value = data.ownerName || '';
            document.getElementById('phone').value = data.phone || '';
            document.getElementById('whatsapp').value = data.whatsapp || '';
            document.getElementById('telegram').value = data.telegram || '';
            document.getElementById('area').value = data.area || '';
            document.getElementById('description').value = data.description || '';
            
            let badge = document.getElementById('statusBadge');
            if (data.status === 'approved') badge.innerHTML = '✅ অনুমোদিত দোকান';
            else badge.innerHTML = '⏳ পেন্ডিং (অ্যাডমিন এপ্রুভের অপেক্ষায়)';

            if (data.division) {
                document.getElementById('divisionSelect').value = data.division;
                onDivisionChange();
                setTimeout(() => {
                    if (data.district) {
                        document.getElementById('districtSelect').value = data.district;
                        onDistrictChange();
                        setTimeout(() => {
                            if (data.thana) {
                                document.getElementById('thanaSelect').value = data.thana;
                                onThanaChange();
                            }
                        }, 100);
                    }
                }, 100);
            }
        }
    }

    // Save profile
    async function saveProfile() {
        if (!currentUser) return;
        let shopName = document.getElementById('shopName').value.trim();
        let ownerName = document.getElementById('ownerName').value.trim();
        let division = document.getElementById('divisionSelect').value;
        let district = document.getElementById('districtSelect').value;
        let thana = document.getElementById('thanaSelect').value;
        let area = document.getElementById('area').value.trim();
        let phone = document.getElementById('phone').value.trim();

        if (!shopName || !ownerName || !division || !district || !thana || !area || !phone) {
            showToast('সব তথ্য পূরণ করুন!', true);
            return;
        }

        let btn = document.getElementById('saveProfileBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> সেভ হচ্ছে...';
        btn.disabled = true;
        try {
            await db.ref('shops/' + currentUser.uid).update({
                shopName, ownerName, division, district, thana, area, phone,
                whatsapp: document.getElementById('whatsapp').value.trim(),
                telegram: document.getElementById('telegram').value.trim(),
                description: document.getElementById('description').value.trim(),
                updatedAt: Date.now()
            });
            showToast('প্রোফাইল সেভ হয়েছে!');
            loadShopData();
        } catch(e) {
            showToast(e.message, true);
        } finally {
            btn.innerHTML = '<i class="fas fa-save"></i> প্রোফাইল সংরক্ষণ';
            btn.disabled = false;
        }
    }

    // Add product
    async function addProduct() {
        if (!currentUser) return;
        let name = document.getElementById('productName').value.trim();
        let price = document.getElementById('productPrice').value.trim();
        let image = document.getElementById('productImage').value.trim();
        let desc = document.getElementById('productDesc').value.trim();

        if (!name || !price || !image) {
            showToast('নাম, মূল্য ও ছবির লিংক দিন!', true);
            return;
        }

        let btn = document.getElementById('addProductBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> যোগ হচ্ছে...';
        btn.disabled = true;
        try {
            await db.ref(`products/${currentUser.uid}`).push({
                name, price, image, desc, timestamp: Date.now()
            });
            showToast('পণ্য যোগ হয়েছে!');
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productImage').value = '';
            document.getElementById('productDesc').value = '';
            loadProducts();
        } catch(e) {
            showToast(e.message, true);
        } finally {
            btn.innerHTML = '<i class="fas fa-plus"></i> পণ্য যোগ করুন';
            btn.disabled = false;
        }
    }

    // Load products
    async function loadProducts() {
        if (!currentUser) return;
        let listDiv = document.getElementById('productList');
        listDiv.innerHTML = '<div style="text-align:center;">লোডিং পণ্য...</div>';
        let snap = await db.ref(`products/${currentUser.uid}`).once('value');
        if (!snap.exists()) {
            listDiv.innerHTML = '<div style="text-align:center; color:#aaa;">📦 এখনো কোনো পণ্য যোগ করেননি</div>';
            return;
        }
        let html = '';
        snap.forEach(child => {
            let p = child.val();
            let img = getDriveThumb(p.image);
            html += `
                <div class="product-item">
                    <img class="product-img-sm" src="${img}" onerror="this.src='https://via.placeholder.com/50'">
                    <div>
                        <strong>${escapeHtml(p.name)}</strong><br>
                        <small style="color:#6c2bd9;">৳ ${escapeHtml(p.price)}</small>
                        <div style="font-size:12px; color:#666;">${escapeHtml((p.desc || '').substring(0, 50))}</div>
                    </div>
                </div>
            `;
        });
        listDiv.innerHTML = html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    // Event listeners
    document.getElementById('divisionSelect').addEventListener('change', onDivisionChange);
    document.getElementById('districtSelect').addEventListener('change', onDistrictChange);
    document.getElementById('thanaSelect').addEventListener('change', onThanaChange);
    document.getElementById('saveProfileBtn').addEventListener('click', saveProfile);
    document.getElementById('addProductBtn').addEventListener('click', addProduct);

    // Auth
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            await loadDivisions();
            await loadShopData();
            await loadProducts();
        } else {
            window.location.href = 'login.html';
        }
    });
</script>
</body>
</html>
