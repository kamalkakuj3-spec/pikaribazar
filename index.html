<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>পাইকারি বাজার | পাইকারি দোকানের সেরা ঠিকানা</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #6c2bd9;
    --primary-dark: #4a1a9e;
    --primary-light: #a259f7;
    --accent: #f0c040;
    --bg: #f5f3ff;
    --text: #1a1a2e;
    --text-light: #666;
    --shadow: 0 4px 20px rgba(108,43,217,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { 
    font-family:'Hind Siliguri',sans-serif; 
    background:var(--bg); 
    min-height:100vh; 
    overflow-x:hidden;
    padding-bottom: 80px;
}

/* NO INTERNET */
#noInternet { display:none; position:fixed; inset:0; background:linear-gradient(160deg,#1a0a3e,#6c2bd9); flex-direction:column; align-items:center; justify-content:center; z-index:9999; padding:40px; text-align:center; }
.ni-icon { font-size:80px; margin-bottom:20px; animation:bounce 2s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.ni-title { font-size:22px; font-weight:700; color:white; margin-bottom:10px; }
.ni-msg   { font-size:14px; color:rgba(255,255,255,0.7); margin-bottom:28px; line-height:1.7; }
.ni-btn   { padding:13px 36px; background:var(--accent); color:#1a0a3e; border:none; border-radius:99px; font-size:15px; font-weight:700; font-family:'Hind Siliguri',sans-serif; cursor:pointer; }

/* SPLASH */
#splash { position:fixed; inset:0; background:linear-gradient(160deg,#1a0a3e,#6c2bd9,#a259f7); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9998; animation:splashOut 0.5s ease 2s forwards; }
@keyframes splashOut { to{opacity:0;pointer-events:none} }
.sp-logo { width:80px; height:80px; background:white; border-radius:22px; display:flex; align-items:center; justify-content:center; font-size:40px; margin-bottom:15px; box-shadow:0 10px 40px rgba(0,0,0,0.3); animation:popIn 0.7s cubic-bezier(.34,1.56,.64,1) 0.3s both; }
@keyframes popIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
.sp-title { font-size:28px; font-weight:700; color:white; margin-bottom:4px; }
.sp-sub   { font-size:11px; color:rgba(255,255,255,0.6); letter-spacing:3px; }
.sp-bar-wrap { width:140px; height:3px; background:rgba(255,255,255,0.2); border-radius:99px; margin-top:35px; overflow:hidden; animation:fadeIn 0.4s 1s both; }
.sp-bar { height:100%; background:var(--accent); border-radius:99px; animation:fillBar 2s ease 1s forwards; width:0; }
@keyframes fillBar { 0%{width:0} 40%{width:60%} 100%{width:100%} }
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }

/* APP */
#app { opacity:0; animation:appShow 0.3s ease 2.5s forwards; background:var(--bg); }
@keyframes appShow { to{opacity:1} }

.search-section {
    padding: 0 16px;
    margin-bottom: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    transition: transform 0.3s ease;
    background: var(--bg);
    padding-top: 10px;
}
.search-section.hide {
    transform: translateY(-100%);
}
.search-wrap {
    position: relative;
}
.search-input {
    width: 100%;
    padding: 9px 20px 9px 22px;
    font-size: 15px;
    font-family: 'Hind Siliguri', sans-serif;
    border: none;
    border-radius: 12px;
    background: white;
    color: var(--text);
    box-shadow: 0 3px 12px rgba(108,43,217,0.15);
    outline: none;
}
.search-input::placeholder { color: #aaa; }

.marquee-container { 
    margin: 0 16px 16px;
    padding: 2px 12px;
    background: linear-gradient(90deg, var(--primary), var(--primary-light));
    border-radius: 12px;
    box-shadow: 0 3px 12px rgba(108,43,217,0.15);
    color: white;
}
marquee { 
    font-size: 14px;
    letter-spacing: 0.5px;
    font-weight: 500;
}
.marquee-disabled { 
    text-align: center; 
    font-size: 14px;
    opacity: 0.8;
    background: #ccc;
    color: #666;
    padding: 2px 12px;
    border-radius: 12px;
}

.slider-section { margin:0 16px 12px; }
.slider-box {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 18px rgba(108,43,217,0.18);
    background: linear-gradient(135deg,#6c2bd9,#a259f7);
    height: 150px;
}
.slider-track { display: flex; height: 100%; transition: transform 0.45s cubic-bezier(.4,0,.2,1); }
.slide-item { min-width: 100%; height: 100%; flex-shrink: 0; position: relative; cursor: pointer; }
.slide-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
.slide-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-size: 35px; }
.sl-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.85); border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 18px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.2); line-height: 1; }
.sl-prev { left: 6px; }
.sl-next { right: 6px; }
.sl-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 10; }
.sl-dot { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.3s; width: 6px; }
.sl-dot.active { width: 18px; background: white; }

.add-banner { margin:0 16px 12px; background:linear-gradient(135deg,#1a0a3e,#6c2bd9); border-radius:16px; padding:14px; display:flex; align-items:center; gap:12px; box-shadow:var(--shadow); text-decoration:none; }
.ab-icon  { width:42px; height:42px; background:var(--accent); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.ab-title { font-size:14px; font-weight:700; color:white; margin-bottom:2px; }
.ab-sub   { font-size:11px; color:rgba(255,255,255,0.7); }
.ab-arrow { font-size:18px; color:var(--accent); margin-left:auto; }

.filter-wrap { padding:0 16px; margin-bottom:6px; }
.filter-step { background:white; border-radius:14px; padding:12px 14px; box-shadow:var(--shadow); margin-bottom:8px; border:1.5px solid rgba(108,43,217,0.06); }
.fs-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.fs-num { width:24px; height:24px; border-radius:50%; background:var(--primary); color:white; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.fs-num.done { background:#2ecc71; }
.fs-title { font-size:13px; font-weight:700; color:var(--text); }
.fs-sel   { font-size:11px; color:var(--primary); font-weight:600; margin-left:auto; }
.chip-scroll { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
.chip-scroll::-webkit-scrollbar { display:none; }
.f-chip { padding:6px 14px; border-radius:99px; font-size:12px; font-family:'Hind Siliguri',sans-serif; font-weight:500; white-space:nowrap; cursor:pointer; border:2px solid #e0d9f7; background:white; color:var(--text); transition:all 0.2s; flex-shrink:0; }
.f-chip.active { background:var(--primary); color:white; border-color:var(--primary); box-shadow:0 4px 12px rgba(108,43,217,0.3); }
.hidden { display:none; }
.reset-btn { width:100%; padding:8px; background:#f0ebff; color:var(--primary); border:none; border-radius:12px; font-size:13px; font-weight:600; font-family:'Hind Siliguri',sans-serif; cursor:pointer; margin-bottom:8px; display:none; }

/* এডমিনের ভিডিও গ্রিড */
.video-grid-section {
    margin: 0 16px 20px;
}
.video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
}
.video-card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: all 0.3s ease;
    animation: tileIn 0.4s ease both;
}
.video-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(108,43,217,0.2);
}
.video-card video {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    display: block;
    background: #000;
}
.video-card-info {
    padding: 12px 14px;
}
.video-card-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 4px;
}
.video-card-desc {
    font-size: 12px;
    color: var(--text-light);
    line-height: 1.4;
}
.video-grid-empty {
    text-align: center;
    padding: 40px;
    background: white;
    border-radius: 20px;
    color: var(--text-light);
}
.video-grid-empty-icon {
    font-size: 48px;
    margin-bottom: 12px;
}

/* ========== দোকানের ভিডিও কার্ড (সেন্টার অ্যালাইন) ========== */
.shop-video-card {
    margin: 0 16px 12px;
    background: transparent;
    animation: tileIn 0.4s ease both;
}
.video-player-card {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 18px rgba(108,43,217,0.18);
    background: linear-gradient(135deg, #ffffff, #f8f6ff);
    border: 1px solid rgba(108,43,217,0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.video-player-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(108,43,217,0.25);
}
.shop-video {
    width: 100%;
    aspect-ratio: 16 / 9;
    border: none;
    background: #000;
    display: block;
}
.no-video {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: linear-gradient(135deg, #1a0a3e, #6c2bd9);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
    text-align: center;
}
.shop-video-info {
    padding: 16px 12px;
    background: transparent;
    text-align: center;
}
.shop-video-name {
    font-size: 22px;
    font-weight: 800;
    color: var(--primary);
    margin-bottom: 10px;
    cursor: pointer;
    transition: color 0.2s;
    display: block;
    text-align: center;
    line-height: 1.3;
}
.shop-video-name:hover {
    color: var(--primary-dark);
    text-decoration: underline;
}
.shop-video-category {
    font-size: 14px;
    font-weight: 600;
    color: var(--primary-light);
    margin-bottom: 10px;
    text-align: center;
    background: #f0ebff;
    display: inline-block;
    padding: 5px 20px;
    border-radius: 99px;
}
.shop-video-address {
    font-size: 13px;
    color: var(--text-light);
    text-align: center;
    margin-top: 5px;
    line-height: 1.4;
    display: block;
}
@keyframes tileIn {
    from { transform: translateY(15px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.empty { text-align:center; padding:50px 20px; color:var(--text-light); }
.empty-icon  { font-size:50px; margin-bottom:12px; }
.empty-title { font-size:16px; font-weight:600; color:var(--text); margin-bottom:6px; }
.empty-sub   { font-size:13px; }

/* BOTTOM NAV */
.bottom-nav {
    position: fixed;
    bottom: 5px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 35px);
    max-width: 430px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(15px);
    border-radius: 24px;
    display: flex;
    justify-content: space-around;
    padding: 2px 0;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.10);
    z-index: 1000;
}
.nav-item {
    text-align: center;
    font-size: 11px;
    color: #666;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    background: transparent;
    border: none;
    font-family: 'Hind Siliguri', sans-serif;
    flex: 1;
    padding: 4px 0;
}
.nav-item .icon {
    display: block;
    font-size: 20px;
    margin-bottom: 2px;
}
.nav-item.active {
    color: var(--primary);
    transform: translateY(-3px);
}
.nav-item:active {
    transform: scale(0.95);
}

/* ক্যাটাগরি পপআপ */
.category-popup-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(5px);
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.3s ease;
}
.category-popup {
    background: white;
    border-radius: 28px;
    width: 90%;
    max-width: 400px;
    max-height: 80vh;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.popup-header {
    padding: 18px 20px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.popup-header h3 {
    font-size: 18px;
    font-weight: 700;
}
.popup-close {
    background: rgba(255,255,255,0.2);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
}
.popup-body {
    padding: 16px;
    max-height: 55vh;
    overflow-y: auto;
}
.category-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}
.cat-check {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: #f5f3ff;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1.5px solid transparent;
}
.cat-check.selected {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
}
.cat-check input {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: var(--primary);
}
.cat-check label {
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
}
.popup-footer {
    padding: 16px 20px;
    border-top: 1px solid #eee;
    display: flex;
    gap: 12px;
}
.popup-footer button {
    flex: 1;
    padding: 12px;
    border-radius: 99px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Hind Siliguri', sans-serif;
}
.btn-apply {
    background: var(--primary);
    color: white;
    border: none;
}
.btn-clear {
    background: #f0ebff;
    color: var(--primary);
    border: none;
}
</style>
</head>
<body>

<div id="noInternet">
    <div class="ni-icon">📵</div>
    <div class="ni-title">ইন্টারনেট নেই!</div>
    <div class="ni-msg">আপনার ইন্টারনেট সংযোগ বন্ধ।<br>চেক করুন এবং আবার চেষ্টা করুন।</div>
    <button class="ni-btn" onclick="window.checkNet()">🔄 আবার চেষ্টা করুন</button>
</div>

<div id="splash">
    <div class="sp-logo">🏪</div>
    <div class="sp-title">পাইকারি বাজার</div>
    <div class="sp-sub">PAIKARI BAZAR</div>
    <div class="sp-bar-wrap"><div class="sp-bar"></div></div>
</div>

<div id="app">

    <div class="search-section" id="searchSection">
        <div class="search-wrap">
            <input class="search-input" type="text" id="searchInput" placeholder="দোকানের নাম বা এলাকা খুঁজুন..." oninput="window.applyFilters()">
        </div>
    </div>

    <div class="slider-section" id="sliderSection" style="display:none">
        <div class="slider-box">
            <div class="slider-track" id="sliderTrack"></div>
            <button class="sl-btn sl-prev" onclick="window.prevSlide()">‹</button>
            <button class="sl-btn sl-next" onclick="window.nextSlide()">›</button>
            <div class="sl-dots" id="sliderDots"></div>
        </div>
    </div>

    <div id="marqueeSection"></div>

    <a href="register.html" class="add-banner">
        <div class="ab-icon">🏪</div>
        <div>
            <div class="ab-title">আপনার দোকান যোগ করুন</div>
            <div class="ab-sub">বিনামূল্যে প্রোফাইল তৈরি করুন</div>
        </div>
        <div class="ab-arrow">→</div>
    </a>

    <!-- FILTERS -->
    <div class="filter-wrap">
        <button class="reset-btn" id="resetBtn" onclick="window.resetFilters()">🔄 ফিল্টার রিসেট করুন</button>

        <div class="filter-step" id="step1">
            <div class="fs-header">
                <div class="fs-num" id="num1">১</div>
                <div class="fs-title">বিভাগ বাছাই করুন</div>
                <div class="fs-sel" id="sel1"></div>
            </div>
            <div class="chip-scroll" id="divisionChips"></div>
        </div>

        <div class="filter-step hidden" id="step2">
            <div class="fs-header">
                <div class="fs-num" id="num2">২</div>
                <div class="fs-title">জেলা বাছাই করুন</div>
                <div class="fs-sel" id="sel2"></div>
            </div>
            <div class="chip-scroll" id="districtChips"></div>
        </div>

        <div class="filter-step hidden" id="step3">
            <div class="fs-header">
                <div class="fs-num" id="num3">৩</div>
                <div class="fs-title">থানা/উপজেলা বাছাই করুন</div>
                <div class="fs-sel" id="sel3"></div>
            </div>
            <div class="chip-scroll" id="thanaChips"></div>
        </div>

        <div class="filter-step hidden" id="step4">
            <div class="fs-header">
                <div class="fs-num" id="num4">৪</div>
                <div class="fs-title">ক্যাটাগরি বাছাই করুন</div>
                <div class="fs-sel" id="sel4"></div>
            </div>
            <div class="chip-scroll" id="categoryChips"></div>
        </div>
    </div>

    <!-- এডমিনের ভিডিও গ্রিড -->
    <div class="video-grid-section" id="videoGridSection">
        <div class="video-grid" id="videoGrid"></div>
    </div>

    <!-- দোকানের লিস্ট -->
    <div id="shopList"></div>

</div>

<!-- নেভিগেশন বার -->
<div class="bottom-nav">
    <button class="nav-item" data-page="category"><span class="icon">📂</span>ক্যাটাগরি</button>
    <button class="nav-item" data-page="searchFocus"><span class="icon">🔍</span>খুঁজুন</button>
    <button class="nav-item" data-page="profile"><span class="icon">👤</span>প্রোফাইল</button>
    <button class="nav-item" data-page="help"><span class="icon">❓</span>সাহায্য</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
// Firebase configuration
firebase.initializeApp({
    apiKey: "AIzaSyA1CzQX9tgbLd46QfvCK6Rwqa0z9CRWoMs",
    authDomain: "agls-5bd4c.firebaseapp.com",
    databaseURL: "https://agls-5bd4c-default-rtdb.firebaseio.com/",
    projectId: "agls-5bd4c",
});
const auth = firebase.auth();
const db = firebase.database();

// ========== JSON URL ==========
const DIVISIONS_JSON_URL = 'https://raw.githubusercontent.com/kamalkakuj3-spec/my-app/main/divisions.json';
const CATEGORIES_JSON_URL = 'https://raw.githubusercontent.com/kamalkakuj3-spec/my-app/main/categories.json';

let geoData = [];
let categoriesList = [];
let allShops = [];
let selectedDivision = '';
let selectedDistrict = '';
let selectedThana = '';
let selectedCategories = [];
let allVideos = [];

let videoObservers = [];
let curSlide = 0;
let slTimer = null;
let slData = [];

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// ========== ক্যাটাগরি JSON লোড ==========
async function loadCategories() {
    try {
        const res = await fetch(CATEGORIES_JSON_URL);
        categoriesList = await res.json();

window.selectDivision = function(div) {
    selectedDivision = div;
    selectedDistrict = '';
    selectedThana = '';
    
    document.querySelectorAll('#divisionChips .f-chip').forEach(c => {
        const isActive = c.textContent === (div || 'সব বিভাগ');
        if (isActive) c.classList.add('active');
        else c.classList.remove('active');
    });
    
    const sel1Span = document.getElementById('sel1');
    if (sel1Span) sel1Span.textContent = div ? `✅ ${div}` : '';
    
    const num1Div = document.getElementById('num1');
    if (num1Div) num1Div.className = div ? 'fs-num done' : 'fs-num';
    
    const resetBtn = document.getElementById('resetBtn');
    if (resetBtn) resetBtn.style.display = div ? 'block' : 'none';
    
    if (div) {
        const division = geoData.find(d => d.name === div);
        const districts = division ? division.districts : [];
        const districtContainer = document.getElementById('districtChips');
        districtContainer.innerHTML = `<div class="f-chip active" onclick="window.selectDistrict('')">সব জেলা</div>`;
        
        districts.forEach(d => {
            const chip = document.createElement('div');

            chip.textContent = d.name;
            chip.onclick = () => window.selectDistrict(d.name);
            districtContainer.appendChild(chip);
        });

        document.getElementById('step3')?.classList.add('hidden');
        document.getElementById('step4')?.classList.add('hidden');
        
        if (document.getElementById('sel2')) document.getElementById('sel2').textContent = '';
        if (document.getElementById('sel3')) document.getElementById('sel3').textContent = '';
        if (document.getElementById('num2')) document.getElementById('num2').className = 'fs-num';
        if (document.getElementById('num3')) document.getElementById('num3').className = 'fs-num';
    } else {
        document.getElementById('step2')?.classList.add('hidden');
        document.getElementById('step3')?.classList.add('hidden');
        document.getElementById('step4')?.classList.add('hidden');
    }
    window.applyFilters();

window.applyFilters = function() {
    let filtered = [...allShops];
    
    if (selectedDivision) {
        const division = geoData.find(d => d.name === selectedDivision);
        const districtNames = division ? division.districts.map(d => d.name) : [];
        filtered = filtered.filter(shop => districtNames.includes(shop.district));
    }
    if (selectedDistrict) {
        filtered = filtered.filter(shop => shop.district === selectedDistrict);
    }
    if (selectedThana) {
        filtered = filtered.filter(shop => shop.thana === selectedThana);
    }
    if (selectedCategories.length > 0) {
        filtered = filtered.filter(shop => selectedCategories.includes(shop.category));
    }
    
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        const searchQuery = searchInput.value.trim().toLowerCase();
        if (searchQuery) {
            filtered = filtered.filter(shop =>
                (shop.shopName || '').toLowerCase().includes(searchQuery) ||
                (shop.area || '').toLowerCase().includes(searchQuery) ||
                (shop.district || '').toLowerCase().includes(searchQuery) ||
                (shop.thana || '').toLowerCase().includes(searchQuery)
            );
        }
    }
    
    window.renderShops(filtered);
};

// ========== রেন্ডার শপস (Cloudinary + YouTube, সেন্টার অ্যালাইন) ==========
window.renderShops = function(shops) {
    const container = document.getElementById('shopList');
    if (!container) return;
    
    if (shops.length === 0) {
        container.innerHTML = `<div class="empty"><div class="empty-icon">🏪</div><div class="empty-title">কোনো দোকান নেই</div><div class="empty-sub">অন্য ফিল্টার চেষ্টা করুন</div></div>`;
        return;
    }
    
    const shuffledShops = shuffleArray([...shops]);
    
    container.innerHTML = shuffledShops.map(shop => {
        let videoEmbed = '';
        
        // Cloudinary ভিডিও
        if (shop.videoUrl) {
            videoEmbed = `<video class="shop-video" src="${escapeHtml(shop.videoUrl)}" controls preload="metadata" poster="${escapeHtml(shop.thumbnail || '')}" playsinline></video>`;
        }
        // YouTube ভিডিও (আইডি)
        else if (shop.youtubeVideoId) {
            videoEmbed = `<iframe class="shop-video" src="https://www.youtube.com/embed/${escapeHtml(shop.youtubeVideoId)}?enablejsapi=1" frameborder="0" allowfullscreen></iframe>`;
        }
        // YouTube ভিডিও (লিংক)
        else if (shop.youtube) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=)([^&]+)/,
                /(?:youtu\.be\/)([^?]+)/,
                /(?:youtube\.com\/embed\/)([^?]+)/
            ];
            let videoId = null;
            for (let pattern of patterns) {
                const match = shop.youtube.match(pattern);
                if (match) { videoId = match[1]; break; }
            }
            if (videoId) {
                videoEmbed = `<iframe class="shop-video" src="https://www.youtube.com/embed/${videoId}?enablejsapi=1" frameborder="0" allowfullscreen></iframe>`;
            } else {
                videoEmbed = `<div class="no-video">🎬 ভিডিও লিংক সঠিক নয়</div>`;
            }
        }
        else {
            videoEmbed = `<div class="no-video">🎬 কোন ভিডিও নেই</div>";
        }
        
        // ✅ ক্যাটাগরি নির্ধারণ (আইকন বাদ দিয়ে)
        let categoryName = shop.categories || shop.category || 'পাইকারি দোকান';
        
        // একাধিক ক্যাটাগরি থাকলে প্রথমটি নিবে
        if (typeof categoryName === 'string' && categoryName.includes(',')) {
            categoryName = categoryName.split(',')[0];
        }
        
        // আইকন বাদ দিন
        categoryName = categoryName.replace(/[👗🛒📱🏠🔧💊🧴🎒🌾🖨️🚗🧸🎉📦🔬🐟🪴⚽📚🔌🧵🛺🔹]/g, '').trim();
        
        // ✅ বিবরণ/ঠিকানা তৈরি
        let description = '';
        if (shop.description) {
            description = shop.description;
        } else if (shop.area) {
            description = shop.area;
        } else if (shop.thana && shop.district) {
            description = `${shop.thana}, ${shop.district}`;
        } else {
            description = shop.district || 'ঠিকানা প্রদান করা হয়নি';
        }
        
        return `
        <div class="shop-video-card">
            <div class="video-player-card">
                ${videoEmbed}
            </div>
            <div class="shop-video-info">
                <h3 class="shop-video-name" onclick="window.viewShop('${shop.id}')">${escapeHtml(shop.shopName) || 'নাম নেই'}</h3>
                <div class="shop-video-category">${escapeHtml(categoryName)}</div>
                <p class="shop-video-address">📍 ${escapeHtml(description)}</p>
            </div>
        </div>`;
    }).join('');
    
    window.initVideoObservers();
};

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

window.viewShop = function(shopId) {
    if (shopId) window.location.href = `profile.html?id=${shopId}`;
    else alert('দোকানের আইডি পাওয়া যায়নি!');
};

window.initVideoObservers = function() {
    videoObservers.forEach(observer => observer.disconnect());
    videoObservers = [];
    
    const videoIframes = document.querySelectorAll('.shop-video');
    videoIframes.forEach(iframe => {
        if (!iframe.src) return;
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) {
                    try {
                        if (iframe.tagName === 'IFRAME') {
                            iframe.contentWindow?.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                        } else if (iframe.tagName === 'VIDEO') {
                            iframe.pause();
                        }
                    } catch(e) {}
                }
            });
        }, { threshold: 0, rootMargin: '0px' });
        observer.observe(iframe);
        videoObservers.push(observer);
    });
};

window.loadMarquee = function() {

window.loadSlider = function() {
    db.ref('slider').on('value', snap => {
        slData = [];
        if (snap.exists()) {
            snap.forEach(c => { if (c.val().image) slData.push(c.val()); });
        }
        const sec = document.getElementById('sliderSection');
        if (!sec) return;
        if (slData.length === 0) { sec.style.display = 'none'; return; }
        sec.style.display = 'block';
        const track = document.getElementById('sliderTrack');
        const dots = document.getElementById('sliderDots');
        if (!track || !dots) return;
        track.innerHTML = slData.map(s => `<div class="slide-item" onclick="${s.link ? `window.open('${s.link}','_blank')` : ''}"><img src="${s.image}" onerror="this.outerHTML='<div class=slide-placeholder>🏪</div>'"></div>`).join('');
        dots.innerHTML = slData.map((_, i) => `<div class="sl-dot${i === 0 ? ' active' : ''}" id="d${i}" onclick="window.goSlide(${i})"></div>`).join('');
        window.goSlide(0);
        if (slData.length > 1) {
            if (slTimer) clearInterval(slTimer);
            slTimer = setInterval(() => window.goSlide((curSlide + 1) % slData.length), 3500);
        }
    });
};

window.goSlide = function(n) {
    if (!slData.length) return;
    curSlide = (n + slData.length) % slData.length;
    const track = document.getElementById('sliderTrack');
    if (track) track.style.transform = `translateX(-${curSlide * 100}%)`;
    slData.forEach((_, i) => {
        const d = document.getElementById('d' + i);
        if (d) d.className = 'sl-dot' + (i === curSlide ? ' active' : '');
    });
};

window.prevSlide = function() {
    if (slTimer) clearInterval(slTimer);
    window.goSlide(curSlide - 1);
    if (slData.length > 1) slTimer = setInterval(() => window.goSlide((curSlide + 1) % slData.length), 3500);
};

window.nextSlide = function() {
    if (slTimer) clearInterval(slTimer);
    window.goSlide(curSlide + 1);
    if (slData.length > 1) slTimer = setInterval(() => window.goSlide((curSlide + 1) % slData.length), 3500);
};

window.loadShops = function() {

window.navigateTo = function(page, event) {
    if (event && event.currentTarget) {
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }
    switch(page) {
        case 'category': 
            window.openCategoryPopup();
            break;
        case 'searchFocus':
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.focus();
                const searchSec = document.getElementById('searchSection');
                if (searchSec) searchSec.classList.remove('hide');
                setTimeout(() => searchSec?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
            }
            break;
        case 'profile': 
            window.location.href = 'login.html'; 
            break;
        case 'help':
            window.location.href = 'help.html';
            break;
        default: console.log('Navigate to:', page);
    }
};

            <div class="popup-footer">
                <button class="btn-clear" onclick="window.clearAllCategories()">সব বাদ দিন</button>
                <button class="btn-apply" onclick="window.applyCategoryFilter()">প্রয়োগ করুন</button>
            </div>
        </div>
    `;
    
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.remove();
    });
};

window.toggleCategory = function(category, element) {
    const index = selectedCategories.indexOf(category);
    if (index === -1) {
        selectedCategories.push(category);
        element.classList.add('selected');
        const checkbox = element.querySelector('input');
        if (checkbox) checkbox.checked = true;
    } else {
        selectedCategories.splice(index, 1);
        element.classList.remove('selected');
        const checkbox = element.querySelector('input');
        if (checkbox) checkbox.checked = false;
    }
};

window.clearAllCategories = function() {
    selectedCategories = [];
    const allCatChecks = document.querySelectorAll('.cat-check');
    allCatChecks.forEach(check => {
        check.classList.remove('selected');
        const cb = check.querySelector('input');
        if (cb) cb.checked = false;
    });
};

window.applyCategoryFilter = function() {
    const popup = document.querySelector('.category-popup-overlay');
    if (popup) popup.remove();
    updateCategoryFilterUI();
    window.applyFilters();
};

// স্ক্রল ইভেন্ট
let lastScrollTop = 0;
const searchSectionEl = document.getElementById('searchSection');
window.addEventListener('scroll', function() {
    let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    if (searchSectionEl) {
        if (scrollTop > lastScrollTop && scrollTop > 80) searchSectionEl.classList.add('hide');
        else searchSectionEl.classList.remove('hide');
    }
    lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
});

// নেভিগেশন বাটনে ইভেন্ট লিসেনার
document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', (e) => {
        const page = btn.getAttribute('data-page');
        window.navigateTo(page, e);
    });
});

// অথ পরিবর্তন
auth.onAuthStateChanged((user) => {
    const profileBtn = document.querySelector('.nav-item[data-page="profile"]');
    if (profileBtn) {
        if (user) {
            profileBtn.innerHTML = '<span class="icon">👤</span>ড্যাশবোর্ড';
            profileBtn.setAttribute('data-page', 'dashboard');
            const newBtn = profileBtn.cloneNode(true);
            profileBtn.parentNode.replaceChild(newBtn, profileBtn);
            newBtn.addEventListener('click', (e) => {
                window.location.href = 'dashboard.html';
            });
        } else {
            profileBtn.innerHTML = '<span class="icon">👤</span>প্রোফাইল';
            profileBtn.setAttribute('data-page', 'profile');
            const newBtn = profileBtn.cloneNode(true);
            profileBtn.parentNode.replaceChild(newBtn, profileBtn);
            newBtn.addEventListener('click', (e) => {
                window.location.href = 'login.html';
            });
        }
    }
});

// ইউটিউব API লোড
function loadYouTubeAPI() {
    if (document.querySelector('script[src*="youtube.com/iframe_api"]')) return;
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
}
loadYouTubeAPI();

window.onYouTubeIframeAPIReady = function() {
    console.log('YouTube API ready');
    window.initVideoObservers();
};

window.addEventListener('load', () => {
    window.checkNet();
});

window.addEventListener('offline', () => {
    const noInternetDiv = document.getElementById('noInternet');
    if (noInternetDiv) noInternetDiv.style.display = 'flex';
});

window.addEventListener('online', () => {
    const noInternetDiv = document.getElementById('noInternet');
    if (noInternetDiv) noInternetDiv.style.display = 'none';
    window.checkNet();
});
</script>
