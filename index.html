<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>পাইকারি বাজার | পাইকারি দোকানের সেরা ঠিকানা</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
:root {
    --primary: #6c2bd9;
    --primary-dark: #4a1a9e;
    --primary-light: #a259f7;
    --accent: #f0c040;
    --bg: #f5f3ff;
    --text: #1a1a2e;
    --text-light: #666;
    --shadow: 0 4px 20px rgba(108,43,217,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { 
    font-family:'Hind Siliguri',sans-serif; 
    background:var(--bg); 
    min-height:100vh; 
    overflow-x:hidden;
    padding-bottom: 80px;
}

/* NO INTERNET */
#noInternet { display:none; position:fixed; inset:0; background:linear-gradient(160deg,#1a0a3e,#6c2bd9); flex-direction:column; align-items:center; justify-content:center; z-index:9999; padding:40px; text-align:center; }
.ni-icon { font-size:80px; margin-bottom:20px; animation:bounce 2s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.ni-title { font-size:22px; font-weight:700; color:white; margin-bottom:10px; }
.ni-msg   { font-size:14px; color:rgba(255,255,255,0.7); margin-bottom:28px; line-height:1.7; }
.ni-btn   { padding:13px 36px; background:var(--accent); color:#1a0a3e; border:none; border-radius:99px; font-size:15px; font-weight:700; font-family:'Hind Siliguri',sans-serif; cursor:pointer; }

/* SPLASH */
#splash { position:fixed; inset:0; background:linear-gradient(160deg,#1a0a3e,#6c2bd9,#a259f7); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9998; animation:splashOut 0.5s ease 2s forwards; }
@keyframes splashOut { to{opacity:0;pointer-events:none} }
.sp-logo { width:80px; height:80px; background:white; border-radius:22px; display:flex; align-items:center; justify-content:center; font-size:40px; margin-bottom:15px; box-shadow:0 10px 40px rgba(0,0,0,0.3); animation:popIn 0.7s cubic-bezier(.34,1.56,.64,1) 0.3s both; }
@keyframes popIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
.sp-title { font-size:28px; font-weight:700; color:white; margin-bottom:4px; }
.sp-sub   { font-size:11px; color:rgba(255,255,255,0.6); letter-spacing:3px; }
.sp-bar-wrap { width:140px; height:3px; background:rgba(255,255,255,0.2); border-radius:99px; margin-top:35px; overflow:hidden; animation:fadeIn 0.4s 1s both; }
.sp-bar { height:100%; background:var(--accent); border-radius:99px; animation:fillBar 2s ease 1s forwards; width:0; }
@keyframes fillBar { 0%{width:0} 40%{width:60%} 100%{width:100%} }
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }

/* APP */
#app { opacity:0; animation:appShow 0.3s ease 2.5s forwards; background:var(--bg); }
@keyframes appShow { to{opacity:1} }

/* লোডিং ওভারলে */
#loadingOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 9997;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.3s ease;
}
.loader-6 {
    width: 60px;
    height: 60px;
    background: var(--primary);
    animation: squareSpin 1s ease-in-out infinite;
    border-radius: 12px;
}
@keyframes squareSpin {
    0% { transform: rotate(0deg); }
    50% { transform: rotate(90deg) scale(1.2); background: var(--primary-light); }
    100% { transform: rotate(180deg); }
}
.loading-text {
    margin-top: 20px;
    color: white;
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    display: block;
    width: 100%;
}

.search-section {
    padding: 0 16px;
    margin-bottom: 12px;
    transition: transform 0.3s ease, opacity 0.3s ease;
    background: var(--bg);
    padding-top: 10px;
}
.search-section.hide {
    transform: translateY(-120%);
    opacity: 0;
    pointer-events: none;
    position: absolute;
    width: 100%;
}
.search-wrap {
    position: relative;
}
.search-input {
    width: 100%;
    padding: 12px 20px;
    font-size: 16px;
    font-family: 'Hind Siliguri', sans-serif;
    border: none;
    border-radius: 14px;
    background: white;
    color: var(--text);
    box-shadow: 0 3px 12px rgba(108,43,217,0.15);
    outline: none;
}
.search-input::placeholder { color: #aaa; }

/* মেলা বাটন - সার্চ বারের ডানপাশে (খুব গুরুত্বপূর্ণ) */
.mela-btn-container {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 15;
}
.mela-nav-btn {
    background: linear-gradient(135deg, #6c2bd9, #a259f7);
    border: none;
    border-radius: 30px;
    padding: 4px 12px;
    color: white;
    font-size: 10px;
    font-weight: 600;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    cursor: pointer;
    min-width: 52px;
    box-shadow: 0 2px 8px rgba(108,43,217,0.3);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    font-family: 'Hind Siliguri', sans-serif;
}
.mela-nav-btn:hover {
    transform: scale(1.02);
    box-shadow: 0 4px 12px rgba(108,43,217,0.4);
}
.mela-nav-btn:active {
    transform: scale(0.98);
}
.mela-nav-btn i {
    font-size: 14px;
}
.mela-nav-btn span {
    font-size: 9px;
    font-weight: 600;
}

/* সার্চ সাজেশন ড্রপডাউন */
.search-suggestions {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: white;
    border-radius: 14px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    z-index: 100;
    max-height: 300px;
    overflow-y: auto;
    display: none;
    margin-top: 5px;
}
.search-suggestions.show {
    display: block;
}
.suggestion-item {
    padding: 12px 16px;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
    transition: background 0.2s;
    font-size: 14px;
}
.suggestion-item:hover {
    background: #f5f3ff;
}
.suggestion-item .suggestion-type {
    font-size: 10px;
    color: var(--primary);
    font-weight: 600;
    display: inline-block;
    margin-left: 8px;
    background: #f0ebff;
    padding: 2px 8px;
    border-radius: 99px;
}
.suggestion-highlight {
    background: #ffeb3b;
    font-weight: bold;
}

/* MARQUEE */
.marquee-container { 
    margin: 5px 16px 10px;
    padding: 8px 12px;
    background: linear-gradient(90deg, var(--primary), var(--primary-light));
    border-radius: 14px;
    box-shadow: 0 3px 12px rgba(108,43,217,0.15);
    color: white;
}
marquee { 
    font-size: 14px;
    letter-spacing: 0.5px;
    font-weight: 500;
}
.marquee-disabled { 
    text-align: center; 
    font-size: 14px;
    opacity: 0.8;
    background: #ccc;
    color: #666;
    padding: 8px 12px;
    border-radius: 14px;
}

/* SLIDER SECTION */
.slider-section { margin:0 16px 5px; }
.slider-box {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 18px rgba(108,43,217,0.18);
    background: linear-gradient(135deg,#6c2bd9,#a259f7);
    height: 180px;
    width: 100%;
}
.slider-track {
    display: flex;
    height: 100%;
    width: 100%;
    transition: transform 0.45s cubic-bezier(.4,0,.2,1);
    will-change: transform;
}
.slide-item {
    flex: 0 0 100%;
    height: 100%;
}
.slide-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}
.slide-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 35px;
}
.sl-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.85);
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    font-size: 20px;
    cursor: pointer;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.sl-prev { left: 8px; }
.sl-next { right: 8px; }
.sl-dots {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
}
.sl-dot {
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all 0.3s;
    width: 6px;
}
.sl-dot.active {
    width: 20px;
    background: white;
}

/* ========== স্টার ডিসপ্লে স্টাইল ========== */
.shop-stars {
    display: flex;
    align-items: center;
    gap: 4px;
    margin: 0 0 8px 6px;
}
.star-icon {
    color: #ffd700;
    font-size: 14px;
}
.star-count-badge {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    background: transparent;
    color: #ffd700;
    font-size: 12px;
    font-weight: 600;
    margin-left: 2px;
}

/* ADD BANNER */
.add-banner { 
    margin: 5px 16px 10px;
    background: linear-gradient(135deg,#1a0a3e,#6c2bd9);
    border-radius: 20px;
    padding: 18px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow);
    text-decoration: none;
    transition: transform 0.2s;
}
.add-banner:hover { transform:translateY(-3px); }
.ab-icon  { width:50px; height:50px; background:var(--accent); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
.ab-title { font-size:18px; font-weight:800; color:white; margin-bottom:4px; }
.ab-sub   { font-size:13px; color:rgba(255,255,255,0.8); }
.ab-arrow { font-size:22px; color:var(--accent); margin-left:auto; }

.filter-wrap { padding:0 16px; margin-bottom:6px; }
.filter-step { background:white; border-radius:14px; padding:12px 14px; box-shadow:var(--shadow); margin-bottom:8px; border:1.5px solid rgba(108,43,217,0.06); }
.fs-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.fs-title { font-size:13px; font-weight:700; color:var(--text); }
.fs-sel   { font-size:11px; color:var(--primary); font-weight:600; margin-left:auto; }
.chip-scroll { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
.chip-scroll::-webkit-scrollbar { display:none; }
.f-chip { padding:6px 14px; border-radius:99px; font-size:12px; font-family:'Hind Siliguri',sans-serif; font-weight:500; white-space:nowrap; cursor:pointer; border:2px solid #e0d9f7; background:white; color:var(--text); transition:all 0.2s; flex-shrink:0; }
.f-chip.active { background:var(--primary); color:white; border-color:var(--primary); box-shadow:0 4px 12px rgba(108,43,217,0.3); }
.hidden { display:none; }
.reset-btn { width:100%; padding:8px; background:#f0ebff; color:var(--primary); border:none; border-radius:12px; font-size:13px; font-weight:600; font-family:'Hind Siliguri',sans-serif; cursor:pointer; margin-bottom:8px; display:none; }

/* ========== ভিডিও গ্রিড ========== */
.video-grid-section {
    margin: 0 16px 20px;
}
.video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
}
.video-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: all 0.3s ease;
    animation: tileIn 0.4s ease both;
}
.video-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(108,43,217,0.2);
}
.video-player-container {
    position: relative;
    background: transparent;
    width: 100%;
    aspect-ratio: 16 / 9;
    cursor: pointer;
}
.cloudinary-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 12px;
    background: transparent;
}
.video-card-info {
    padding: 14px 16px;
    text-align: center;
}
.video-card-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 6px;
    cursor: pointer;
}
.video-card-desc {
    font-size: 12px;
    color: var(--text-light);
    line-height: 1.4;
}
.video-grid-empty {
    text-align: center;
    padding: 40px;
    background: white;
    border-radius: 20px;
    color: var(--text-light);
}
.video-grid-empty-icon {
    font-size: 48px;
    margin-bottom: 12px;
}

/* ========== দোকানের কার্ড - ইউটিউব ভিডিও ========== */
.shop-card-wrapper {
    margin: 0 16px 16px;
}
.shop-video-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: all 0.3s ease;
    animation: tileIn 0.4s ease both;
}
.shop-video-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(108,43,217,0.2);
}
.video-player-card {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: transparent;
    cursor: pointer;
}
.video-thumbnail {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 12px;
}
.play-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 34px;
    cursor: pointer;
    z-index: 10;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    transition: transform 0.2s ease, background 0.2s ease;
    background: rgba(0, 0, 0, 0.25);
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
}
.play-icon:hover {
    transform: translate(-50%, -50%) scale(1.05);
    background: rgba(0, 0, 0, 0.35);
}
.play-icon::before {
    content: "▶";
    margin-left: 4px;
}
.shop-video-frame {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
    border-radius: 12px;
}
.shop-video-info {
    padding: 14px 16px;
    background: white;
    text-align: left;
    padding-left: 20px;
}
.shop-name-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    justify-content: flex-start;
    margin-left: 6px;
}
.shop-video-name {
    font-size: 20px;
    font-weight: 800;
    color: var(--primary);
    cursor: pointer;
    transition: color 0.2s;
    display: inline-block;
}
.dropdown-icon {
    background: none;
    border: none;
    font-size: 16px;
    color: var(--primary-light);
    cursor: pointer;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.dropdown-icon:hover {
    background: #f0ebff;
    color: var(--primary);
    transform: scale(1.1);
}
.shop-video-location {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-light);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: flex-start;
    margin-left: 6px;
}
.categories-dropdown {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #f0ebff;
    display: none;
    animation: slideDown 0.3s ease;
    text-align: left;
    margin-left: 6px;
}
.categories-dropdown.show {
    display: block;
}
@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
.categories-dropdown .category-badge {
    background: linear-gradient(135deg, #f0ebff, #e8e0ff);
    color: var(--primary-dark);
    padding: 5px 14px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin: 4px;
}
.categories-dropdown .category-badge i {
    font-size: 11px;
    color: var(--primary);
}
.no-categories-msg {
    font-size: 12px;
    color: var(--text-light);
    text-align: center;
    padding: 8px;
}
.no-video {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #1a0a3e, #6c2bd9);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
    text-align: center;
    border-radius: 12px;
}
@keyframes tileIn {
    from { transform: translateY(15px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.empty { text-align:center; padding:50px 20px; color:var(--text-light); }
.empty-icon  { font-size:50px; margin-bottom:12px; }
.empty-title { font-size:16px; font-weight:600; color:var(--text); margin-bottom:6px; }
.empty-sub   { font-size:13px; }

/* BOTTOM NAV */
.bottom-nav {
    position: fixed;
    bottom: 5px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 35px);
    max-width: 430px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(15px);
    border-radius: 24px;
    display: flex;
    justify-content: space-around;
    padding: 2px 0;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.10);
    z-index: 1000;
}
.nav-item {
    text-align: center;
    font-size: 11px;
    color: #666;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    background: transparent;
    border: none;
    font-family: 'Hind Siliguri', sans-serif;
    flex: 1;
    padding: 4px 0;
}
.nav-item .icon {
    display: block;
    font-size: 20px;
    margin-bottom: 2px;
}
.nav-item.active {
    color: var(--primary);
    transform: translateY(-3px);
}
.nav-item:active {
    transform: scale(0.95);
}

/* ========== ক্যাটাগরি পপআপ ========== */
.category-popup-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(5px);
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.3s ease;
}
.category-popup {
    background: white;
    border-radius: 28px;
    width: 90%;
    max-width: 400px;
    max-height: 80vh;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.popup-header {
    padding: 18px 20px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.popup-header h3 {
    font-size: 18px;
    font-weight: 700;
}
.popup-close {
    background: rgba(255,255,255,0.2);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
}
.popup-body {
    padding: 16px;
    max-height: 55vh;
    overflow-y: auto;
}
.category-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}
.cat-check {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: #f5f3ff;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1.5px solid transparent;
}
.cat-check.selected {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
}
.cat-check input {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: var(--primary);
}
.cat-check label {
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
}
.popup-footer {
    padding: 16px 20px;
    border-top: 1px solid #eee;
    display: flex;
    gap: 12px;
}
.popup-footer button {
    flex: 1;
    padding: 12px;
    border-radius: 99px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;

function getStarsHtml(stars) {
    if (!stars || stars === 0) return '';
    
    let html = '<div class="shop-stars">';
    const fullStars = Math.min(stars, 5);
    for (let i = 0; i < fullStars; i++) {
        html += '<i class="fas fa-star star-icon"></i>';
    }
    if (stars > 5) {
        html += `<span class="star-count-badge">+${stars - 5}</span>`;
    }
    html += '</div>';
    return html;
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function buildSearchIndex() {
    searchIndex.clear();
    
    categoriesList.forEach(cat => {
        const key = cat.toLowerCase();
        if (!searchIndex.has(key)) {
            searchIndex.set(key, { type: 'category', displayText: cat, data: cat });
        }
    });
    
    geoData.forEach(division => {
        const divKey = division.name.toLowerCase();
        if (!searchIndex.has(divKey)) {
            searchIndex.set(divKey, { type: 'division', displayText: division.name, data: division.name });
        }
        
        division.districts.forEach(district => {
            const distKey = district.name.toLowerCase();
            if (!searchIndex.has(distKey)) {
                searchIndex.set(distKey, { type: 'district', displayText: district.name, data: district.name });
            }
            
            district.upazilas.forEach(upazila => {
                const upazilaKey = upazila.toLowerCase();
                if (!searchIndex.has(upazilaKey)) {
                    searchIndex.set(upazilaKey, { type: 'upazila', displayText: upazila, data: upazila });
                }
            });
        });
    });
    
    allShops.forEach(shop => {
        if (shop.shopName) {
            const nameKey = shop.shopName.toLowerCase();
            if (!searchIndex.has(nameKey)) {
                searchIndex.set(nameKey, { type: 'shop', displayText: shop.shopName, data: shop });
            }
        }
        
        if (shop.area) {
            const areaKey = shop.area.toLowerCase();
            if (!searchIndex.has(areaKey)) {
                searchIndex.set(areaKey, { type: 'area', displayText: shop.area, data: shop });
            }
        }
        
        if (shop.description) {
            const words = shop.description.toLowerCase().split(/\s+/);
            const uniqueWords = new Set(words);
            uniqueWords.forEach(word => {
                if (word.length > 2 && !searchIndex.has(word)) {
                    searchIndex.set(word, { type: 'description', displayText: word, data: shop });
                }
            });
        }
        
        if (shop.products && Array.isArray(shop.products)) {
            shop.products.forEach(product => {
                if (product.name) {
                    const productKey = product.name.toLowerCase();
                    if (!searchIndex.has(productKey)) {
                        searchIndex.set(productKey, { type: 'product', displayText: product.name, data: shop });
                    }
                }
            });
        }
        
        if (shop.district) {
            const distKey = shop.district.toLowerCase();
            if (!searchIndex.has(distKey)) {
                searchIndex.set(distKey, { type: 'district', displayText: shop.district, data: shop.district });
            }
        }
        
        if (shop.thana) {
            const thanaKey = shop.thana.toLowerCase();
            if (!searchIndex.has(thanaKey)) {
                searchIndex.set(thanaKey, { type: 'upazila', displayText: shop.thana, data: shop.thana });
            }
        }
        
        if (shop.categories && Array.isArray(shop.categories)) {
            shop.categories.forEach(cat => {
                const catKey = cat.toLowerCase();
                if (!searchIndex.has(catKey)) {
                    searchIndex.set(catKey, { type: 'shop_category', displayText: cat, data: shop });
                }
            });
        }
    });
    
    console.log('সার্চ ইনডেক্স তৈরি হয়েছে:', searchIndex.size, 'টি শব্দ');
}

window.handleSearchInput = function() {
    const input = document.getElementById('searchInput');
    const query = input.value.trim().toLowerCase();
    const suggestionsBox = document.getElementById('searchSuggestions');
    
    if (query === '') {
        suggestionsBox.classList.remove('show');
        window.applyFilters();
        return;
    }
    
    const matches = [];
    for (let [word, info] of searchIndex.entries()) {
        if (word.includes(query)) {
            matches.push({ word, ...info });
        }
        if (matches.length >= 15) break;
    }
    
    if (matches.length > 0) {
        suggestionsBox.innerHTML = matches.map(match => {
            const highlightedText = match.displayText.replace(new RegExp(`(${query})`, 'gi'), '<span class="suggestion-highlight">$1</span>');
            const typeLabel = getTypeLabel(match.type);
            return `<div class="suggestion-item" onclick="window.selectSuggestion('${escapeHtml(match.word)}')">
                        ${highlightedText}
                        <span class="suggestion-type">${typeLabel}</span>
                    </div>`;
        }).join('');
        suggestionsBox.classList.add('show');
    } else {
        suggestionsBox.classList.remove('show');
    }
    
    performSearch(query);
};

function getTypeLabel(type) {
    const labels = {
        'shop': 'দোকান',
        'product': 'পণ্য',
        'category': 'ক্যাটাগরি',
        'division': 'বিভাগ',
        'district': 'জেলা',
        'upazila': 'উপজেলা/থানা',
        'area': 'এলাকা',
        'description': 'বিবরণী',
        'shop_category': 'দোকানের ক্যাটাগরি'
    };
    return labels[type] || 'অন্যান্য';
}

window.selectSuggestion = function(word) {
    const input = document.getElementById('searchInput');
    input.value = word;
    document.getElementById('searchSuggestions').classList.remove('show');
    performSearch(word.toLowerCase());
};

function performSearch(query) {
    if (!query || query === '') {
        window.applyFilters();
        return;
    }
    
    let filtered = [...allShops];
    
    if (selectedDivision) {
        const division = geoData.find(d => d.name === selectedDivision);
        const districtNames = division ? division.districts.map(d => d.name) : [];
        filtered = filtered.filter(shop => districtNames.includes(shop.district));
    }
    if (selectedDistrict) {
        filtered = filtered.filter(shop => shop.district === selectedDistrict);
    }
    if (selectedThana) {
        filtered = filtered.filter(shop => shop.thana === selectedThana);
    }
    if (selectedCategoriesArray.length > 0) {
        filtered = filtered.filter(shop => {
            if (!shop.categories || !Array.isArray(shop.categories)) return false;
            return selectedCategoriesArray.some(selectedCat => shop.categories.includes(selectedCat));
        });
    }
    
    const searchLower = query.toLowerCase();
    filtered = filtered.filter(shop => {
        if (shop.shopName && shop.shopName.toLowerCase().includes(searchLower)) return true;
        if (shop.area && shop.area.toLowerCase().includes(searchLower)) return true;
        if (shop.district && shop.district.toLowerCase().includes(searchLower)) return true;
        if (shop.thana && shop.thana.toLowerCase().includes(searchLower)) return true;
        if (shop.categories && Array.isArray(shop.categories)) {
            for (let cat of shop.categories) {
                if (cat && cat.toLowerCase().includes(searchLower)) return true;
            }
        }
        if (shop.description && shop.description.toLowerCase().includes(searchLower)) return true;
        if (shop.products && Array.isArray(shop.products)) {
            for (let product of shop.products) {
                if (product.name && product.name.toLowerCase().includes(searchLower)) return true;
            }
        }
        return false;
    });
    
    window.renderShops(filtered);
}

function setupCloudinaryVideo(videoElement, videoUrl) {
    if (!videoElement) return;
    
    videoElement.src = videoUrl;
    videoElement.muted = true;
    videoElement.loop = true;
    videoElement.playsInline = true;
    videoElement.autoplay = true;
    videoElement.controls = true;
    
    const playPromise = videoElement.play();
    if (playPromise !== undefined) {
        playPromise.catch(error => {
            console.log("Autoplay prevented:", error);
            videoElement.muted = true;
            videoElement.play();
        });
    }
    
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                videoElement.play().catch(e => console.log("Play on view error:", e));
            } else {
                videoElement.pause();
                videoElement.muted = true;
            }
        });
    }, { threshold: 0.1 });
    
    observer.observe(videoElement);
    cloudinaryVideoElements.push({ element: videoElement, observer });
}

function renderVideoGrid() {
    const container = document.getElementById('videoGrid');
    if (!container) return;
    
    cloudinaryVideoElements.forEach(item => {
        if (item.observer) item.observer.disconnect();
    });
    cloudinaryVideoElements = [];
    
    if (allVideos.length === 0) {
        container.innerHTML = `<div class="video-grid-empty">
            <div class="video-grid-empty-icon">🎬</div>
            <div>কোনো ভিডিও নেই</div>
            <div style="font-size: 11px; margin-top: 5px;">এডমিন প্যানেল থেকে ভিডিও যোগ করুন</div>
        </div>`;
        return;
    }
    
    container.innerHTML = allVideos.map(video => `
        <div class="video-card" data-video-id="${video.id}">
            <div class="video-player-container">
                <video class="cloudinary-video" preload="metadata" playsinline muted loop autoplay controls></video>
            </div>
            <div class="video-card-info">
                <div class="video-card-title" onclick="${video.shopId ? `window.location.href='profile.html?id=${video.shopId}'` : 'return false'}" style="cursor: ${video.shopId ? 'pointer' : 'default'}; ${video.shopId ? '' : 'opacity: 0.7;'}">
                    ${escapeHtml(video.title || 'ভিডিও')}
                    ${video.shopId ? '<span style="font-size: 10px; background: #f0ebff; color: #6c2bd9; padding: 2px 8px; border-radius: 99px; margin-left: 8px;">🔗 দোকান দেখুন</span>' : ''}
                </div>
                <div class="video-card-desc">${escapeHtml(video.description || '')}</div>
            </div>
        </div>
    `).join('');
    
    const videoCards = document.querySelectorAll('.video-card');
    videoCards.forEach((card, idx) => {
        const videoElement = card.querySelector('.cloudinary-video');
        if (videoElement && allVideos[idx]) {
            let videoUrl = allVideos[idx].videoUrl;
            if (videoUrl && videoUrl.trim() !== '') {
                setupCloudinaryVideo(videoElement, videoUrl);
            } else {
                videoElement.style.background = "#1a0a3e";
            }
        }
    });
}

window.applyFilters = function() {
    let filtered = [...allShops];
    
    if (selectedDivision) {
        const division = geoData.find(d => d.name === selectedDivision);
        const districtNames = division ? division.districts.map(d => d.name) : [];
        filtered = filtered.filter(shop => districtNames.includes(shop.district));
    }
    if (selectedDistrict) {
        filtered = filtered.filter(shop => shop.district === selectedDistrict);
    }
    if (selectedThana) {
        filtered = filtered.filter(shop => shop.thana === selectedThana);
    }
    if (selectedCategoriesArray.length > 0) {
        filtered = filtered.filter(shop => {
            if (!shop.categories || !Array.isArray(shop.categories)) return false;
            return selectedCategoriesArray.some(selectedCat => shop.categories.includes(selectedCat));
        });
    }
    
    window.renderShops(filtered);
};

window.playVideo = function(videoId, element) {
    const container = element.closest('.video-player-card');
    if (!container) return;
    
    const thumbnail = container.querySelector('.video-thumbnail');
    const playIcon = container.querySelector('.play-icon');
    const iframe = container.querySelector('.shop-video-frame');
    
    if (activeVideoPlayers.size > 0) {
        activeVideoPlayers.forEach((playerContainer, vid) => {
            if (vid !== videoId) {
                const oldIframe = playerContainer.querySelector('.shop-video-frame');
                const oldThumb = playerContainer.querySelector('.video-thumbnail');
                const oldIcon = playerContainer.querySelector('.play-icon');
                if (oldIframe && oldIframe.src) {
                    oldIframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                    oldIframe.style.display = 'none';
                }
                if (oldThumb) oldThumb.style.display = 'block';
                if (oldIcon) oldIcon.style.display = 'flex';
                activeVideoPlayers.delete(vid);
            }
        });
    }
    
    if (thumbnail) thumbnail.style.display = 'none';
    if (playIcon) playIcon.style.display = 'none';
    
    if (iframe) {
        if (!iframe.src) {
            iframe.src = `https://www.youtube.com/embed/${videoId}?enablejsapi=1&autoplay=1&mute=0&playsinline=1&controls=1&modestbranding=0`;
        } else {
            iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
        }
        iframe.style.display = 'block';
        
        if (videoIntersectionObservers.has(videoId)) {
            videoIntersectionObservers.get(videoId).disconnect();
        }
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) {
                    const vidIframe = entry.target.querySelector('.shop-video-frame');
                    if (vidIframe && vidIframe.contentWindow) {
                        vidIframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                    }
                }
            });
        }, { threshold: 0.3 });
        
        observer.observe(container);
        videoIntersectionObservers.set(videoId, observer);
        
        activeVideoPlayers.set(videoId, container);
    }
};

window.toggleCategoriesDropdown = function(shopId, event) {
    event.stopPropagation();
    const dropdown = document.getElementById(`categories-dropdown-${shopId}`);

};

// ========== আপডেটেড renderShops ফাংশন (স্টারযুক্ত দোকান ফিক্সড + ০ স্টার দোকান এলোমেলো) ==========
window.renderShops = function(shops) {
    const container = document.getElementById('shopList');
    if (!container) return;
    
    videoIntersectionObservers.forEach(observer => observer.disconnect());
    videoIntersectionObservers.clear();
    activeVideoPlayers.clear();
    
    if (shops.length === 0) {
        container.innerHTML = `<div class="empty"><div class="empty-icon">🏪</div><div class="empty-title">কোনো দোকান নেই</div><div class="empty-sub">অন্য ফিল্টার বা সার্চ টার্ম চেষ্টা করুন</div></div>`;
        return;
    }
    
    // স্টার অনুযায়ী আলাদা করুন
    const starShops = shops.filter(shop => (shop.stars || 0) > 0);
    const zeroStarShops = shops.filter(shop => (shop.stars || 0) === 0);
    
    // স্টারযুক্ত দোকান সাজান (বেশি স্টার = উপরে, সমান হলে আগে যারা পেয়েছে তারা আগে)
    const sortedStarShops = [...starShops].sort((a, b) => {
        const starsA = a.stars || 0;
        const starsB = b.stars || 0;
        if (starsA !== starsB) {
            return starsB - starsA;
        }
        return (a.lastStarUpdate || 0) - (b.lastStarUpdate || 0);
    });
    
    // ০ স্টার দোকান এলোমেলো করুন (প্রতিবার রিফ্রেশে পরিবর্তন হবে)
    const shuffledZeroStarShops = shuffleArray([...zeroStarShops]);
    
    // দুইটি লিস্ট একত্রিত করুন
    const finalShops = [...sortedStarShops, ...shuffledZeroStarShops];
    
    container.innerHTML = finalShops.map(shop => {
        let videoId = null;
        if (shop.youtubeVideoId) {
            videoId = shop.youtubeVideoId;
        } else if (shop.youtubeLink) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=)([^&]+)/,
                /(?:youtu\.be\/)([^?]+)/,
                /(?:youtube\.com\/embed\/)([^?]+)/
            ];
            for (let pattern of patterns) {
                const match = shop.youtubeLink.match(pattern);
                if (match) { videoId = match[1]; break; }
            }
        }
        
        const thumbnailUrl = videoId ? `https://img.youtube.com/vi/${videoId}/hqdefault.jpg` : '';
        const locationText = shop.thana ? `${shop.thana}, ${shop.district}` : `${shop.area || ''}, ${shop.district || ''}`;
        
        // স্টার এইচটিএমএল
        const starsHtml = getStarsHtml(shop.stars || 0);
        
        let categoriesDropdownHtml = '';
        if (shop.categories && Array.isArray(shop.categories) && shop.categories.length > 0) {
            categoriesDropdownHtml = `
                <div class="categories-dropdown" id="categories-dropdown-${shop.id}">
                    ${shop.categories.map(cat => `<span class="category-badge"><i class="fas fa-tag"></i> ${escapeHtml(cat)}</span>`).join('')}
                </div>
            `;
        } else {
            categoriesDropdownHtml = `
                <div class="categories-dropdown" id="categories-dropdown-${shop.id}">
                    <div class="no-categories-msg">🔖 কোনো ক্যাটাগরি যোগ করা হয়নি</div>
                </div>
            `;
        }
        
        if (videoId) {
            return `
            <div class="shop-card-wrapper">
                <div class="shop-video-card">
                    <div class="video-player-card" data-video-id="${videoId}">
                        <img class="video-thumbnail" src="${thumbnailUrl}" alt="ভিডিও থাম্বনেইল" loading="lazy">
                        <div class="play-icon" onclick="window.playVideo('${videoId}', this)"></div>
                        <iframe class="shop-video-frame" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen style="display: none;"></iframe>
                    </div>
                    <div class="shop-video-info">
                        <div class="shop-name-row">
                            <h3 class="shop-video-name" onclick="window.viewShop('${shop.id}')">
                                ${escapeHtml(shop.shopName) || 'নাম নেই'}
                            </h3>
                            <button class="dropdown-icon" onclick="window.toggleCategoriesDropdown('${shop.id}', event)">▼</button>
                        </div>
                        ${starsHtml}
                        <div class="shop-video-location">
                            ${escapeHtml(locationText)}
                        </div>
                        ${categoriesDropdownHtml}
                    </div>
                </div>
            </div>`;
        } else {
            return `
            <div class="shop-card-wrapper">
                <div class="shop-video-card">
                    <div class="video-player-card">
                        <div class="no-video">🎬 কোন ভিডিও নেই</div>
                    </div>
                    <div class="shop-video-info">
                        <div class="shop-name-row">
                            <h3 class="shop-video-name" onclick="window.viewShop('${shop.id}')">
                                ${escapeHtml(shop.shopName) || 'নাম নেই'}
                            </h3>
                            <button class="dropdown-icon" onclick="window.toggleCategoriesDropdown('${shop.id}', event)">▼</button>
                        </div>
                        ${starsHtml}
                        <div class="shop-video-location">
                            ${escapeHtml(locationText)}
                        </div>
                        ${categoriesDropdownHtml}
                    </div>
                </div>
            </div>`;
        }
    }).join('');
};

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

window.loadSlider = function() {
    db.ref('slider').on('value', snap => {
        slData = [];
        if (snap.exists()) {
            snap.forEach(c => { 
                if (c.val().image) slData.push(c.val()); 
            });
        }
        const sec = document.getElementById('sliderSection');
        if (!sec) return;
        if (slData.length === 0) { sec.style.display = 'none'; return; }
        sec.style.display = 'block';
        const track = document.getElementById('sliderTrack');
        const dots = document.getElementById('sliderDots');
        if (!track || !dots) return;
        
        track.innerHTML = slData.map(s => {
            let onclickAction = '';
            if (s.shopId && s.shopId.trim() !== '') {
                onclickAction = `window.location.href='profile.html?id=${s.shopId}'`;
            } else if (s.link && s.link.trim() !== '') {
                onclickAction = `window.open('${s.link}','_blank')`;
            }
            return `<div class="slide-item" onclick="${onclickAction}"><img src="${s.image}" onerror="this.outerHTML='<div class=slide-placeholder>🏪</div>'"></div>`;
        }).join('');
        
        dots.innerHTML = slData.map((_, i) => `<div class="sl-dot${i === 0 ? ' active' : ''}" id="d${i}" onclick="window.goSlide(${i})"></div>`).join('');
        window.goSlide(0);
        if (slData.length > 1) {
            if (slTimer) clearInterval(slTimer);
            slTimer = setInterval(() => window.goSlide((curSlide + 1) % slData.length), 4000);
        }
    });
};

window.goSlide = function(n) {
    if (!slData.length) return;
    curSlide = (n + slData.length) % slData.length;
    const track = document.getElementById('sliderTrack');
    if (track) track.style.transform = `translateX(-${curSlide * 100}%)`;
    slData.forEach((_, i) => {
        const d = document.getElementById('d' + i);
        if (d) d.className = 'sl-dot' + (i === curSlide ? ' active' : '');
    });
};

window.prevSlide = function() {
    if (slTimer) clearInterval(slTimer);
    window.goSlide(curSlide - 1);
    if (slData.length > 1) slTimer = setInterval(() => window.goSlide((curSlide + 1) % slData.length), 4000);
};

window.nextSlide = function() {
    if (slTimer) clearInterval(slTimer);
    window.goSlide(curSlide + 1);
    if (slData.length > 1) slTimer = setInterval(() => window.goSlide((curSlide + 1) % slData.length), 4000);
};

window.navigateTo = function(page, event) {
    if (event && event.currentTarget) {
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }
    switch(page) {
        case 'category': 
            window.openCategoryPopup();
            break;
        case 'searchFocus':
            const searchSec = document.getElementById('searchSection');
            if (searchSec) {
                searchSec.style.display = 'block';
                searchSec.classList.remove('hide');
                const searchInput = document.getElementById('searchInput');
                if (searchInput) searchInput.focus();
                setTimeout(() => searchSec?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
            }
            break;
        case 'profile': 
            window.location.href = 'login.html'; 
            break;
        case 'help':
            window.location.href = 'help.html';
            break;
        default: console.log('Navigate to:', page);
    }
};

let lastScrollTop = 0;
const searchSectionEl = document.getElementById('searchSection');
window.addEventListener('scroll', function() {
    let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    if (searchSectionEl && searchSectionEl.style.display !== 'none') {
        if (scrollTop > lastScrollTop && scrollTop > 50) {
            searchSectionEl.classList.add('hide');
        } else if (scrollTop < lastScrollTop) {
            searchSectionEl.classList.remove('hide');
        }
    }
    lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
});

    if (existingPopup) existingPopup.remove();
    
    const overlay = document.createElement('div');
    overlay.className = 'category-popup-overlay';
    
    const categoriesHTML = categoriesList.map(cat => {
        const isSelected = selectedCategoriesArray.includes(cat);
        return `
            <div class="cat-check ${isSelected ? 'selected' : ''}" onclick="window.toggleCategoryInPopup('${cat.replace(/'/g, "\\'")}', this)">
                <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); window.toggleCategoryInPopup('${cat.replace(/'/g, "\\'")}', this.parentElement)">

            </div>

    }).join('');
    
    overlay.innerHTML = `

            <div class="popup-header">

let tempSelectedCategories = [];

window.toggleCategoryInPopup = function(category, element) {
    const index = tempSelectedCategories.indexOf(category);
    if (index === -1) {
        tempSelectedCategories.push(category);
        element.classList.add('selected');
        const checkbox = element.querySelector('input');
        if (checkbox) checkbox.checked = true;
    } else {
        tempSelectedCategories.splice(index, 1);
        element.classList.remove('selected');
        const checkbox = element.querySelector('input');
        if (checkbox) checkbox.checked = false;
    }
};

window.clearAllCategoryFromPopup = function() {
    tempSelectedCategories = [];
    document.querySelectorAll('.cat-check').forEach(check => {
        check.classList.remove('selected');
        const cb = check.querySelector('input');
        if (cb) cb.checked = false;
    });
};

window.applyCategoryFromPopup = function() {
    const popup = document.querySelector('.category-popup-overlay');
    if (popup) popup.remove();
    
    selectedCategoriesArray = [...tempSelectedCategories];
    tempSelectedCategories = [];
    
    updateCategoryFilterUI();
    window.applyFilters();
};

    toast.className = 'custom-toast' + (isError ? ' error' : '');
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
    toast.style.position = 'fixed';
    toast.style.bottom = '90px';
    toast.style.left = '20px';
    toast.style.right = '20px';
    toast.style.background = isError ? '#e74c3c' : '#2ecc71';
    toast.style.color = 'white';
    toast.style.padding = '12px 18px';
    toast.style.borderRadius = '50px';
    toast.style.fontWeight = '600';
    toast.style.zIndex = '10001';
    toast.style.animation = 'fadeUp 0.3s ease forwards';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
}

});

auth.onAuthStateChanged((user) => {
    const profileBtn = document.querySelector('.nav-item[data-page="profile"]');
    if (profileBtn) {
        if (user) {
            profileBtn.innerHTML = '<span class="icon">👤</span>ড্যাশবোর্ড';
            profileBtn.setAttribute('data-page', 'dashboard');
            const newBtn = profileBtn.cloneNode(true);
            profileBtn.parentNode.replaceChild(newBtn, profileBtn);
            newBtn.addEventListener('click', (e) => {
                window.location.href = 'dashboard.html';
            });
        } else {
            profileBtn.innerHTML = '<span class="icon">👤</span>প্রোফাইল';
            profileBtn.setAttribute('data-page', 'profile');
            const newBtn = profileBtn.cloneNode(true);
            profileBtn.parentNode.replaceChild(newBtn, profileBtn);
            newBtn.addEventListener('click', (e) => {
                window.location.href = 'login.html';
            });
        }
    }
});

window.addEventListener('load', () => {
    window.checkNet();
});

window.addEventListener('offline', () => {
    const noInternetDiv = document.getElementById('noInternet');
    if (noInternetDiv) noInternetDiv.style.display = 'flex';
    hideLoading();
});

window.addEventListener('online', () => {
    const noInternetDiv = document.getElementById('noInternet');
    if (noInternetDiv) noInternetDiv.style.display = 'none';
    window.checkNet();
});
</script>
</body>
</html>
