<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PROVISION | প্রিমিয়াম মার্কেটপ্লেস + প্রোফাইল</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #6c2bd9;
            --primary-dark: #4a1a9e;
            --primary-light: #a259f7;
            --accent: #f0c040;
            --bg: #f5f3ff;
            --white: #ffffff;
            --text: #1a1a2e;
            --text-light: #666;
            --card-shadow: 0 8px 32px rgba(108,43,217,0.15);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(108,43,217,0.08), rgba(255,255,255,0) 80%);
            z-index: -2;
            pointer-events: none;
        }

        .glow-orb {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(162,89,247,0.12), transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            animation: floatGlow 18s infinite alternate;
        }

        @keyframes floatGlow {
            0% { transform: translate(-10%, -10%) scale(1); opacity: 0.4; }
            100% { transform: translate(15%, 20%) scale(1.4); opacity: 0.8; }
        }

        .glass-header {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(16px);
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(108, 43, 217, 0.2);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo h1 {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 20px 80px;
        }

        .slider-3d {
            perspective: 1200px;
            margin-bottom: 48px;
        }

        .slider-wrapper {
            position: relative;
            width: 100%;
            height: 300px;
            overflow: hidden;
            border-radius: 32px;
            box-shadow: var(--card-shadow);
        }

        .slides-3d {
            display: flex;
            width: 300%;
            height: 100%;
            animation: slide3d 15s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
        }

        .slides-3d img {
            width: 33.33%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.95);
        }

        @keyframes slide3d {
            0% { transform: translateX(0); }
            25% { transform: translateX(0); }
            35% { transform: translateX(-33.33%); }
            60% { transform: translateX(-33.33%); }
            70% { transform: translateX(-66.66%); }
            95% { transform: translateX(-66.66%); }
            100% { transform: translateX(0); }
        }

        .section-title {
            font-size: 2rem;
            font-weight: 700;
            margin: 32px 0 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 5px solid var(--primary);
            padding-left: 20px;
            color: var(--text);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 28px;
            margin-bottom: 60px;
        }

        .product-card {
            background: var(--white);
            border-radius: 32px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(108, 43, 217, 0.15);
            box-shadow: var(--card-shadow);
        }

        .product-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: var(--primary-light);
            box-shadow: 0 30px 45px -12px rgba(108,43,217,0.3);
        }

        .product-img {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            margin: 8px 0;
        }

        .product-desc {
            font-size: 0.85rem;
            color: var(--text-light);
            line-height: 1.4;
        }

        /* add product form */
        .add-product-card {
            background: var(--white);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 32px;
            box-shadow: var(--card-shadow);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid rgba(108,43,217,0.2);
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .profile-section {
            margin-top: 40px;
            background: var(--white);
            border-radius: 48px;
            padding: 28px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(108, 43, 217, 0.1);
        }

        .profile-header {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            align-items: center;
            margin-bottom: 28px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(145deg, var(--primary), var(--primary-light));
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 800;
            color: white;
            box-shadow: 0 20px 30px -8px rgba(108,43,217,0.4);
        }

        .shop-title h2 {
            font-size: 2rem;
            color: var(--text);
        }

        .status-badge {
            display: inline-block;
            background: rgba(108,43,217,0.1);
            padding: 5px 14px;
            border-radius: 60px;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.7rem;
            margin-top: 8px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
            gap: 20px;
            margin: 24px 0;
        }

        .info-item {
            background: #faf8ff;
            border-radius: 24px;
            padding: 16px;
            border-left: 3px solid var(--primary);
            color: var(--text);
        }

        .contact-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .contact-btn {
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
            background: #f0ebff;
            color: var(--primary);
            border: none;
        }

        .contact-btn:hover { background: var(--primary); color: white; }

        .not-found {
            text-align: center;
            padding: 40px;
            background: #faf8ff;
            border-radius: 48px;
            color: var(--text);
        }

        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-light);
            font-size: 0.8rem;
            border-top: 1px solid rgba(108,43,217,0.1);
            margin-top: 40px;
        }

        @media (max-width: 700px) {
            .product-grid { gap: 16px; }
            .product-img { height: 180px; }
            .shop-title h2 { font-size: 1.5rem; }
            .glass-header { flex-direction: column; text-align: center; }
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--primary);
            font-size: 1.2rem;
            grid-column: span 2;
        }

        .owner-badge {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            display: inline-block;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="glow-orb" style="top: -100px; left: -100px;"></div>
<div class="glow-orb" style="bottom: 0; right: 0; width: 400px; height: 400px; background: radial-gradient(circle, rgba(108,43,217,0.08), transparent);"></div>

<header class="glass-header">
    <div class="logo">
        <h1><i class="fas fa-crown"></i> PROVISION <span style="font-size:0.9rem;">| প্রিমিয়াম বাজার</span></h1>
    </div>
    <div class="nav-links">
        <a onclick="scrollToProducts()"><i class="fas fa-store"></i> পণ্য</a>
        <a onclick="scrollToProfile()"><i class="fas fa-id-card"></i> প্রোফাইল</a>
    </div>
</header>

<div class="main-container">
    <!-- 3D Slider -->
    <div class="slider-3d">
        <div class="slider-wrapper">
            <div class="slides-3d">
                <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?w=1200&h=400&fit=crop" alt="Offer">
                <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1200&h=400&fit=crop" alt="New">
                <img src="https://images.unsplash.com/photo-1472851294608-062f824d29cc?w=1200&h=400&fit=crop" alt="Discount">
            </div>
        </div>
    </div>

    <!-- ADD PRODUCT SECTION (শুধু প্রোফাইল মালিক দেখতে পাবে) -->
    <div id="addProductSection" style="display: none;">
        <div class="add-product-card">
            <h3 style="margin-bottom: 20px;"><i class="fas fa-plus-circle"></i> নতুন পণ্য যোগ করুন</h3>
            <div class="form-group">
                <label>পণ্যের নাম</label>
                <input type="text" id="productName" placeholder="যেমন: প্রিমিয়াম শার্ট">
            </div>
            <div class="form-group">
                <label>মূল্য (৳)</label>
                <input type="text" id="productPrice" placeholder="১২৫০">
            </div>
            <div class="form-group">
                <label>Google Drive ছবির লিংক</label>
                <input type="text" id="productImage" placeholder="https://drive.google.com/file/d/...">
                <small style="color: var(--text-light);">শুধু গুগল ড্রাইভের শেয়ার লিংক দিন</small>
            </div>
            <div class="form-group">
                <label>পণ্যের বিবরণ</label>
                <textarea id="productDesc" rows="3" placeholder="পণ্যের বিস্তারিত বর্ণনা..."></textarea>
            </div>
            <button class="btn-primary" id="addProductBtn"><i class="fas fa-save"></i> পণ্য সংরক্ষণ করুন</button>
        </div>
    </div>

    <!-- PRODUCT SECTION -->
    <div class="section-title" id="productsSection">
        <i class="fas fa-bolt" style="color:var(--primary)"></i> 
        <span id="productsSectionTitle">পণ্যসমূহ</span>
    </div>
    <div class="product-grid" id="productGrid">
        <div class="loading"><i class="fas fa-spinner fa-pulse"></i> লোডিং পণ্য...</div>
    </div>

    <!-- PROFILE DISPLAY SECTION -->
    <div class="profile-section" id="profileSection">
        <div style="text-align:center; padding: 30px;" id="profileLoadingIndicator">
            <i class="fas fa-spinner fa-pulse"></i> প্রোফাইল লোড হচ্ছে...
        </div>
        <div id="profileContent" style="display:none;"></div>
    </div>
    <footer>
        <i class="fas fa-gem"></i> প্রিমিয়াম মার্কেটপ্লেস | নিরাপদ ও দ্রুত
    </footer>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA1CzQX9tgbLd46QfvCK6Rwqa0z9CRWoMs",
        authDomain: "agls-5bd4c.firebaseapp.com",
        databaseURL: "https://agls-5bd4c-default-rtdb.firebaseio.com/",
        projectId: "agls-5bd4c",
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentUserId = null;
    let currentShopData = null;
    let viewingShopId = null;

    function getGoogleDriveImageUrl(url) {
        if(!url) return "https://via.placeholder.com/500x300/eee/6c2bd9?text=No+Image";
        let match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if(match) return `https://lh3.googleusercontent.com/d/${match[1]}=w500`;
        match = url.match(/id=([a-zA-Z0-9_-]+)/);
        if(match) return `https://lh3.googleusercontent.com/d/${match[1]}=w500`;
        return url;
    }

    function escapeHtml(str) {
        if(!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    // নির্দিষ্ট দোকানের পণ্য লোড করা
    async function loadProductsForShop(shopId, isOwner = false) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> পণ্য আনয়ন...</div>';
        
        try {
            const productsRef = db.ref(`products/${shopId}`);
            const snapshot = await productsRef.once('value');
            
            if(!snapshot.exists()) {
                if(isOwner) {
                    grid.innerHTML = '<div class="loading">📦 এখনো কোনো পণ্য যোগ করেননি। উপরের ফর্ম ব্যবহার করে পণ্য যোগ করুন।</div>';
                } else {
                    grid.innerHTML = '<div class="loading">📦 এই দোকানে এখনো কোনো পণ্য নেই।</div>';
                }
                return;
            }
            
            let html = '';
            snapshot.forEach(child => {
                const p = child.val();
                const img = getGoogleDriveImageUrl(p.image);
                html += `
                    <div class="product-card">
                        <img class="product-img" src="${img}" alt="${escapeHtml(p.name)}" onerror="this.src='https://via.placeholder.com/500x300/eee/6c2bd9?text=Error'">
                        <div class="product-info">
                            <div class="product-name">${escapeHtml(p.name)}</div>
                            <div class="product-price">৳ ${escapeHtml(p.price)}</div>
                            <div class="product-desc">${escapeHtml((p.desc || "প্রিমিয়াম কোয়ালিটি পণ্য").substring(0, 90))}</div>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        } catch(e) {
            grid.innerHTML = '<div class="loading">⚠️ পণ্য লোড করতে ব্যর্থ</div>';
            console.error(e);
        }
    }

    // পণ্য যোগ করা (লগইন করা ইউজারের আইডিতে)
    async function addProduct() {
        if(!currentUserId) {
            alert('পণ্য যোগ করতে লগইন করুন!');
            return;
        }
        
        const name = document.getElementById('productName').value.trim();
        const price = document.getElementById('productPrice').value.trim();
        const image = document.getElementById('productImage').value.trim();
        const desc = document.getElementById('productDesc').value.trim();
        
        if(!name || !price || !image) {
            alert('নাম, মূল্য ও ছবির লিংক অবশ্যই দিতে হবে!');
            return;
        }
        
        const btn = document.getElementById('addProductBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> যোগ করা হচ্ছে...';
        btn.disabled = true;
        
        try {
            const productsRef = db.ref(`products/${currentUserId}`);
            await productsRef.push({
                name: name,
                price: price,
                image: image,
                desc: desc,
                timestamp: Date.now()
            });
            
            alert('✅ পণ্য সফলভাবে যোগ করা হয়েছে!');
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productImage').value = '';
            document.getElementById('productDesc').value = '';
            
            // পণ্য লিস্ট রিলোড
            await loadProductsForShop(currentUserId, true);
            
        } catch(e) {
            alert('ত্রুটি: ' + e.message);
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }

    // দোকানের প্রোফাইল লোড করা
    async function loadShopProfile(uid) {
        const profileDiv = document.getElementById('profileContent');
        const loadingIndicator = document.getElementById('profileLoadingIndicator');
        const addProductSection = document.getElementById('addProductSection');
        const productsSectionTitle = document.getElementById('productsSectionTitle');
        
        viewingShopId = uid;
        const isOwner = (currentUserId === uid);
        
        if(!uid) {
            profileDiv.innerHTML = `<div class="not-found">
                <i class="fas fa-store-slash" style="font-size:48px;"></i>
                <h3>কোন দোকান আইডি দেওয়া হয়নি</h3>
                <p>URL এ ?id=shopId যোগ করুন</p>
                </div>`;
            loadingIndicator.style.display = 'none';
            profileDiv.style.display = 'block';
            addProductSection.style.display = 'none';
            return;
        }
        
        try {
            const snap = await db.ref('shops/' + uid).once('value');
            const shop = snap.val();
            
            if(!shop) {
                profileDiv.innerHTML = `<div class="not-found"><i class="fas fa-search"></i> দোকান পাওয়া যায়নি</div>`;
                loadingIndicator.style.display = 'none';
                profileDiv.style.display = 'block';
                addProductSection.style.display = 'none';
                return;
            }
            
            // প্রোফাইল টাইটেল সেট করা
            productsSectionTitle.innerHTML = `${escapeHtml(shop.shopName || 'দোকান')} - পণ্যসমূহ`;
            
            // প্রোফাইল দেখানোর সেকশন
            const isApproved = (shop.status === 'approved');
            const statusHtml = isApproved ? 
                '<div class="status-badge"><i class="fas fa-check-circle"></i> ভেরিফাইড স্টোর</div>' : 
                '<div class="status-badge" style="background:#fff3e0;color:#b95b0d;"><i class="fas fa-clock"></i> পেন্ডিং</div>';
            
            const avatarChar = (shop.shopName?.charAt(0) || '?').toUpperCase();
            const addressLine = shop.thana ? `${shop.thana}, ${shop.district}` : (shop.area ? `${shop.area}, ${shop.district}` : shop.district || 'ঠিকানা নেই');
            
            let contactsHtml = '';
            if(shop.phone) contactsHtml += `<a href="tel:${shop.phone}" class="contact-btn"><i class="fas fa-phone-alt"></i> কল করুন</a>`;
            if(shop.whatsapp) {
                let wa = shop.whatsapp.replace(/[^0-9]/g,'');
                if(!wa.startsWith('88')) wa = '88'+wa;
                contactsHtml += `<a href="https://wa.me/${wa}" target="_blank" class="contact-btn"><i class="fab fa-whatsapp"></i> WhatsApp</a>`;
            }
            if(shop.telegram) {
                let tg = shop.telegram.replace(/[^0-9]/g,'');
                if(!tg.startsWith('88')) tg = '88'+tg;
                contactsHtml += `<a href="https://t.me/+${tg}" target="_blank" class="contact-btn"><i class="fab fa-telegram-plane"></i> Telegram</a>`;
            }
            if(contactsHtml === '') contactsHtml = `<p style="color:#aaa;">কোন যোগাযোগের তথ্য নেই</p>`;
            
            let categoriesDisplay = 'সাধারণ পণ্য';
            if(shop.categories) {
                if(typeof shop.categories === 'string') categoriesDisplay = shop.categories;
                else if(Array.isArray(shop.categories)) categoriesDisplay = shop.categories.join(', ');
            }
            
            const ownerBadge = isOwner ? '<div class="owner-badge"><i class="fas fa-crown"></i> এই প্রোফাইল আপনার</div>' : '';
            
            const fullProfileHtml = `
                <div class="profile-header">
                    <div class="profile-avatar">${escapeHtml(avatarChar)}</div>
                    <div class="shop-title">
                        <h2>${escapeHtml(shop.shopName || 'দোকানের নাম নেই')}</h2>
                        ${statusHtml}
                        ${ownerBadge}
                        <p style="margin-top: 8px;"><i class="fas fa-user"></i> ${escapeHtml(shop.ownerName || 'মালিকের নাম নেই')}</p>
                    </div>
                </div>
                <div class="info-grid">
                    <div class="info-item"><i class="fas fa-map-marker-alt"></i> <strong>ঠিকানা</strong><br>${escapeHtml(addressLine)}</div>
                    <div class="info-item"><i class="fas fa-phone"></i> <strong>মোবাইল</strong><br>${escapeHtml(shop.phone || '—')}</div>
                    <div class="info-item"><i class="fas fa-layer-group"></i> <strong>ক্যাটাগরি</strong><br>${escapeHtml(categoriesDisplay)}</div>
                </div>
                ${shop.description ? `<div style="background:#faf8ff; border-radius:24px; padding:16px; margin:20px 0"><i class="fas fa-align-left"></i> <strong>দোকানের বিবরণ</strong><br>${escapeHtml(shop.description)}</div>` : ''}
                <div class="contact-buttons">${contactsHtml}</div>
                ${shop.youtube ? `<div style="margin-top:20px;"><a href="${shop.youtube}" target="_blank" style="color:var(--primary);"><i class="fab fa-youtube"></i> ভিডিও ট্যুর দেখুন</a></div>` : ''}
            `;
            
            profileDiv.innerHTML = fullProfileHtml;
            loadingIndicator.style.display = 'none';
            profileDiv.style.display = 'block';
            
            // পণ্য যোগ করার ফর্ম দেখানো/লুকানো (শুধু প্রোফাইল মালিক দেখতে পাবে)
            if(isOwner) {
                addProductSection.style.display = 'block';
                await loadProductsForShop(uid, true);
            } else {
                addProductSection.style.display = 'none';
                await loadProductsForShop(uid, false);
            }
            
        } catch(err) {
            console.error(err);
            profileDiv.innerHTML = `<div class="not-found"><i class="fas fa-exclamation-triangle"></i> ত্রুটি: ${err.message}</div>`;
            loadingIndicator.style.display = 'none';
            profileDiv.style.display = 'block';
            addProductSection.style.display = 'none';
        }
    }

    // লগইন স্টেট চেক
    auth.onAuthStateChanged(async (user) => {
        if(user) {
            currentUserId = user.uid;
            // ইউজারের শপ ডাটা লোড
            const shopSnap = await db.ref('shops/' + currentUserId).once('value');
            currentShopData = shopSnap.val();
            
            // URL থেকে আইডি নেওয়া
            const urlParams = new URLSearchParams(window.location.search);
            const shopId = urlParams.get('id');
            
            if(shopId) {
                // নির্দিষ্ট দোকানের প্রোফাইল দেখানো
                await loadShopProfile(shopId);
            } else if(currentShopData && currentShopData.status === 'approved') {
                // লগইন করা ইউজারের নিজের প্রোফাইল দেখানো (যদি approved হয়ে থাকে)
                await loadShopProfile(currentUserId);
            } else {
                // কোনো প্রোফাইল না থাকলে মেসেজ দেখানো
                document.getElementById('profileLoadingIndicator').style.display = 'none';
                document.getElementById('profileContent').style.display = 'block';
                document.getElementById('profileContent').innerHTML = `<div class="not-found">
                    <i class="fas fa-info-circle"></i>
                    <h3>আপনার প্রোফাইল এখনো অনুমোদিত হয়নি</h3>
                    <p>অনুগ্রহ করে অ্যাডমিনের অনুমোদনের জন্য অপেক্ষা করুন</p>
                </div>`;
                document.getElementById('addProductSection').style.display = 'none';
            }
        } else {
            // লগইন না থাকলে শুধু পাবলিক প্রোফাইল দেখা যাবে
            const urlParams = new URLSearchParams(window.location.search);
            const shopId = urlParams.get('id');
            if(shopId) {
                await loadShopProfile(shopId);
            } else {
                document.getElementById('profileLoadingIndicator').style.display = 'none';
                document.getElementById('profileContent').style.display = 'block';
                document.getElementById('profileContent').innerHTML = `<div class="not-found">
                    <i class="fas fa-sign-in-alt"></i>
                    <h3>প্রোফাইল দেখতে লগইন করুন</h3>
                    <p>অনুগ্রহ করে <a href="login.html" style="color:var(--primary);">লগইন করুন</a></p>
                </div>`;
                document.getElementById('addProductSection').style.display = 'none';
            }
        }
    });

    // ইভেন্ট লিসেনার
    document.getElementById('addProductBtn')?.addEventListener('click', addProduct);
    
    window.scrollToProducts = () => document.getElementById('productsSection').scrollIntoView({ behavior: 'smooth' });
    window.scrollToProfile = () => document.getElementById('profileSection').scrollIntoView({ behavior: 'smooth' });
</script>
</body>
</html>
