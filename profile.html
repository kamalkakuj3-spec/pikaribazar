<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PROVISION | 3D স্টোর + প্রোফাইল ভিউ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #f0f0f0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* animated background grain */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(108,43,217,0.15), rgba(0,0,0,0.9));
            z-index: -2;
            pointer-events: none;
        }

        /* 3D floating orb effect */
        .glow-orb {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(162,89,247,0.2), transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            animation: floatGlow 18s infinite alternate;
        }

        @keyframes floatGlow {
            0% { transform: translate(-10%, -10%) scale(1); opacity: 0.3; }
            100% { transform: translate(15%, 20%) scale(1.4); opacity: 0.6; }
        }

        /* sticky futuristic header */
        .glass-header {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(16px);
            background: rgba(10, 10, 20, 0.7);
            border-bottom: 1px solid rgba(108, 43, 217, 0.4);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo h1 {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f0c040, #b8860b, #a259f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #ddd;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: #b8860b;
        }

        /* container */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 20px 80px;
        }

        /* 3D Slider Premium */
        .slider-3d {
            perspective: 1200px;
            margin-bottom: 48px;
        }

        .slider-wrapper {
            position: relative;
            width: 100%;
            height: 300px;
            overflow: hidden;
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
            transform-style: preserve-3d;
        }

        .slides-3d {
            display: flex;
            width: 300%;
            height: 100%;
            animation: slide3d 15s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
        }

        .slides-3d img {
            width: 33.33%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.85);
            transition: 0.4s;
        }

        @keyframes slide3d {
            0% { transform: translateX(0); }
            25% { transform: translateX(0); }
            35% { transform: translateX(-33.33%); }
            60% { transform: translateX(-33.33%); }
            70% { transform: translateX(-66.66%); }
            95% { transform: translateX(-66.66%); }
            100% { transform: translateX(0); }
        }

        /* section title */
        .section-title {
            font-size: 2rem;
            font-weight: 700;
            margin: 32px 0 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 5px solid #b8860b;
            padding-left: 20px;
        }

        /* product grid 2 columns premium */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 28px;
            margin-bottom: 60px;
        }

        .product-card {
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(108, 43, 217, 0.3);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.3);
        }

        .product-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: #b8860b;
            box-shadow: 0 30px 45px -12px rgba(184,134,11,0.3);
        }

        .product-img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            transition: 0.5s;
        }

        .product-card:hover .product-img {
            transform: scale(1.03);
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: #f0c040;
            margin: 8px 0;
        }

        .product-desc {
            font-size: 0.85rem;
            color: #bbb;
            line-height: 1.4;
        }

        /* ========= PROFILE SECTION (3D Card) ========= */
        .profile-section {
            margin-top: 40px;
            background: rgba(15, 15, 25, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 20px;
            border: 1px solid rgba(162,89,247,0.3);
            transition: 0.3s;
        }

        .profile-header {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            align-items: center;
            margin-bottom: 28px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(145deg, #6c2bd9, #a259f7);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 800;
            box-shadow: 0 20px 30px -8px rgba(108,43,217,0.5);
            transition: 0.2s;
        }

        .shop-title {
            flex: 1;
        }

        .shop-title h2 {
            font-size: 2rem;
        }

        .status-badge {
            display: inline-block;
            background: rgba(46,204,113,0.2);
            padding: 5px 14px;
            border-radius: 60px;
            color: #2ecc71;
            font-weight: 600;
            font-size: 0.7rem;
            margin-top: 8px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
            gap: 20px;
            margin: 24px 0;
        }

        .info-item {
            background: rgba(0,0,0,0.4);
            border-radius: 24px;
            padding: 16px;
            border-left: 3px solid #b8860b;
        }

        .contact-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .contact-btn {
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .contact-btn.call:hover { background: #25D366; color: black; }
        .contact-btn.whatsapp:hover { background: #25D366; }
        .contact-btn.telegram:hover { background: #0088cc; }

        .not-found {
            text-align: center;
            padding: 60px;
            background: rgba(0,0,0,0.5);
            border-radius: 48px;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 40px;
        }

        @media (max-width: 700px) {
            .product-grid { gap: 16px; }
            .product-img { height: 180px; }
            .shop-title h2 { font-size: 1.5rem; }
            .glass-header { flex-direction: column; text-align: center; }
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #b8860b;
            font-size: 1.2rem;
            grid-column: span 2;
        }
    </style>
</head>
<body>

<div class="glow-orb" style="top: -100px; left: -100px;"></div>
<div class="glow-orb" style="bottom: 0; right: 0; width: 400px; height: 400px; background: radial-gradient(circle, rgba(184,134,11,0.15), transparent);"></div>

<header class="glass-header">
    <div class="logo">
        <h1><i class="fas fa-crown"></i> PROVISION <span style="font-size:0.9rem;">| 3D বাজার</span></h1>
    </div>
    <div class="nav-links">
        <a href="#" onclick="scrollToProducts()"><i class="fas fa-store"></i> পণ্য</a>
        <a href="#" onclick="scrollToProfile()"><i class="fas fa-id-card"></i> প্রোফাইল</a>
    </div>
</header>

<div class="main-container">
    <!-- 3D Slider -->
    <div class="slider-3d">
        <div class="slider-wrapper">
            <div class="slides-3d">
                <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?w=1200&h=400&fit=crop" alt="Offer">
                <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1200&h=400&fit=crop" alt="New">
                <img src="https://images.unsplash.com/photo-1472851294608-062f824d29cc?w=1200&h=400&fit=crop" alt="Discount">
            </div>
        </div>
    </div>

    <!-- PRODUCT SECTION -->
    <div class="section-title" id="productsSection">
        <i class="fas fa-bolt" style="color:#b8860b"></i> 
        <span>এক্সক্লুসিভ কালেকশন</span>
    </div>
    <div class="product-grid" id="productGrid">
        <div class="loading"><i class="fas fa-spinner fa-pulse"></i> লোডিং পণ্য...</div>
    </div>

    <!-- PROFILE DISPLAY SECTION (based on ?id= parameter) -->
    <div class="profile-section" id="profileSection">
        <div style="text-align:center; padding: 30px;" id="profileLoadingIndicator">
            <i class="fas fa-spinner fa-pulse"></i> প্রোফাইল লোড হচ্ছে...
        </div>
        <div id="profileContent" style="display:none;"></div>
    </div>
    <footer>
        <i class="fas fa-gem"></i> প্রিমিয়াম 3D মার্কেটপ্লেস | সর্বশেষ প্রযুক্তি
    </footer>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyA1CzQX9tgbLd46QfvCK6Rwqa0z9CRWoMs",
        authDomain: "agls-5bd4c.firebaseapp.com",
        databaseURL: "https://agls-5bd4c-default-rtdb.firebaseio.com/",
        projectId: "agls-5bd4c",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ---------- PRODUCT LOAD (user.html style) ----------
    function getGoogleDriveImageUrl(url) {
        if(!url) return "https://via.placeholder.com/500x300/222/b8860b?text=No+Image";
        let match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if(match) return `https://lh3.googleusercontent.com/d/${match[1]}=w500`;
        match = url.match(/id=([a-zA-Z0-9_-]+)/);
        if(match) return `https://lh3.googleusercontent.com/d/${match[1]}=w500`;
        return url.match(/\.(jpg|jpeg|png|webp)/i) ? url : "https://via.placeholder.com/500x300/333/b8860b?text=Image";
    }

    function escapeHtml(str) {
        if(!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    async function loadProducts() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> আনয়ন করা হচ্ছে...</div>';
        try {
            const snapshot = await db.ref("products").once('value');
            if(!snapshot.exists()) {
                grid.innerHTML = '<div class="loading">📦 কোন পণ্য পাওয়া যায়নি</div>';
                return;
            }
            let html = '';
            snapshot.forEach(child => {
                const p = child.val();
                const img = getGoogleDriveImageUrl(p.image);
                html += `
                    <div class="product-card">
                        <img class="product-img" src="${img}" alt="${escapeHtml(p.name)}" onerror="this.src='https://via.placeholder.com/500x300/333/b8860b?text=Error'">
                        <div class="product-info">
                            <div class="product-name">${escapeHtml(p.name)}</div>
                            <div class="product-price">৳ ${escapeHtml(p.price)}</div>
                            <div class="product-desc">${escapeHtml((p.desc || "উচ্চমানের পণ্য, দ্রুত ডেলিভারি").substring(0, 90))}${(p.desc && p.desc.length>90) ? '...' : ''}</div>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        } catch(e) {
            grid.innerHTML = '<div class="loading">⚠️ পণ্য লোড করতে ব্যর্থ</div>';
            console.error(e);
        }
    }

    // ---------- PROFILE LOAD (shop profile by ID from URL) ----------
    const urlParams = new URLSearchParams(window.location.search);
    const shopId = urlParams.get('id');

    async function loadShopProfile(uid) {
        const profileDiv = document.getElementById('profileContent');
        const loadingIndicator = document.getElementById('profileLoadingIndicator');
        if(!uid) {
            profileDiv.innerHTML = `<div class="not-found">
                <i class="fas fa-store-slash" style="font-size:48px;"></i>
                <h3>কোন দোকান আইডি দেওয়া হয়নি</h3>
                <p>URL এ ?id=shopId যোগ করুন অথবা দোকানের লিংকে ক্লিক করুন</p>
                </div>`;
            loadingIndicator.style.display = 'none';
            profileDiv.style.display = 'block';
            return;
        }
        try {
            const snap = await db.ref('shops/' + uid).once('value');
            const shop = snap.val();
            if(!shop || shop.status !== 'approved') {
                profileDiv.innerHTML = `<div class="not-found">
                    <i class="fas fa-ban"></i>
                    <h3>দোকানটি অনুমোদিত হয়নি বা পাওয়া যায়নি</h3>
                    <p>শুধুমাত্র অনুমোদিত দোকান প্রোফাইল দেখা যাবে</p>
                    </div>`;
                loadingIndicator.style.display = 'none';
                profileDiv.style.display = 'block';
                return;
            }
            // render premium profile
            const avatarChar = (shop.shopName?.charAt(0) || '?').toUpperCase();
            const addressLine = shop.thana ? `${shop.thana}, ${shop.district}` : (shop.area ? `${shop.area}, ${shop.district}` : shop.district || '');
            
            let contactsHtml = '';
            if(shop.phone) contactsHtml += `<a href="tel:${shop.phone}" class="contact-btn call"><i class="fas fa-phone-alt"></i> কল করুন</a>`;
            if(shop.whatsapp) {
                let wa = shop.whatsapp.replace(/[^0-9]/g,'');
                if(!wa.startsWith('88')) wa = '88'+wa;
                contactsHtml += `<a href="https://wa.me/${wa}" target="_blank" class="contact-btn whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</a>`;
            }
            if(shop.telegram) {
                let tg = shop.telegram.replace(/[^0-9]/g,'');
                if(!tg.startsWith('88')) tg = '88'+tg;
                contactsHtml += `<a href="https://t.me/+${tg}" target="_blank" class="contact-btn telegram"><i class="fab fa-telegram-plane"></i> Telegram</a>`;
            }
            if(contactsHtml === '') contactsHtml = `<p style="color:#aaa;">কোন যোগাযোগের তথ্য নেই</p>`;

            const fullProfileHtml = `
                <div class="profile-header">
                    <div class="profile-avatar">${avatarChar}</div>
                    <div class="shop-title">
                        <h2>${escapeHtml(shop.shopName)}</h2>
                        <div class="status-badge"><i class="fas fa-check-circle"></i> ভেরিফাইড স্টোর</div>
                        <p style="margin-top: 8px;"><i class="fas fa-user"></i> ${escapeHtml(shop.ownerName)}</p>
                    </div>
                </div>
                <div class="info-grid">
                    <div class="info-item"><i class="fas fa-map-marker-alt"></i> <strong>ঠিকানা</strong><br>${escapeHtml(addressLine)}</div>
                    <div class="info-item"><i class="fas fa-phone"></i> <strong>মোবাইল</strong><br>${escapeHtml(shop.phone || '—')}</div>
                    <div class="info-item"><i class="fas fa-layer-group"></i> <strong>ক্যাটাগরি</strong><br>${escapeHtml(shop.categories || 'সাধারণ পণ্য')}</div>
                </div>
                ${shop.description ? `<div style="background:rgba(255,255,255,0.05); border-radius:24px; padding:16px; margin:20px 0"><i class="fas fa-align-left"></i> <strong>দোকানের বিবরণ</strong><br>${escapeHtml(shop.description)}</div>` : ''}
                <div class="contact-buttons">
                    ${contactsHtml}
                </div>
                ${shop.youtube ? `<div style="margin-top:20px;"><a href="${shop.youtube}" target="_blank" style="color:#f0c040;"><i class="fab fa-youtube"></i> ভিডিও ট্যুর দেখুন</a></div>` : ''}
            `;
            profileDiv.innerHTML = fullProfileHtml;
            loadingIndicator.style.display = 'none';
            profileDiv.style.display = 'block';
        } catch(err) {
            console.error(err);
            profileDiv.innerHTML = `<div class="not-found"><i class="fas fa-exclamation-triangle"></i> ত্রুটি: প্রোফাইল লোড করা যায়নি</div>`;
            loadingIndicator.style.display = 'none';
            profileDiv.style.display = 'block';
        }
    }

    // scroll helpers
    window.scrollToProducts = () => {
        document.getElementById('productsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    window.scrollToProfile = () => {
        document.getElementById('profileSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    };

    // initialize both
    loadProducts();
    if(shopId) {
        loadShopProfile(shopId);
    } else {
        // show demo preview if no id
        const loadingInd = document.getElementById('profileLoadingIndicator');
        const contentDiv = document.getElementById('profileContent');
        loadingInd.style.display = 'none';
        contentDiv.style.display = 'block';
        contentDiv.innerHTML = `<div class="not-found">
            <i class="fas fa-link"></i>
            <h3>দোকানের প্রোফাইল দেখুন</h3>
            <p>প্রোফাইল দেখতে URL এ যুক্ত করুন: <code>?id=দোকানের_আইডি</code></p>
            <p style="margin-top:12px;">উদাহরণ: ?id=abc123xyz</p>
            </div>`;
    }
</script>
</body>
</html>
